<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBD 椭球调试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; font-family: monospace; }
        canvas { display: block; cursor: crosshair; }

        #hud {
            position: fixed; top: 12px; left: 12px; z-index: 10;
            color: #ccc; font-size: 13px; line-height: 1.7;
            pointer-events: none;
        }
        #hud .val { color: #0f0; }

        #info {
            position: fixed; bottom: 16px; left: 50%;
            transform: translateX(-50%);
            color: #888; font-size: 12px; z-index: 10;
            pointer-events: none;
        }

        #panel {
            position: fixed; top: 12px; right: 12px; z-index: 20;
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 14px 18px;
            color: #ccc;
            font-size: 13px;
            min-width: 220px;
            pointer-events: all;
            user-select: none;
        }
        #panel label { display: block; margin: 8px 0 2px; color: #aaa; }
        #panel input[type=range] { width: 100%; margin: 0; accent-color: #ff4444; }
        #panel .val { color: #ff4444; float: right; }
        #panel h3 { margin: 0 0 6px; color: #fff; font-size: 14px; }
    </style>
</head>
<body>

    <div id="hud">
        <div>FPS: <span class="val" id="fps">--</span></div>
        <div>帧耗时: <span class="val" id="framems">--</span> ms</div>
        <div>顶点: <span class="val" id="vcount">--</span></div>
        <div>三角形: <span class="val" id="tcount">--</span></div>
        <div>皮筋: <span class="val" id="bcount">0</span></div>
        <div>体积: <span class="val" id="vratio">100</span>%</div>
        <div>当前体积: <span class="val" id="cvol">--</span></div>
        <div>rest体积: <span class="val" id="rvol">--</span></div>
        <div>PBD迭代: <span class="val" id="pbditer">--</span></div>
        <div>最大位移: <span class="val" id="maxdisp">--</span></div>
        <div>形状有效: <span class="val" id="seff">--</span> &nbsp; 皮筋有效: <span class="val" id="beff">--</span></div>
    </div>
    <div id="info">🖱️ 点击椭球表面绑皮筋 &nbsp; R 键割一根</div>

    <div id="panel">
        <h3>🔧 PBD 参数</h3>
        <label>形状基础刚度 <span class="val" id="sv_ss">0.30</span></label>
        <input type="range" id="sl_ss" min="0.01" max="1.0" step="0.01" value="0.30">
        <label>皮筋基础刚度 <span class="val" id="sv_bs">0.50</span></label>
        <input type="range" id="sl_bs" min="0.01" max="1.0" step="0.01" value="0.50">
        <label>体积刚度 <span class="val" id="sv_vs">0.40</span></label>
        <input type="range" id="sl_vs" min="0.01" max="1.0" step="0.01" value="0.40">
        <label>影响半径 <span class="val" id="sv_bi">0.60</span></label>
        <input type="range" id="sl_bi" min="0.2" max="1.5" step="0.05" value="0.60">
        <label>硬化系数 <span class="val" id="sv_ha">0.00</span></label>
        <input type="range" id="sl_ha" min="0" max="3" step="0.05" value="0">
        <label>PBD迭代 <span class="val" id="sv_pi">10</span></label>
        <input type="range" id="sl_pi" min="1" max="30" step="1" value="10">
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ──────────────────────────────────────
        // DOM
        // ──────────────────────────────────────
        const $ = id => document.getElementById(id);
        const H = {
            fps: $('fps'), framems: $('framems'),
            vcount: $('vcount'), tcount: $('tcount'),
            bcount: $('bcount'), vratio: $('vratio'),
            cvol: $('cvol'), rvol: $('rvol'), pbditer: $('pbditer'),
            maxdisp: $('maxdisp'),
            seff: $('seff'),
            beff: $('beff'),
        };

        // ──────────────────────────────────────
        // Three.js setup
        // ──────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#111122');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.set(2, 2, 4);
        camera.lookAt(0, 0, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.update();

        // Lighting
        scene.add(new THREE.AmbientLight('#fff', 0.5));
        scene.add(new THREE.DirectionalLight('#fff', 1.5).translateY(5));

        // ──────────────────────────────────────
        // Load dual models: proxy (physics) + high-res (render)
        // ──────────────────────────────────────
        const proxyGeo = new THREE.BufferGeometry();
        let highResMesh = null;
        let skinMapping = null;
        let proxyWire = null;

        async function loadGLB(url) {
            return new Promise((res, rej) => new GLTFLoader().load(url, res, undefined, rej));
        }
        function extractGeo(gltf) {
            let g = null; gltf.scene.traverse(c => { if (c.isMesh && !g) g = c.geometry; }); return g;
        }
        function centerScaleGeo(geo, th) {
            geo.computeBoundingBox();
            const c = new THREE.Vector3(); geo.boundingBox.getCenter(c);
            const s = new THREE.Vector3(); geo.boundingBox.getSize(s);
            const sc = th / s.y;
            const pa = geo.attributes.position.array;
            for (let i = 0; i < geo.attributes.position.count; i++) {
                pa[i*3]=(pa[i*3]-c.x)*sc; pa[i*3+1]=(pa[i*3+1]-c.y)*sc; pa[i*3+2]=(pa[i*3+2]-c.z)*sc;
            }
            geo.attributes.position.needsUpdate = true;
            geo.computeVertexNormals();
        }

        async function loadModels() {
            // Load proxy (physics)
            const pg = await loadGLB('pineapple_py.glb');
            const pGeo = extractGeo(pg).clone();
            centerScaleGeo(pGeo, 3.0);
            copyGeo(proxyGeo, pGeo);
            console.log('代理:', proxyGeo.attributes.position.count, '顶点');

            // Load high-res (same model for testing)
            const hg = await loadGLB('pineapple.glb');
            const hGeo = extractGeo(hg).clone();
            centerScaleGeo(hGeo, 3.0);
            let hMat = null;
            hg.scene.traverse(c => { if (c.isMesh && !hMat) hMat = c.material; });
            const highGeo = new THREE.BufferGeometry();
            copyGeo(highGeo, hGeo);
            highResMesh = new THREE.Mesh(highGeo, hMat); scene.add(highResMesh);

            // Debug wireframe for proxy (toggle with W)
            const wMat = new THREE.MeshBasicMaterial({ color:'#0f0', wireframe:true, transparent:true, opacity:0.5 });
            proxyWire = new THREE.Mesh(proxyGeo, wMat);
            proxyWire.visible = false;
            scene.add(proxyWire);

            // Build skinning (K=1 for same-model test)
            skinMapping = buildSkinningMapping(highGeo, proxyGeo, 5);

            initPBDRestState();
            console.log('✅ 双模型就绪');
        }
        loadModels().catch(e => console.error('加载失败:', e));

        function copyGeo(dst, src) {
            const pa = src.attributes.position.array;
            dst.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(pa), 3));
            if (src.index) dst.setIndex(Array.from(src.index.array));
            if (src.attributes.normal) dst.setAttribute('normal', src.attributes.normal.clone());
            if (src.attributes.uv) dst.setAttribute('uv', src.attributes.uv.clone());
            dst.computeVertexNormals();
        }

        // ── Vertex skinning (K nearest proxy vertices with inverse-square weights) ──
        function buildSkinningMapping(highGeo, proxyGeo, K) {
            const hPos = highGeo.attributes.position, pPos = proxyGeo.attributes.position;
            console.log(`蒙皮: ${hPos.count} → ${pPos.count}, K=${K}`);
            const gs = 15;
            const pBox = new THREE.Box3().setFromBufferAttribute(pPos);
            const cs = new THREE.Vector3((pBox.max.x-pBox.min.x)/gs, (pBox.max.y-pBox.min.y)/gs, (pBox.max.z-pBox.min.z)/gs);
            const grid = new Array(gs*gs*gs); for (let i=0;i<grid.length;i++) grid[i]=[];
            for (let i=0;i<pPos.count;i++) {
                const ci=Math.max(0,Math.min(gs-1,~~((pPos.getX(i)-pBox.min.x)/cs.x)));
                const cj=Math.max(0,Math.min(gs-1,~~((pPos.getY(i)-pBox.min.y)/cs.y)));
                const ck=Math.max(0,Math.min(gs-1,~~((pPos.getZ(i)-pBox.min.z)/cs.z)));
                grid[ci+cj*gs+ck*gs*gs].push(i);
            }
            const map = [];
            for (let vi=0;vi<hPos.count;vi++) {
                const x=hPos.getX(vi),y=hPos.getY(vi),z=hPos.getZ(vi);
                const ci=Math.max(0,Math.min(gs-1,~~((x-pBox.min.x)/cs.x)));
                const cj=Math.max(0,Math.min(gs-1,~~((y-pBox.min.y)/cs.y)));
                const ck=Math.max(0,Math.min(gs-1,~~((z-pBox.min.z)/cs.z)));
                // Collect K nearest
                const best = [];
                for (const idx of grid[ci+cj*gs+ck*gs*gs]) {
                    const d=(x-pPos.getX(idx))**2+(y-pPos.getY(idx))**2+(z-pPos.getZ(idx))**2;
                    if (best.length < K || d < best[best.length-1].d) {
                        best.push({idx,d}); best.sort((a,b)=>a.d-b.d); if (best.length>K) best.length=K;
                    }
                }
                // Gaussian RBF: w = exp(-d²/σ²)
                // sigma ≈ average proxy vertex spacing (surface area / vertex count)
                const sigma2 = 0.0003; // hand-tuned: ~0.017²
                let tw=0;
                const indices=[], weights=[];
                for (const b of best) { const w=Math.exp(-b.d/sigma2); indices.push(b.idx); weights.push(w); tw+=w; }
                for (let j=0;j<weights.length;j++) weights[j]/=tw;
                map.push({indices, weights});
                if (vi%20000===0) console.log(`  蒙皮 ${(vi/hPos.count*100).toFixed(0)}%`);
            }
            console.log('蒙皮完成');
            return map;
        }
        function applySkinningMapping(proxyPos, highPos) {
            const p=proxyPos.array, h=highPos.array;
            for (let i=0;i<skinMapping.length;i++) {
                const m=skinMapping[i]; let sx=0,sy=0,sz=0;
                for (let j=0;j<m.indices.length;j++) {
                    const pi=m.indices[j]*3, w=m.weights[j];
                    sx+=p[pi]*w; sy+=p[pi+1]*w; sz+=p[pi+2]*w;
                }
                const i3=i*3; h[i3]=sx; h[i3+1]=sy; h[i3+2]=sz;
            }
            highPos.needsUpdate = true;
        }

        // ──────────────────────────────────────
        // PBD params (adjustable via sliders)
        // ──────────────────────────────────────
        // 形状基础刚度: 菠萝皮的材料属性
        let SHAPE_STIFFNESS = 0.30;
        // 皮筋基础刚度: 皮筋的材料属性
        let BAND_STIFFNESS = 0.50;
        // 体积刚度: 全局体积保持
        let VOLUME_STIFFNESS = 0.40;
        // 皮筋影响范围 (核函数宽度)
        let BAND_INFLUENCE = 0.6;
        // 每帧迭代轮数
        let PBD_ITERATIONS = 10;
        // 皮筋绑上去时的初始紧度 (目标半径 = 当前 × 此值)
        const BAND_INITIAL_TIGHTNESS = 0.80;
        // 硬化系数: 位移越大，形状约束刚度越大 (0=线性, 越大越非线性)
        let HARDENING = 0;
        let maxDisplacement = 0;

        // ── Slider wiring ──
        const slSS = document.getElementById('sl_ss');
        const slBS = document.getElementById('sl_bs');
        const slVS = document.getElementById('sl_vs');
        const slBI = document.getElementById('sl_bi');
        const slHA = document.getElementById('sl_ha');
        const slPI = document.getElementById('sl_pi');
        const svSS = document.getElementById('sv_ss');
        const svBS = document.getElementById('sv_bs');
        const svVS = document.getElementById('sv_vs');
        const svBI = document.getElementById('sv_bi');
        const svHA = document.getElementById('sv_ha');
        const svPI = document.getElementById('sv_pi');

        slSS.addEventListener('input', () => {
            SHAPE_STIFFNESS = parseFloat(slSS.value);
            svSS.textContent = SHAPE_STIFFNESS.toFixed(2);
        });
        slBS.addEventListener('input', () => {
            BAND_STIFFNESS = parseFloat(slBS.value);
            svBS.textContent = BAND_STIFFNESS.toFixed(2);
            for (const b of bands) b.stiffness = BAND_STIFFNESS;
        });
        slVS.addEventListener('input', () => {
            VOLUME_STIFFNESS = parseFloat(slVS.value);
            svVS.textContent = VOLUME_STIFFNESS.toFixed(2);
        });
        slBI.addEventListener('input', () => {
            BAND_INFLUENCE = parseFloat(slBI.value);
            svBI.textContent = BAND_INFLUENCE.toFixed(2);
            for (const b of bands) b.influence = BAND_INFLUENCE;
        });
        slHA.addEventListener('input', () => {
            HARDENING = parseFloat(slHA.value);
            svHA.textContent = HARDENING.toFixed(2);
        });
        slPI.addEventListener('input', () => {
            PBD_ITERATIONS = parseInt(slPI.value);
            svPI.textContent = PBD_ITERATIONS;
            H.pbditer.textContent = PBD_ITERATIONS;
        });

        // ──────────────────────────────────────
        // PBD State
        // ──────────────────────────────────────
        let restPositions = null;   // Float32Array
        let restVolume = 0;
        let restSurfaceArea = 0;

        const bands = [];           // { centerY, targetRadius, stiffness, influence }
        const bandVisuals = [];     // THREE.Mesh (torus)
        function makeBandVisual(centerY, radius) {
            const geo = new THREE.TorusGeometry(1.0, 0.02, 16, 48);
            const mat = new THREE.MeshBasicMaterial({ color: '#ff3333', transparent: true, opacity: 0.7, depthTest: false, depthWrite: false });
            const torus = new THREE.Mesh(geo, mat);
            torus.rotation.x = -Math.PI / 2;
            torus.position.y = centerY;
            torus.scale.setScalar(radius);
            torus.renderOrder = 1;
            scene.add(torus);
            return torus;
        }

        function initPBDRestState() {
            const pos = proxyGeo.attributes.position;
            restPositions = new Float32Array(pos.array);

            // Compute rest volume & surface area (handle indexed & non-indexed)
            const p = pos.array;
            const hasIdx = proxyGeo.index !== null;
            const idx = hasIdx ? proxyGeo.index.array : null;
            const faceCount = hasIdx ? idx.length / 3 : pos.count / 3;
            let vol = 0, area = 0;
            const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();

            function addTri(ai, bi, ci) {
                a.set(p[ai], p[ai+1], p[ai+2]); b.set(p[bi], p[bi+1], p[bi+2]); c.set(p[ci], p[ci+1], p[ci+2]);
                vol += (a.x*(b.y*c.z-b.z*c.y) + a.y*(b.z*c.x-b.x*c.z) + a.z*(b.x*c.y-b.y*c.x))/6;
                const ab = new THREE.Vector3().subVectors(b, a), ac = new THREE.Vector3().subVectors(c, a);
                area += 0.5 * new THREE.Vector3().crossVectors(ab, ac).length();
            }
            if (hasIdx) {
                for (let i = 0; i < idx.length; i += 3) addTri(idx[i]*3, idx[i+1]*3, idx[i+2]*3);
            } else {
                for (let i = 0; i < p.length; i += 9) addTri(i, i+3, i+6);
            }
            restVolume = Math.abs(vol);
            restSurfaceArea = area;

            H.vcount.textContent = pos.count;
            H.tcount.textContent = Math.round(faceCount);
            H.rvol.textContent = restVolume.toFixed(4);
            H.pbditer.textContent = PBD_ITERATIONS;

            console.log('PBD 初始化:',
                '顶点', pos.count,
                '三角形', Math.round(faceCount),
                'restVolume', restVolume.toFixed(4),
                'restSurfaceArea', restSurfaceArea.toFixed(2));
        }
        // initPBDRestState() is called inside loadPineapple() after model loads

        // ──────────────────────────────────────
        // Utility
        // ──────────────────────────────────────
        function smoothstep(e0, e1, x) {
            const t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0)));
            return t * t * (3 - 2 * t);
        }

        // ──────────────────────────────────────
        // Band management
        // ──────────────────────────────────────
        function addBand(centerY) {
            if (!highResMesh || restVolume <= 0) return;
            const pos = proxyGeo.attributes.position;
            let minY = Infinity, maxY = -Infinity;
            for (let i = 0; i < pos.count; i++) {
                const y = pos.getY(i); if (y < minY) minY = y; if (y > maxY) maxY = y;
            }
            const margin = BAND_INFLUENCE * 0.3;
            centerY = Math.max(minY + margin, Math.min(maxY - margin, centerY));

            // Current surface radius at this height
            let sumR = 0, count = 0;
            for (let i = 0; i < pos.count; i++) {
                if (Math.abs(pos.getY(i) - centerY) < BAND_INFLUENCE * 0.4) {
                    sumR += Math.sqrt(pos.getX(i) ** 2 + pos.getZ(i) ** 2);
                    count++;
                }
            }
            const currentR = count > 1 ? sumR / count : 0.5;

            bands.push({
                centerY,
                targetRadius: currentR * BAND_INITIAL_TIGHTNESS,
                stiffness: BAND_STIFFNESS,
                influence: BAND_INFLUENCE,
            });
            bandVisuals.push(makeBandVisual(centerY, currentR));

            H.bcount.textContent = bands.length;
            console.log(`皮筋 #${bands.length}  y=${centerY.toFixed(3)}  r=${currentR.toFixed(3)}  target=${(currentR * BAND_INITIAL_TIGHTNESS).toFixed(3)}`);
        }

        function removeBand() {
            if (bands.length === 0) return;
            bands.pop();
            const vis = bandVisuals.pop();
            if (vis) {
                vis.geometry.dispose();
                vis.material.dispose();
                scene.remove(vis);
            }
            H.bcount.textContent = bands.length;
        }

        // ──────────────────────────────────────
        // PBD Solver
        // ──────────────────────────────────────
        function pbdApplyBand(band, posArr) {
            const cy = band.centerY;
            const tightR = band.targetRadius;
            const stiffness = band.stiffness;
            const influence = band.influence;

            const count = proxyGeo.attributes.position.count;
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const y = posArr[i3 + 1];
                const dy = Math.abs(y - cy);
                if (dy >= influence) continue;

                const x = posArr[i3];
                const z = posArr[i3 + 2];
                const r = Math.sqrt(x * x + z * z);
                if (r < 1e-6) continue;

                // Interpolated effective target (U-shaped depression)
                const t = dy / influence;
                const st = smoothstep(0, 1, t);
                const effectiveTarget = tightR + (r - tightR) * st;

                if (r > effectiveTarget) {
                    // 硬化作用在皮筋侧: 位移越大，皮筋有效刚度越低
                    // 等效于形状/皮筋刚度比值变大 → 越来越勒不动
                    const rx = restPositions[i3], ry = restPositions[i3 + 1], rz = restPositions[i3 + 2];
                    const dxr = rx - x, dyr = ry - y, dzr = rz - z;
                    const disp = Math.sqrt(dxr * dxr + dyr * dyr + dzr * dzr);
                    const hardenedStiff = HARDENING > 0
                        ? stiffness / Math.exp(HARDENING * disp * 50)
                        : stiffness;

                    const displacement = hardenedStiff * (r - effectiveTarget);
                    const scale = Math.max(0.01, (r - displacement) / r);
                    posArr[i3] *= scale;
                    posArr[i3 + 2] *= scale;
                }
            }
        }

        // ── 体积约束: 总体积守恒，均匀推所有顶点 ──
        function pbdApplyVolume(posArr, idxArr) {
            let currentVolume = 0;
            const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
            for (let i = 0; i < idxArr.length; i += 3) {
                const ai = idxArr[i] * 3, bi = idxArr[i + 1] * 3, ci = idxArr[i + 2] * 3;
                a.set(posArr[ai], posArr[ai + 1], posArr[ai + 2]);
                b.set(posArr[bi], posArr[bi + 1], posArr[bi + 2]);
                c.set(posArr[ci], posArr[ci + 1], posArr[ci + 2]);
                currentVolume += (a.x * (b.y * c.z - b.z * c.y) +
                                  a.y * (b.z * c.x - b.x * c.z) +
                                  a.z * (b.x * c.y - b.y * c.x)) / 6;
            }
            currentVolume = Math.abs(currentVolume);

            const deficit = restVolume - currentVolume;
            if (Math.abs(deficit) < 1e-9) return currentVolume;

            // Uniform radial push — no freedom weighting
            // Band area: 体积往外推 vs 皮筋往里推 → 刚度比决定深度
            // Free area: 只有体积往外推 → 自然鼓出
            const basePush = VOLUME_STIFFNESS * deficit / restSurfaceArea;
            const count = proxyGeo.attributes.position.count;

            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const x = posArr[i3];
                const z = posArr[i3 + 2];
                const r = Math.sqrt(x * x + z * z);
                if (r < 1e-6) continue;
                const scale = (r + basePush) / r;
                const safeScale = Math.max(0.7, Math.min(1.3, scale));
                posArr[i3] *= safeScale;
                posArr[i3 + 2] *= safeScale;
            }
            return currentVolume;
        }

        // ── 形状约束: 每个顶点想回到 rest 位置 ──
        // 非线性弹性: 位移越大，有效刚度越高 (硬化)
        // effectiveStiffness = base × (1 + hardening × displacement²)
        // 钳位到 0.99 保证 PBD 收敛
        function pbdApplyShape(posArr) {
            const count = proxyGeo.attributes.position.count;
            let maxDisp = 0;
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const dx = restPositions[i3]     - posArr[i3];
                const dy = restPositions[i3 + 1] - posArr[i3 + 1];
                const dz = restPositions[i3 + 2] - posArr[i3 + 2];
                const disp = Math.sqrt(dx * dx + dy * dy + dz * dz);
                if (disp > maxDisp) maxDisp = disp;

                // 形状约束: 线性拉回原位 (硬化已移至皮筋侧)
                const effStiff = SHAPE_STIFFNESS;

                posArr[i3]     += dx * effStiff;
                posArr[i3 + 1] += dy * effStiff;
                posArr[i3 + 2] += dz * effStiff;
            }
            maxDisplacement = maxDisp;
        }

        // ── PBD 主循环 ──
        function runPBD() {
            const pos = proxyGeo.attributes.position;
            const posArr = pos.array;
            const idxArr = proxyGeo.index.array;
            let finalVolume = restVolume;

            for (let iter = 0; iter < PBD_ITERATIONS; iter++) {
                // 约束执行顺序:
                // ① 形状: 全部顶点拉回原位 (菠萝皮的弹性)
                // ② 每条皮筋: 局部往 targetRadius 推
                // ③ 体积: 全局补体积
                pbdApplyShape(posArr);
                for (const band of bands) {
                    pbdApplyBand(band, posArr);
                }
                finalVolume = pbdApplyVolume(posArr, idxArr);
            }

            pos.needsUpdate = true;
            proxyGeo.computeVertexNormals();

            // Apply skinning: proxy → high-res
            if (skinMapping && highResMesh) {
                applySkinningMapping(proxyGeo.attributes.position, highResMesh.geometry.attributes.position);
                highResMesh.geometry.computeVertexNormals();
            }

            H.cvol.textContent = finalVolume.toFixed(4);
            H.vratio.textContent = (finalVolume / restVolume * 100).toFixed(1);
            H.maxdisp.textContent = maxDisplacement.toFixed(3);

            // Show effective values at max displacement
            H.seff.textContent = SHAPE_STIFFNESS.toFixed(3);
            const hardenedBandStiff = HARDENING > 0
                ? BAND_STIFFNESS / Math.exp(HARDENING * maxDisplacement * 50)
                : BAND_STIFFNESS;
            H.beff.textContent = hardenedBandStiff.toFixed(3);


            // Update band visuals
            for (let b = 0; b < bands.length; b++) {
                const vis = bandVisuals[b];
                if (!vis || !vis.visible) continue;
                const cy = bands[b].centerY;
                let sumR = 0, cnt = 0;
                for (let i = 0; i < pos.count; i++) {
                    if (Math.abs(pos.getY(i) - cy) < BAND_INFLUENCE * 0.3) {
                        sumR += Math.sqrt(pos.getX(i) ** 2 + pos.getZ(i) ** 2);
                        cnt++;
                    }
                }
                if (cnt > 1) {
                    vis.position.y = cy;
                    vis.scale.setScalar(sumR / cnt);
                }
            }
        }

        // ──────────────────────────────────────
        // Mouse interaction
        // ──────────────────────────────────────
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const mouseDown = new THREE.Vector2();
        let previewRing = null;

        function ensurePreviewRing() {
            if (previewRing) return;
            const geo = new THREE.TorusGeometry(1.0, 0.025, 16, 48);
            const mat = new THREE.MeshBasicMaterial({
                color: '#ffff00',
                transparent: true,
                opacity: 0.5,
                depthTest: false,
                depthWrite: false,
            });
            previewRing = new THREE.Mesh(geo, mat);
            previewRing.rotation.x = -Math.PI / 2;
            previewRing.visible = false;
            previewRing.renderOrder = 2;
            scene.add(previewRing);
        }

        window.addEventListener('mousemove', (e) => {
            if (!highResMesh) return;
            ensurePreviewRing();
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(highResMesh, false);
            if (hits.length > 0) {
                const y = hits[0].point.y;
                const clampedY = Math.max(-1.5 + 0.1, Math.min(1.5 - 0.1, y));
                previewRing.position.y = clampedY;
                previewRing.visible = true;
                // Estimate radius
                const pos = proxyGeo.attributes.position;
                let sumR = 0, cnt = 0;
                for (let i = 0; i < pos.count; i++) {
                    if (Math.abs(pos.getY(i) - clampedY) < 0.15) {
                        sumR += Math.sqrt(pos.getX(i) ** 2 + pos.getZ(i) ** 2);
                        cnt++;
                    }
                }
                if (cnt > 1) previewRing.scale.setScalar(sumR / cnt);
            } else {
                previewRing.visible = false;
            }
        });

        window.addEventListener('mousedown', (e) => { mouseDown.set(e.clientX, e.clientY); });

        window.addEventListener('mouseup', (e) => {
            if (!highResMesh) return;
            const dx = e.clientX - mouseDown.x;
            const dy = e.clientY - mouseDown.y;
            if (Math.sqrt(dx * dx + dy * dy) > 3) return; // drag

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(highResMesh, false);
            if (hits.length > 0) {
                addBand(hits[0].point.y);
            }
        });

        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'r') removeBand();
            if (k === 'w' && proxyWire) proxyWire.visible = !proxyWire.visible;
        });

        // ──────────────────────────────────────
        // Resize
        // ──────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ──────────────────────────────────────
        // Animation loop
        // ──────────────────────────────────────
        const clock = new THREE.Clock();
        let fpsFrames = 0, fpsTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const t0 = performance.now();

            controls.update();

            if (!highResMesh) { renderer.render(scene, camera); return; } // model not loaded yet

            if (bands.length > 0) {
                runPBD();
            } else {
                // No bands — just run shape constraint to restore rest shape
                const posArr = proxyGeo.attributes.position.array;
                for (let iter = 0; iter < PBD_ITERATIONS; iter++) {
                    pbdApplyShape(posArr);
                }
                proxyGeo.attributes.position.needsUpdate = true;
                proxyGeo.computeVertexNormals();
            }

            renderer.render(scene, camera);

            const ms = performance.now() - t0;
            fpsFrames++;
            fpsTime += dt;
            if (fpsTime >= 1.0) {
                H.fps.textContent = Math.round(fpsFrames / fpsTime);
                H.framems.textContent = ms.toFixed(1);
                fpsFrames = 0;
                fpsTime = 0;
            }
        }

        console.log('🔧 PBD 菠萝调试就绪。加载模型中...');
        console.log('   🖱️ 点击菠萝表面 = 绑皮筋,  R = 割皮筋');

        animate();
    </script>
</body>
