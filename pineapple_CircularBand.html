<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮筋游戏 GPU PBD + Three.js WebGPU</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; overflow:hidden; font-family:monospace; }
canvas { display:block; cursor:crosshair; }
#hud { position:fixed; top:12px; left:12px; z-index:10; color:#ccc; font-size:13px; line-height:1.7; pointer-events:none; }
#hud .val { color:#0f0; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#888; font-size:12px; z-index:10; pointer-events:none; }
#panel { position:fixed; top:12px; right:12px; z-index:20; background:rgba(0,0,0,0.85); border:1px solid #555; border-radius:8px; padding:14px 18px; color:#ccc; font-size:12px; min-width:240px; pointer-events:all; user-select:none; max-height:90vh; overflow-y:auto; }
#panel label { display:block; margin:6px 0 2px; color:#aaa; }
#panel input[type=range] { width:100%; accent-color:#ff44cc; }
#panel .val { color:#ff44cc; float:right; }
#panel h3 { margin:8px 0 4px; color:#fff; font-size:13px; border-top:1px solid #444; padding-top:8px; }
#panel h3:first-child { border-top:none; padding-top:0; }
#panel .row { display:flex; gap:8px; align-items:center; }
#panel .row span { flex:0 0 auto; color:#aaa; font-size:11px; }
#panel .row input { flex:1; }
#panel .btn { margin-top:6px; width:100%; padding:4px 0; background:#333; color:#ff44cc; border:1px solid #ff44cc; border-radius:4px; cursor:pointer; font-size:11px; }
#panel .btn:hover { background:#444; }
#panel .kb { display:inline-block; background:#333; color:#ff4; padding:1px 5px; border-radius:3px; font-size:10px; margin:0 2px; }
</style>
</head>
<body>

<div id="hud">
 <div>FPS: <span class="val" id="fps">--</span></div>
 <div>帧耗时: <span class="val" id="framems">--</span> ms</div>
 <div>代理顶点: <span class="val" id="vcount">--</span></div>
 <div>高模顶点: <span class="val" id="hcount">--</span></div>
</div>
<div id="info">
 Click = bind circular band &nbsp; <span class="kb">T</span>=cut one &nbsp; <span class="kb">C</span>=cut all &nbsp; <span style="color:#ff44cc">Circular Band GPU</span>
</div>
<div id="panel">
 <h3>🎯 最后皮筋<span class="val" id="lb_info">(空)</span></h3>
 <label>rest周长 <span class="val" id="sv_lr">--</span></label>
 <input type="range" id="sl_lr" min="0.3" max="8.0" step="0.01" value="2.51">
 <div class="row"><span>法向X</span><input type="range" id="sl_nx" min="-1" max="1" step="0.01" value="0"><span class="val" id="sv_nx">0</span></div>
 <div class="row"><span>法向Y</span><input type="range" id="sl_ny" min="-1" max="1" step="0.01" value="1"><span class="val" id="sv_ny">1</span></div>
 <div class="row"><span>法向Z</span><input type="range" id="sl_nz" min="-1" max="1" step="0.01" value="0"><span class="val" id="sv_nz">0</span></div>
 <div class="row"><span>刚度</span><input type="range" id="sl_bk" min="0.001" max="1" step="0.001" value="0.500"><span class="val" id="sv_bk">0.500</span></div>
 <button class="btn" id="btn_normalize">归一化法向量</button>
 <button class="btn" id="btn_horiz">设为水平</button>

 <h3>� 圆皮筋</h3>
 <label>管半径 <span class="val" id="sv_tr">0.018</span></label>
 <input type="range" id="sl_tr" min="0.005" max="0.08" step="0.001" value="0.018">
 <label>截面细分 <span class="val" id="sv_rs">12</span></label>
 <input type="range" id="sl_rs" min="4" max="24" step="1" value="12">

 <h3>�💡 光照</h3>
 <label>环境光强度<span class="val" id="sv_ai">0.50</span></label>
 <input type="range" id="sl_ai" min="0" max="3.0" step="0.01" value="0.50">
 <label>平行光强度<span class="val" id="sv_di">1.50</span></label>
 <input type="range" id="sl_di" min="0" max="5.0" step="0.01" value="1.50">
 <div class="row"><span>平行光X</span><input type="range" id="sl_dx" min="-10" max="10" step="0.1" value="0"><span class="val" id="sv_dx">0</span></div>
 <div class="row"><span>平行光Y</span><input type="range" id="sl_dy" min="-10" max="10" step="0.1" value="5"><span class="val" id="sv_dy">5</span></div>
 <div class="row"><span>平行光Z</span><input type="range" id="sl_dz" min="-10" max="10" step="0.1" value="0"><span class="val" id="sv_dz">0</span></div>
</div>

<canvas id="canvas"></canvas>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.177.0/build/three.webgpu.js", "three/addons/loaders/GLTFLoader.js": "https://cdn.jsdelivr.net/npm/three@0.177.0/examples/jsm/loaders/GLTFLoader.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ══════.?DOM ══════.?
const $=id=>document.getElementById(id);
const H={
  fps:$('fps'),framems:$('framems'),vcount:$('vcount'),hcount:$('hcount'),
};
const canvas=$('canvas');

// ═══════ WebGPU adapter ═══════
if(!navigator.gpu){alert('需要WebGPU！Chrome 113+');throw new Error('No WebGPU');}
let adapter=null;for(let i=0;i<3&&!adapter;i++){adapter=await navigator.gpu.requestAdapter({powerPreference:'high-performance'});if(!adapter&&i<2)await new Promise(r=>setTimeout(r,500));}
if(!adapter){alert('无法获取GPU适配器');throw new Error('No adapter');}
const device=await adapter.requestDevice({requiredLimits:{maxStorageBuffersPerShaderStage:10}});
device.addEventListener('uncapturederror',ev=>console.error('GPU error:',ev.error));
const queue=device.queue;

// ══════.?Three.js WebGPU Renderer ══════.?
const renderer = new THREE.WebGPURenderer({ canvas, device, antialias: true, alpha: false, depth: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
await renderer.init();

const scene = new THREE.Scene();
scene.background = new THREE.Color('#111122');
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(1.5, 1.8, 3.5);
camera.lookAt(0, 0, 0);
const ambientLight = new THREE.AmbientLight('#fff', 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight('#fff', 1.5);
dirLight.position.set(0, 5, 0);
scene.add(dirLight);

// Environment map for PBR (required for anisotropy)
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envMap = pmremGenerator.fromScene(scene, 0.5).texture;
scene.environment = envMap;
pmremGenerator.dispose();

// ══════.?State ══════.?
let proxyVertexCount=0, proxyTriCount=0, restVolume=0, restSurfaceArea=0;
let proxyRestPositions=null;     // CPU: proxy rest positions (flat float32)
let proxyCurPositions=null;      // CPU: proxy current positions (for CPU PBD)
let proxyIdxArr=null;            // CPU: proxy indices
let proxyRestNormals=null;       // CPU: proxy rest normals (gradient directions)
let highResCount=0;
let highResRestPositions=null;   // CPU: high-res rest positions
let highResIdxArr=null;          // CPU: high-res index array
let highResRestNormals=null;     // CPU: high-res rest normals
let nearestProxyIdx=null;        // CPU: nearest proxy vertex for each high-res vertex
// Spatial hash for fast surface projection
let _hashGrid=24, _hashBmin=null, _hashGs=null, _hashCells=null, _vertTris=null;
let pineappleMesh=null;
let proxyWireMesh=null;
let showProxyWire=false;
let modelMinY=-1.5,modelMaxY=1.5; // Y range of proxy model (for delta field)
let voxBMin=[0,0,0],voxGS=[0.1,0.1,0.1],VOX_TOTAL=64*64*64; // 64³ voxel grid

// Circular band sliders
$('sl_tr').oninput=e=>{
  TUBE_RADIUS=+e.target.value;$('sv_tr').textContent=TUBE_RADIUS.toFixed(3);
  for(const b of circularBands)b.tubeRadius=TUBE_RADIUS;
  circVisDirty=true;
};
$('sl_rs').oninput=e=>{
  TUBE_RADIAL_SEGS=+e.target.value|0;$('sv_rs').textContent=TUBE_RADIAL_SEGS;
  circVisDirty=true;
};

// Lighting sliders
$('sl_ai').oninput=e=>{const v=+e.target.value;ambientLight.intensity=v;$('sv_ai').textContent=v.toFixed(2);};
$('sl_di').oninput=e=>{const v=+e.target.value;dirLight.intensity=v;$('sv_di').textContent=v.toFixed(2);};
$('sl_dx').oninput=e=>{const v=+e.target.value;dirLight.position.x=v;$('sv_dx').textContent=v.toFixed(1);};
$('sl_dy').oninput=e=>{const v=+e.target.value;dirLight.position.y=v;$('sv_dy').textContent=v.toFixed(1);};
$('sl_dz').oninput=e=>{const v=+e.target.value;dirLight.position.z=v;$('sv_dz').textContent=v.toFixed(1);};

// ══════.? Circular Band (Tube) Parameters ══════.?
const MAX_CIRC_BANDS = 64;
const circularBands = [];          // {planeOrigin, planeNormal, tubeRadius}
const circBandVisuals = [];        // visual data per circular band
let TUBE_RADIUS = 0.018;           // tube cross-section radius
let TUBE_RADIAL_SEGS = 12;         // subdivisions around tube circumference
let TUBE_RING_SEGS = 192;          // subdivisions along band length
const CIRC_BINS = 64;              // angle bins for center polyline

// ── Ribbon mesh (PBR: copy proxy triangles in band .?offset for thickness) ──

// ══════.?Circular Band (Tube) add/remove ══════.?
function addCircularBand(origin, normal){
  if(circularBands.length>=MAX_CIRC_BANDS){console.warn('达到最大圆皮筋数');return;}
  const nl=Math.sqrt(normal[0]**2+normal[1]**2+normal[2]**2);
  const nn=[normal[0]/nl,normal[1]/nl,normal[2]/nl];
  const band={
    planeOrigin:[...origin],
    planeNormal:[...nn],
    tubeRadius:TUBE_RADIUS,
  };
  circularBands.push(band);
  circBandVisuals.push({});
  circVisDirty=true;
  console.log('🟤 圆皮筋 #'+circularBands.length+' added at ('+origin.map(v=>v.toFixed(2)).join(',')+') normal=['+nn.map(v=>v.toFixed(2)).join(',')+'] r='+TUBE_RADIUS.toFixed(4));
}
function removeCircularBand(){
  if(circularBands.length===0)return;
  circularBands.pop();
  circBandVisuals.pop();
  circVisDirty=true;
  // Immediately hide if last one removed
  if(circularBands.length===0&&_circSharedMesh){
    _circSharedMesh.geometry.setDrawRange(0,0);_circSharedMesh.visible=false;
  }
}
function removeAllCircularBands(){
  while(circularBands.length>0){circularBands.pop();circBandVisuals.pop();}
  circVisDirty=true;
  if(_circSharedMesh){_circSharedMesh.geometry.setDrawRange(0,0);_circSharedMesh.visible=false;}
}

// ══════.?Model Loading (dual: proxy + high-res) ══════.?
let loaded=false;

async function loadModel(name, doProcess, refTransform=null){
  const loader=new GLTFLoader();
  const gltf=await new Promise((res,rej)=>loader.load(name,res,undefined,rej));
  let srcMesh=null;gltf.scene.traverse(c=>{if(c.isMesh&&!srcMesh)srcMesh=c;});
  if(!srcMesh)throw new Error('No mesh in '+name);
  const srcGeo=srcMesh.geometry;
  srcGeo.computeBoundingBox();
  const cen=new THREE.Vector3();srcGeo.boundingBox.getCenter(cen);
  const siz=new THREE.Vector3();srcGeo.boundingBox.getSize(siz);
  const sc=refTransform?refTransform.sc:(3.0/siz.y);
  const offX=refTransform?refTransform.cen.x:cen.x;
  const offY=refTransform?refTransform.cen.y:cen.y;
  const offZ=refTransform?refTransform.cen.z:cen.z;
  const pa=srcGeo.attributes.position.array;
  const vc=srcGeo.attributes.position.count;
  const pos=new Float32Array(vc*3);
  for(let i=0;i<vc;i++){pos[i*3]=(pa[i*3]-offX)*sc;pos[i*3+1]=(pa[i*3+1]-offY)*sc;pos[i*3+2]=(pa[i*3+2]-offZ)*sc;}
  const idxArr=srcGeo.index?new Uint32Array(srcGeo.index.array):(()=>{const a=new Uint32Array(vc);for(let i=0;i<vc;i++)a[i]=i;return a;})();
  // Extract original normals from GLB (uniform scaling preserves direction)
  let origNormals=null;
  if(srcGeo.attributes.normal){
    const na=srcGeo.attributes.normal.array;
    origNormals=new Float32Array(vc*3);
    for(let i=0;i<vc;i++){
      origNormals[i*3]=na[i*3];origNormals[i*3+1]=na[i*3+1];origNormals[i*3+2]=na[i*3+2];
    }
  }
  return{pos,idxArr,srcGeo,srcMesh,transform:{cen:{x:offX,y:offY,z:offZ},sc},origNormals};
}

async function loadModels(){
  // Load proxy (small mesh for PBD)
  const proxyResult=await loadModel('pineapple_py.glb?t='+Date.now(), true);
  // Load high-res (display mesh) .?use proxy's transform for alignment
  const hr=await loadModel('pineapple.glb', false, proxyResult.transform);
  const srcGeo=hr.srcGeo;const hrPos=hr.pos;const hrIdx=hr.idxArr;
  const srcMesh=hr.srcMesh;

  // ── Proxy setup ──
  proxyVertexCount=proxyResult.pos.length/3;
  proxyTriCount=proxyResult.idxArr.length/3;
  proxyRestPositions=new Float32Array(proxyResult.pos);
  proxyCurPositions=new Float32Array(proxyResult.pos);
  proxyIdxArr=proxyResult.idxArr;
  // Compute proxy rest normals (gradient directions for volume constraint)
  const pvc=proxyVertexCount;
  proxyRestNormals=new Float32Array(pvc*3);
  {
    const grad=new Float32Array(pvc*3);
    for(let i=0;i<proxyIdxArr.length;i+=3){
      const ai=proxyIdxArr[i]*3,bi=proxyIdxArr[i+1]*3,ci=proxyIdxArr[i+2]*3;
      const ax=proxyRestPositions[ai],ay=proxyRestPositions[ai+1],az=proxyRestPositions[ai+2];
      const bx=proxyRestPositions[bi],by=proxyRestPositions[bi+1],bz=proxyRestPositions[bi+2];
      const cx=proxyRestPositions[ci],cy=proxyRestPositions[ci+1],cz=proxyRestPositions[ci+2];
      grad[ai]+=(by*cz-bz*cy)/6;grad[ai+1]+=(bz*cx-bx*cz)/6;grad[ai+2]+=(bx*cy-by*cx)/6;
      grad[bi]+=(cy*az-cz*ay)/6;grad[bi+1]+=(cz*ax-cx*az)/6;grad[bi+2]+=(cx*ay-cy*ax)/6;
      grad[ci]+=(ay*bz-az*by)/6;grad[ci+1]+=(az*bx-ax*bz)/6;grad[ci+2]+=(ax*by-ay*bx)/6;
    }
    for(let i=0;i<pvc;i++){
      const i3=i*3;
      let gx=grad[i3],gy=grad[i3+1],gz=grad[i3+2];
      const px=proxyRestPositions[i3],py=proxyRestPositions[i3+1],pz=proxyRestPositions[i3+2];
      if(px*gx+py*gy+pz*gz<0){gx=-gx;gy=-gy;gz=-gz;}
      const gm=Math.sqrt(gx*gx+gy*gy+gz*gz);
      if(gm>1e-9){proxyRestNormals[i3]=gx/gm;proxyRestNormals[i3+1]=gy/gm;proxyRestNormals[i3+2]=gz/gm;}
    }
  }

  // Compute proxy rest volume + surface area
  restVolume=0;restSurfaceArea=0;
  for(let t=0;t<proxyIdxArr.length;t+=3){
    const ai=proxyIdxArr[t]*3,bi=proxyIdxArr[t+1]*3,ci=proxyIdxArr[t+2]*3;
    const ax=proxyRestPositions[ai],ay=proxyRestPositions[ai+1],az=proxyRestPositions[ai+2];
    const bx=proxyRestPositions[bi],by=proxyRestPositions[bi+1],bz=proxyRestPositions[bi+2];
    const cx=proxyRestPositions[ci],cy=proxyRestPositions[ci+1],cz=proxyRestPositions[ci+2];
    restVolume+=(ax*(by*cz-bz*cy)+ay*(bz*cx-bx*cz)+az*(bx*cy-by*cx))/6;
    const abx=bx-ax,aby=by-ay,abz=bz-az,acx=cx-ax,acy=cy-ay,acz=cz-az;
    restSurfaceArea+=0.5*Math.sqrt((aby*acz-abz*acy)**2+(abz*acx-abx*acz)**2+(abx*acy-aby*acx)**2);
  }
  restVolume=Math.abs(restVolume);
  H.vcount.textContent=proxyVertexCount.toLocaleString();
  console.log('Proxy model:',proxyVertexCount.toLocaleString(),'verts,',Math.round(proxyTriCount).toLocaleString(),'tris');
  console.log('   restVolume:',restVolume.toFixed(4),'restSurfaceArea:',restSurfaceArea.toFixed(2));

  // ── High-res setup ──
  highResCount=hrPos.length/3;
  highResRestPositions=new Float32Array(hrPos);
  highResIdxArr=hrIdx;
  highResRestNormals=hr.origNormals;
  H.hcount.textContent=highResCount.toLocaleString();

  // Compute Y range for delta field (from proxy model)
  modelMinY=Infinity;modelMaxY=-Infinity;
  for(let i=0;i<proxyVertexCount;i++){const y=proxyRestPositions[i*3+1];if(y<modelMinY)modelMinY=y;if(y>modelMaxY)modelMaxY=y;}
  if(!isFinite(modelMinY)){modelMinY=-1.5;modelMaxY=1.5;}
  console.log('📏 代理Y范围:',modelMinY.toFixed(3),'~',modelMaxY.toFixed(3));

  // Compute voxel grid bounds (3D bounding box, expanded 5%)
  const vpad=0.05;
  voxBMin=[Infinity,Infinity,Infinity];const vBMax=[-Infinity,-Infinity,-Infinity];
  for(let i=0;i<proxyVertexCount;i++){for(let k=0;k<3;k++){const v=proxyRestPositions[i*3+k];if(v<voxBMin[k])voxBMin[k]=v;if(v>vBMax[k])vBMax[k]=v;}}
  for(let k=0;k<3;k++){const r=vBMax[k]-voxBMin[k];voxBMin[k]-=r*vpad;vBMax[k]+=r*vpad;voxGS[k]=(vBMax[k]-voxBMin[k])/64;}
  console.log('📦 体素网格: bmin=('+voxBMin.map(v=>v.toFixed(2)).join(',')+') gs=('+voxGS.map(v=>v.toFixed(3)).join(',')+')');

  // ── CPU nearest-proxy with spatial hash ──
  nearestProxyIdx=new Uint32Array(highResCount);
  const tHash=performance.now();
  // Build 3D spatial hash grid for proxy vertices .?make global for fast projection
  _hashGrid=24;
  _hashBmin=[Infinity,Infinity,Infinity];const _hbmax=[-Infinity,-Infinity,-Infinity];
  for(let i=0;i<proxyVertexCount;i++){
    for(let k=0;k<3;k++){const v=proxyRestPositions[i*3+k];if(v<_hashBmin[k])_hashBmin[k]=v;if(v>_hbmax[k])_hbmax[k]=v;}
  }
  _hashGs=[(_hbmax[0]-_hashBmin[0])/_hashGrid+1e-6,(_hbmax[1]-_hashBmin[1])/_hashGrid+1e-6,(_hbmax[2]-_hashBmin[2])/_hashGrid+1e-6];
  _hashCells=Array.from({length:_hashGrid*_hashGrid*_hashGrid},()=>[]);
  for(let i=0;i<proxyVertexCount;i++){
    const ix=Math.min(_hashGrid-1,Math.floor((proxyRestPositions[i*3]-_hashBmin[0])/_hashGs[0]));
    const iy=Math.min(_hashGrid-1,Math.floor((proxyRestPositions[i*3+1]-_hashBmin[1])/_hashGs[1]));
    const iz=Math.min(_hashGrid-1,Math.floor((proxyRestPositions[i*3+2]-_hashBmin[2])/_hashGs[2]));
    _hashCells[(ix*_hashGrid+iy)*_hashGrid+iz].push(i);
  }
  // Build vertex→triangle adjacency
  _vertTris=Array.from({length:proxyVertexCount},()=>[]);
  for(let t=0;t<proxyIdxArr.length;t+=3){
    _vertTris[proxyIdxArr[t]].push(t/3);
    _vertTris[proxyIdxArr[t+1]].push(t/3);
    _vertTris[proxyIdxArr[t+2]].push(t/3);
  }
  // For each high-res vertex, search 27 neighboring cells
  let fallbackCount=0;
  for(let i=0;i<highResCount;i++){
    const hx=highResRestPositions[i*3],hy=highResRestPositions[i*3+1],hz=highResRestPositions[i*3+2];
    const ix=Math.min(_hashGrid-1,Math.max(0,Math.floor((hx-_hashBmin[0])/_hashGs[0])));
    const iy=Math.min(_hashGrid-1,Math.max(0,Math.floor((hy-_hashBmin[1])/_hashGs[1])));
    const iz=Math.min(_hashGrid-1,Math.max(0,Math.floor((hz-_hashBmin[2])/_hashGs[2])));
    let bestD=Infinity,bestJ=0;
    for(let radius=1;radius<=_hashGrid&&bestD===Infinity;radius++){
      for(let dx=-radius;dx<=radius;dx++){for(let dy=-radius;dy<=radius;dy++){for(let dz=-radius;dz<=radius;dz++){
        if(Math.abs(dx)<radius&&Math.abs(dy)<radius&&Math.abs(dz)<radius)continue;
        const cx=ix+dx,cy=iy+dy,cz=iz+dz;
        if(cx<0||cx>=_hashGrid||cy<0||cy>=_hashGrid||cz<0||cz>=_hashGrid)continue;
        for(const j of _hashCells[(cx*_hashGrid+cy)*_hashGrid+cz]){
          const px=proxyRestPositions[j*3],py=proxyRestPositions[j*3+1],pz=proxyRestPositions[j*3+2];
          const d=(hx-px)**2+(hy-py)**2+(hz-pz)**2;
          if(d<bestD){bestD=d;bestJ=j;}
        }
      }}}
      if(radius>1&&bestD<Infinity)fallbackCount++;
    }
    nearestProxyIdx[i]=bestJ;
  }
  console.log('🔗 CPU最近邻映射:',(performance.now()-tHash).toFixed(0),'ms (grid',_hashGrid+'³, fallback:',fallbackCount+'/'+highResCount+')');

  // Create Three.js high-res mesh
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(hrPos),3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(new Float32Array(highResRestNormals),3));
  if(srcGeo.attributes.uv)geo.setAttribute('uv',srcGeo.attributes.uv.clone());
  geo.setIndex(new THREE.BufferAttribute(hrIdx,1));
  const mat=srcMesh.material||new THREE.MeshStandardMaterial({color:'#cc9944',roughness:0.6,metalness:0.0});
  pineappleMesh=new THREE.Mesh(geo,mat);
  scene.add(pineappleMesh);

  // Proxy wireframe overlay
  const edgeMap=new Map();
  for(let t=0;t<proxyIdxArr.length;t+=3){
    for(let e=0;e<3;e++){
      const a=proxyIdxArr[t+e],b=proxyIdxArr[t+(e+1)%3];
      const key=Math.min(a,b)*proxyVertexCount+Math.max(a,b);
      if(!edgeMap.has(key))edgeMap.set(key,[a,b]);
    }
  }
  const edgeIdx=new Uint32Array(edgeMap.size*2);let ei=0;

function mkBuf(size,usage,label){return device.createBuffer({size,usage,label});}

// ═══════ GPU Circular Band (Tube) Shaders ═══════

// Shader T1: Triangle-plane intersection for center polyline (single plane, radial offset by tubeRadius)
const circCutBinsCS=device.createShaderModule({label:'circCutBins',code:`
struct P{triCount:u32,vc:u32,ox:f32,oy:f32,oz:f32,nx:f32,ny:f32,nz:f32,tubeR:f32,cx:f32,cy:f32,cz:f32}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>idx:array<u32>;
@group(0)@binding(2)var<storage,read_write>binRX:array<atomic<u32>>;
@group(0)@binding(3)var<storage,read_write>binRY:array<atomic<u32>>;
@group(0)@binding(4)var<storage,read_write>binRZ:array<atomic<u32>>;
@group(0)@binding(5)var<storage,read_write>binC:array<atomic<u32>>;
@group(0)@binding(6)var<uniform>p:P;

const FIXED=1048576.0;
const BINS=64u;

fn addToBin(px:f32,py:f32,pz:f32){
  var ux_:f32;var uy_:f32;var uz_:f32;
  if(abs(p.nx)<0.9){ux_=1.0;uy_=0.0;uz_=0.0;}else{ux_=0.0;uy_=0.0;uz_=1.0;}
  let du=ux_*p.nx+uy_*p.ny+uz_*p.nz;ux_-=du*p.nx;uy_-=du*p.ny;uz_-=du*p.nz;
  let ul=sqrt(ux_*ux_+uy_*uy_+uz_*uz_);ux_/=ul;uy_/=ul;uz_/=ul;
  let vx=p.ny*uz_-p.nz*uy_;let vy=p.nz*ux_-p.nx*uz_;let vz=p.nx*uy_-p.ny*ux_;
  let rx=px-p.cx;let ry=py-p.cy;let rz=pz-p.cz;
  let ru=rx*ux_+ry*uy_+rz*uz_;let rv=rx*vx+ry*vy+rz*vz;
  let ang=atan2(rv,ru);
  let bi=u32(floor((ang+3.14159265)/6.28318531*64.0))%BINS;
  atomicAdd(&binRX[bi],u32((px+4.0)*FIXED));
  atomicAdd(&binRY[bi],u32((py+4.0)*FIXED));
  atomicAdd(&binRZ[bi],u32((pz+4.0)*FIXED));
  atomicAdd(&binC[bi],1u);
}

@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>){
  let ti=gid.x;if(ti>=p.triCount){return;}
  let i0=idx[ti*3u];let i1=idx[ti*3u+1u];let i2=idx[ti*3u+2u];
  // Offset vertices radially by tubeRadius for centerline
  let rd0=normalize(pos[i0].xyz-vec3(p.cx,p.cy,p.cz));
  let rd1=normalize(pos[i1].xyz-vec3(p.cx,p.cy,p.cz));
  let rd2=normalize(pos[i2].xyz-vec3(p.cx,p.cy,p.cz));
  let v0=pos[i0].xyz+rd0*p.tubeR;
  let v1=pos[i1].xyz+rd1*p.tubeR;
  let v2=pos[i2].xyz+rd2*p.tubeR;
  // Signed distances to band plane
  let ox=p.ox;let oy=p.oy;let oz=p.oz;
  let nx=p.nx;let ny=p.ny;let nz=p.nz;
  let d0=(v0.x-ox)*nx+(v0.y-oy)*ny+(v0.z-oz)*nz;
  let d1=(v1.x-ox)*nx+(v1.y-oy)*ny+(v1.z-oz)*nz;
  let d2=(v2.x-ox)*nx+(v2.y-oy)*ny+(v2.z-oz)*nz;
  let eps=1e-7;
  let s0=select(0,select(1,-1,d0>eps),abs(d0)>eps);
  let s1=select(0,select(1,-1,d1>eps),abs(d1)>eps);
  let s2=select(0,select(1,-1,d2>eps),abs(d2)>eps);
  if(s0==s1&&s1==s2&&s0!=0){return;}
  if(s0==0){addToBin(v0.x,v0.y,v0.z);}
  if(s1==0){addToBin(v1.x,v1.y,v1.z);}
  if(s2==0){addToBin(v2.x,v2.y,v2.z);}
  if((d0>eps&&d1<-eps)||(d0<-eps&&d1>eps)){
    let t=d0/(d0-d1);
    addToBin(v0.x+t*(v1.x-v0.x),v0.y+t*(v1.y-v0.y),v0.z+t*(v1.z-v0.z));
  }
  if((d1>eps&&d2<-eps)||(d1<-eps&&d2>eps)){
    let t=d1/(d1-d2);
    addToBin(v1.x+t*(v2.x-v1.x),v1.y+t*(v2.y-v1.y),v1.z+t*(v2.z-v1.z));
  }
  if((d2>eps&&d0<-eps)||(d2<-eps&&d0>eps)){
    let t=d2/(d2-d0);
    addToBin(v2.x+t*(v0.x-v2.x),v2.y+t*(v0.y-v2.y),v2.z+t*(v0.z-v2.z));
  }
}
`});

// Shader T2: Bin averaging → compact center polyline (64 vec4 points)
const circResolveCS=device.createShaderModule({label:'circResolve',code:`
struct P{ringSegs:u32}
@group(0)@binding(0)var<storage,read>binRX:array<u32>;
@group(0)@binding(1)var<storage,read>binRY:array<u32>;
@group(0)@binding(2)var<storage,read>binRZ:array<u32>;
@group(0)@binding(3)var<storage,read>binC:array<u32>;
@group(0)@binding(4)var<storage,read_write>polyPts:array<vec4<f32>>;
@group(0)@binding(5)var<uniform>p:P;
const FIXED=1048576.0;
const BINS=64u;
@compute@workgroup_size(64)fn main(@builtin(local_invocation_id)lid:vec3<u32>){
  let base=lid.x;
  let sx=binRX[base];let sy=binRY[base];let sz=binRZ[base];let c=binC[base];
  if(c>0u){
    let avgX=f32(sx)/FIXED/f32(c)-4.0;
    let avgY=f32(sy)/FIXED/f32(c)-4.0;
    let avgZ=f32(sz)/FIXED/f32(c)-4.0;
    polyPts[base]=vec4(avgX,avgY,avgZ,1.0);
  }else{
    polyPts[base]=vec4(0.0,0.0,0.0,0.0);
  }
}
`});

// Shader T3: Build tube mesh from center polyline (triangle list, no tangents needed)
const circBuildTubeCS=device.createShaderModule({label:'circBuildTube',code:`
struct P{ringSegs:u32,radialSegs:u32,tubeR:f32,nx:f32,ny:f32,nz:f32,cx:f32,cy:f32,cz:f32}
@group(0)@binding(0)var<storage,read>polyPts:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read_write>outPos:array<f32>;
@group(0)@binding(2)var<storage,read_write>outNorm:array<f32>;
@group(0)@binding(3)var<storage,read_write>outUV:array<f32>;
@group(0)@binding(4)var<uniform>p:P;
const BINS=64u;
var<workgroup>wsX:array<f32,256>;
var<workgroup>wsY:array<f32,256>;
var<workgroup>wsZ:array<f32,256>;
var<workgroup>sX:array<f32,256>;
var<workgroup>sY:array<f32,256>;
var<workgroup>sZ:array<f32,256>;

fn writeVert(vi:u32,x:f32,y:f32,z:f32,nx_:f32,ny_:f32,nz_:f32,u_:f32,v_:f32){
  let i3=vi*3u;
  outPos[i3]=x;outPos[i3+1u]=y;outPos[i3+2u]=z;
  outNorm[i3]=nx_;outNorm[i3+1u]=ny_;outNorm[i3+2u]=nz_;
  outUV[vi*2u]=u_;outUV[vi*2u+1u]=v_;
}

fn fakeNormal(px:f32,py:f32,pz:f32)->vec3<f32>{
  let dx=px-p.cx;let dy=py-p.cy;let dz=pz-p.cz;
  let len=sqrt(dx*dx+dy*dy+dz*dz)+1e-9;
  return vec3(dx/len,dy/len,dz/len);
}
// Rodrigues: rotate V toward tgt around cross(V,tgt), by (angle_between * strength)
fn rotateTowards(V:vec3<f32>,tgt:vec3<f32>,strength:f32)->vec3<f32>{
  let crs=cross(V,tgt);
  let crsLen=sqrt(dot(crs,crs));
  if(crsLen<1e-9){return V;} // parallel — nothing to rotate
  let K=crs/crsLen;
  let cosMax=clamp(dot(V,tgt),-1.0,1.0);
  let angle=acos(cosMax)*strength;
  let s=sin(angle);let c=cos(angle);
  return V*c+cross(K,V)*s;
}

@compute@workgroup_size(256)fn main(@builtin(local_invocation_id)lid:vec3<u32>){
  let N=p.ringSegs;let R=p.radialSegs;let r=p.tubeR;
  let bnX=p.nx;let bnY=p.ny;let bnZ=p.nz; // band plane normal (up direction for tube)

  // Phase 1: resample 64 bins → N ring points
  for(var idx=lid.x;idx<N;idx+=256u){
    let frac=f32(idx)/f32(N)*64.0;
    let b0=u32(floor(frac))%BINS;let b1=(b0+1u)%BINS;let t=frac-f32(b0);
    let pt0=polyPts[b0];let pt1=polyPts[b1];
    var x0=pt0.x;var y0=pt0.y;var z0=pt0.z;
    var x1=pt1.x;var y1=pt1.y;var z1=pt1.z;
    if(pt0.w<0.5){for(var d=1u;d<64u;d++){let nb=(b0+BINS-d)%BINS;let pt=polyPts[nb];if(pt.w>0.5){x0=pt.x;y0=pt.y;z0=pt.z;break;}}}
    if(pt1.w<0.5){for(var d=1u;d<64u;d++){let nb=(b1+d)%BINS;let pt=polyPts[nb];if(pt.w>0.5){x1=pt.x;y1=pt.y;z1=pt.z;break;}}}
    wsX[idx]=mix(x0,x1,t);wsY[idx]=mix(y0,y1,t);wsZ[idx]=mix(z0,z1,t);
  }
  workgroupBarrier();

  // Phase 1.5: smooth centerline — remove triangle-facet noise, keep large-scale shape
  // Weighted average over ±2 neighbors, 2 passes. Band feels "pulled tight".
  for(var sp=0u;sp<3u;sp++){
    for(var idx=lid.x;idx<N;idx+=256u){
      var sx_:f32=0.0;var sy_:f32=0.0;var sz_:f32=0.0;var sw:f32=0.0;
      for(var di:i32=-2;di<=2;di++){
        let ni=u32((i32(idx)+di+i32(N))%i32(N));
        let w=3.0-f32(abs(di)); // weights: 1,2,3,2,1
        sx_+=wsX[ni]*w;sy_+=wsY[ni]*w;sz_+=wsZ[ni]*w;sw+=w;
      }
      sX[idx]=sx_/sw;sY[idx]=sy_/sw;sZ[idx]=sz_/sw;
    }
    workgroupBarrier();
    for(var idx=lid.x;idx<N;idx+=256u){wsX[idx]=sX[idx];wsY[idx]=sY[idx];wsZ[idx]=sZ[idx];}
    workgroupBarrier();
  }

  // Phase 2: build tube mesh (each thread = 1 ring segment)
  let vertsPerRing=R*6u; // 6 vertices per radial quad (2 triangles)
  for(var seg=lid.x;seg<N;seg+=256u){
    let j=(seg+1u)%N;
    let cx=wsX[seg];let cy=wsY[seg];let cz=wsZ[seg];
    let nx_=wsX[j];let ny_=wsY[j];let nz_=wsZ[j];

    // Tangent along curve
    var tx=nx_-cx;var ty=ny_-cy;var tz=nz_-cz;
    let tl=sqrt(tx*tx+ty*ty+tz*tz);
    if(tl<1e-6){tx=1.0;ty=0.0;tz=0.0;}else{tx/=tl;ty/=tl;tz/=tl;}

    // Build basis: use band normal as "up", compute N = cross(up, tangent), B = cross(tangent, N)
    // N is horizontal (perpendicular to both up and tangent)
    var Nx=bnY*tz-bnZ*ty;var Ny=bnZ*tx-bnX*tz;var Nz=bnX*ty-bnY*tx;
    let Nl=sqrt(Nx*Nx+Ny*Ny+Nz*Nz);
    if(Nl<1e-6){
      // Tangent parallel to band normal — pick arbitrary perpendicular
      if(abs(bnX)<0.9){Nx=0.0;Ny=-bnZ;Nz=bnY;}else{Nx=-bnZ;Ny=0.0;Nz=bnX;}
      let nnl=sqrt(Nx*Nx+Ny*Ny+Nz*Nz);Nx/=nnl;Ny/=nnl;Nz/=nnl;
    }else{Nx/=Nl;Ny/=Nl;Nz/=Nl;}
    // B = cross(tangent, N) — this is close to band normal for horizontal bands
    let Bx=ty*Nz-tz*Ny;let By=tz*Nx-tx*Nz;let Bz=tx*Ny-ty*Nx;

    // Generate ring vertices
    let baseV=seg*vertsPerRing;
    let uv_=f32(seg)/f32(N);
    let uvj=f32(j)/f32(N);

    for(var ri=0u;ri<R;ri++){
      let rj=(ri+1u)%R;
      let a0=f32(ri)/f32(R)*6.283185307;
      let a1=f32(rj)/f32(R)*6.283185307;
      let cos0=cos(a0);let sin0=sin(a0);
      let cos1=cos(a1);let sin1=sin(a1);

      // Current ring points
      let p0x=cx+r*(cos0*Nx+sin0*Bx);
      let p0y=cy+r*(cos0*Ny+sin0*By);
      let p0z=cz+r*(cos0*Nz+sin0*Bz);
      let p1x=cx+r*(cos1*Nx+sin1*Bx);
      let p1y=cy+r*(cos1*Ny+sin1*By);
      let p1z=cz+r*(cos1*Nz+sin1*Bz);

      // Next ring points (need basis at next ring)
      // Recompute tangent at next ring
      let nxt=wsX[(j+1u)%N];let nyt=wsY[(j+1u)%N];let nzt=wsZ[(j+1u)%N];
      var txj=nxt-nx_;var tyj=nyt-ny_;var tzj=nzt-nz_;
      let tlj=sqrt(txj*txj+tyj*tyj+tzj*tzj);
      if(tlj<1e-6){txj=tx;tyj=ty;tzj=tz;}else{txj/=tlj;tyj/=tlj;tzj/=tlj;}
      var Nxj=bnY*tzj-bnZ*tyj;var Nyj=bnZ*txj-bnX*tzj;var Nzj=bnX*tyj-bnY*txj;
      let Nlj=sqrt(Nxj*Nxj+Nyj*Nyj+Nzj*Nzj);
      if(Nlj<1e-6){
        if(abs(bnX)<0.9){Nxj=0.0;Nyj=-bnZ;Nzj=bnY;}else{Nxj=-bnZ;Nyj=0.0;Nzj=bnX;}
        let nnl=sqrt(Nxj*Nxj+Nyj*Nyj+Nzj*Nzj);Nxj/=nnl;Nyj/=nnl;Nzj/=nnl;
      }else{Nxj/=Nlj;Nyj/=Nlj;Nzj/=Nlj;}
      let Bxj=tyj*Nzj-tzj*Nyj;let Byj=tzj*Nxj-txj*Nzj;let Bzj=txj*Nyj-tyj*Nxj;

      let q0x=nx_+r*(cos0*Nxj+sin0*Bxj);
      let q0y=ny_+r*(cos0*Nyj+sin0*Byj);
      let q0z=nz_+r*(cos0*Nzj+sin0*Bzj);
      let q1x=nx_+r*(cos1*Nxj+sin1*Bxj);
      let q1y=ny_+r*(cos1*Nyj+sin1*Byj);
      let q1z=nz_+r*(cos1*Nzj+sin1*Bzj);

      // ── Decompose: cross-section = real (round), tangent = fake (smooth) ──
      // R provides tube roundness (⊥T).  F·T provides along-band centroid-smoothness.
      // H = normalize(R + dot(F,T)*T) — both properties simultaneously, no trade-off.
      let Tvec=vec3(tx,ty,tz);let Tjvec=vec3(txj,tyj,tzj);
      // real tube normals (cross-section plane only, gives round profile)
      let R00=vec3(cos0*Nx+sin0*Bx,cos0*Ny+sin0*By,cos0*Nz+sin0*Bz);
      let R01=vec3(cos1*Nx+sin1*Bx,cos1*Ny+sin1*By,cos1*Nz+sin1*Bz);
      let R10=vec3(cos0*Nxj+sin0*Bxj,cos0*Nyj+sin0*Byj,cos0*Nzj+sin0*Bzj);
      let R11=vec3(cos1*Nxj+sin1*Bxj,cos1*Nyj+sin1*Byj,cos1*Nzj+sin1*Bzj);
      // fake normals (toward centroid, gives smooth along-band)
      let F00=fakeNormal(p0x,p0y,p0z);let F01=fakeNormal(p1x,p1y,p1z);
      let F10=fakeNormal(q0x,q0y,q0z);let F11=fakeNormal(q1x,q1y,q1z);
      // combine: R (cross-section) + F's tangent projection (along-band)
      let n00=normalize(R00+dot(F00,Tvec)*Tvec);
      let n01=normalize(R01+dot(F01,Tvec)*Tvec);
      let n10=normalize(R10+dot(F10,Tjvec)*Tjvec);
      let n11=normalize(R11+dot(F11,Tjvec)*Tjvec);

      let v0=f32(ri)/f32(R);let v1=f32(rj)/f32(R);

      // Triangle 1: (seg,ri)-(seg,ri+1)-(seg+1,ri)
      let vi=baseV+ri*6u;
      writeVert(vi,   p0x,p0y,p0z, n00.x,n00.y,n00.z, uv_,v0);
      writeVert(vi+1u,p1x,p1y,p1z, n01.x,n01.y,n01.z, uv_,v1);
      writeVert(vi+2u,q0x,q0y,q0z, n10.x,n10.y,n10.z, uvj,v0);
      // Triangle 2: (seg,ri+1)-(seg+1,ri+1)-(seg+1,ri)
      writeVert(vi+3u,p1x,p1y,p1z, n01.x,n01.y,n01.z, uv_,v1);
      writeVert(vi+4u,q1x,q1y,q1z, n11.x,n11.y,n11.z, uvj,v1);
      writeVert(vi+5u,q0x,q0y,q0z, n10.x,n10.y,n10.z, uvj,v0);
    }
  }
}
`});

// Normals recompute (unchanged from original)
const normCS=device.createShaderModule({label:'norm',code:`
struct P{vc:u32}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>idx:array<u32>;
@group(0)@binding(2)var<storage,read>adjOff:array<u32>;
@group(0)@binding(3)var<storage,read>adjData:array<u32>;
@group(0)@binding(4)var<storage,read_write>norms:array<vec4<f32>>;
@group(0)@binding(5)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let vi=gid.x;if(vi>=p.vc){return;}
  let start=adjOff[vi];let end=adjOff[vi+1u];
  var sumN=vec3<f32>(0.0);
  for(var j=start;j<end;j++){
    let ti=adjData[j];
    let i0=idx[ti*3u];let i1=idx[ti*3u+1u];let i2=idx[ti*3u+2u];
    let p0=pos[i0].xyz;let p1=pos[i1].xyz;let p2=pos[i2].xyz;
    sumN+=normalize(cross(p1-p0,p2-p0));
  }
  let N=normalize(sumN);
  norms[vi]=vec4<f32>(N,0.0);
}
`});

const normUnpackCS=device.createShaderModule({label:'normUnpack',code:`
struct P{vc:u32}

// ══════.?Compute Pipeline Setup ══════.?
const S_R=(b,v)=>({binding:b,visibility:v,buffer:{type:'storage'}});
const S_RO=(b,v)=>({binding:b,visibility:v,buffer:{type:'read-only-storage'}});
const U_B=(b,v)=>({binding:b,visibility:v,buffer:{type:'uniform'}});
const CS=GPUShaderStage.COMPUTE;

function cpPipe(shader,entry,bgEntries,label){
  const bgl=device.createBindGroupLayout({entries:bgEntries});
  const layout=device.createPipelineLayout({bindGroupLayouts:[bgl]});
  return{pipe:device.createComputePipeline({layout,compute:{module:shader,entryPoint:entry}}),bgl,layout};
}

// ── Circular Band (Tube) pipelines ──
const circCutBinsPipe=cpPipe(circCutBinsCS,'main',[S_RO(0,CS),S_RO(1,CS),S_R(2,CS),S_R(3,CS),S_R(4,CS),S_R(5,CS),U_B(6,CS)],'circCutBins');
const circResolvePipe=cpPipe(circResolveCS,'main',[S_RO(0,CS),S_RO(1,CS),S_RO(2,CS),S_RO(3,CS),S_R(4,CS),U_B(5,CS)],'circResolve');
const circBuildTubePipe=cpPipe(circBuildTubeCS,'main',[S_RO(0,CS),S_R(1,CS),S_R(2,CS),S_R(3,CS),U_B(4,CS)],'circBuildTube');


// ── Circular Band (Tube) buffers ──
let _circBinRB,_circBinRYB,_circBinRZB,_circBinCB;  // 64 u32 atomics each
let _circPolyPtsB;           // 64 vec4 center polyline points
let _circSharedPosB,_circSharedNormB,_circSharedUVB; // shared tube mesh buffers
let _circSharedMesh;         // single Three.js mesh for all circular bands
let _circCutUB,_circResolveUB,_circBuildUB; // uniforms
const MAX_TUBE_VERTS=256*16*6; // ringSegs*radialSegs*6 (2 triangles per quad)
let WG,VWG;
let posA,posB,restB,idxB; // proxy mesh GPU buffers (required by cut shader)
let proxyRestNormB;       // proxy rest normals buffer
let staging;               // GPU readback staging
let circVisDirty=false;    // skip redundant GPU work when nothing changed

async function initGPU(){
  WG=Math.ceil(proxyVertexCount/256);VWG=Math.ceil(proxyTriCount/256);
  const VB=proxyVertexCount*4*4;
  posA=mkBuf(VB,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'posA');
  posB=mkBuf(VB,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'posB');
  restB=mkBuf(VB,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'rest');
  idxB=mkBuf(proxyIdxArr.length*4,GPUBufferUsage.INDEX|GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST,'idx');
  proxyRestNormB=mkBuf(proxyVertexCount*4*4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST,'proxyRestNorm');
  const pos4=new Float32Array(proxyVertexCount*4);const norm4=new Float32Array(proxyVertexCount*4);
  for(let i=0;i<proxyVertexCount;i++){pos4[i*4]=proxyRestPositions[i*3];pos4[i*4+1]=proxyRestPositions[i*3+1];pos4[i*4+2]=proxyRestPositions[i*3+2];pos4[i*4+3]=1;norm4[i*4]=proxyRestNormals[i*3];norm4[i*4+1]=proxyRestNormals[i*3+1];norm4[i*4+2]=proxyRestNormals[i*3+2];norm4[i*4+3]=0;}
  queue.writeBuffer(posA,0,pos4);queue.writeBuffer(posB,0,pos4);queue.writeBuffer(restB,0,pos4);
  queue.writeBuffer(idxB,0,proxyIdxArr);queue.writeBuffer(proxyRestNormB,0,norm4);
  _circBinRB=mkBuf(CIRC_BINS*4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'circBinRX');
  _circBinRYB=mkBuf(CIRC_BINS*4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'circBinRY');
  _circBinRZB=mkBuf(CIRC_BINS*4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'circBinRZ');
  _circBinCB=mkBuf(CIRC_BINS*4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'circBinC');
  _circPolyPtsB=mkBuf(CIRC_BINS*4*4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_SRC,'circPolyPts');
  const TVC=MAX_TUBE_VERTS;
  _circSharedPosB=mkBuf(MAX_CIRC_BANDS*TVC*3*4,GPUBufferUsage.STORAGE|GPUBufferUsage.VERTEX,'circSharedPos');
  _circSharedNormB=mkBuf(MAX_CIRC_BANDS*TVC*3*4,GPUBufferUsage.STORAGE|GPUBufferUsage.VERTEX,'circSharedNorm');
  _circSharedUVB=mkBuf(MAX_CIRC_BANDS*TVC*2*4,GPUBufferUsage.STORAGE|GPUBufferUsage.VERTEX,'circSharedUV');
  _circCutUB=mkBuf(48,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST,'circCutU');
  _circResolveUB=mkBuf(8,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST,'circResolveU');
  _circBuildUB=mkBuf(48,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST,'circBuildU');
  staging=mkBuf(Math.max(4,proxyVertexCount*4*4),GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ,'staging');
  console.log('GPU pipeline ready');
    // Create shared circular tube mesh (all circular bands in ONE draw call)
  _circSharedMesh=createCircSharedMesh();
}

// ── Shared circular tube mesh: one geometry, one material, all circular bands ──
function createCircSharedMesh(){
  const totalAll=MAX_CIRC_BANDS*MAX_TUBE_VERTS;
  const geo=new THREE.BufferGeometry();
  const posArr=new Float32Array(MAX_TUBE_VERTS*3);
  const normArr=new Float32Array(MAX_TUBE_VERTS*3);
  const uvArr=new Float32Array(MAX_TUBE_VERTS*2);
  const posAttr=new THREE.Float32BufferAttribute(posArr,3);
  const normAttr=new THREE.Float32BufferAttribute(normArr,3);
  const uvAttr=new THREE.Float32BufferAttribute(uvArr,2);
  const FAKE_COUNT=MAX_CIRC_BANDS*MAX_TUBE_VERTS;
  for(const a of[posAttr,normAttr])Object.defineProperty(a,'count',{get(){return FAKE_COUNT;},configurable:true});
  for(const a of[uvAttr])Object.defineProperty(a,'count',{get(){return FAKE_COUNT;},configurable:true});
  posAttr.needsUpdate=true;normAttr.needsUpdate=true;uvAttr.needsUpdate=true;
  geo.setAttribute('position',posAttr);
  geo.setAttribute('normal',normAttr);
  geo.setAttribute('uv',uvAttr);
  geo.setDrawRange(0,0);
  const mat=new THREE.MeshStandardMaterial({
    color:'#d4a017',roughness:0.45,metalness:0.0,
    side:THREE.DoubleSide,depthTest:true,depthWrite:true,
    polygonOffset:true, polygonOffsetFactor:1.0, polygonOffsetUnits:1.0,
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.renderOrder=2;mesh.frustumCulled=false;mesh.visible=false;
  mesh.castShadow=true;mesh.receiveShadow=false;
  geo.boundingSphere=new THREE.Sphere(new THREE.Vector3(0,0,0),100);
  geo.boundingBox=new THREE.Box3(new THREE.Vector3(-100,-100,-100),new THREE.Vector3(100,100,100));
  scene.add(mesh);
  // Replace GPU buffers with shared compute→render buffers
  const attrNames=['position','normal','uv'];
  const sharedBufs=[_circSharedPosB,_circSharedNormB,_circSharedUVB];
  for(let i=0;i<attrNames.length;i++){
    const attr=geo.attributes[attrNames[i]];
    renderer.backend.createAttribute(attr);
    const be=renderer.backend.get(attr);
    if(be)be.buffer=sharedBufs[i];
    attr.needsUpdate=false;
  }
  return mesh;
}

// Read back proxy positions from GPU for band visualization (CPU polyline)
async function readbackProxyPositions(srcBuf){
  const size=proxyVertexCount*4*4;
  const cmd=device.createCommandEncoder();
  cmd.copyBufferToBuffer(srcBuf===posA?posA:posB,0,staging,0,size);
  device.queue.submit([cmd.finish()]);
  await staging.mapAsync(GPUMapMode.READ);
  const arr=new Float32Array(staging.getMappedRange(0,size));
  for(let i=0;i<proxyVertexCount;i++){
    proxyCurPositions[i*3]=arr[i*4];
    proxyCurPositions[i*3+1]=arr[i*4+1];
    proxyCurPositions[i*3+2]=arr[i*4+2];
  }
  staging.unmap();
}

// ══════ GPU Circular Band (Tube) Visualization ══════
let _circCutU8=null,_circCutF32=null,_circBuildU8=null,_circBuildF32=null,_circResU32=null,_circZeroBins=null;

async function runGPUCircularBandVis(finalSrc){
  if(!_circBinRB){return 0;}
  const bc=circularBands.length;
  if(bc===0){
    if(_circSharedMesh){_circSharedMesh.geometry.setDrawRange(0,0);_circSharedMesh.visible=false;}
    return 0;
  }
  const t0=performance.now();
  const srcPos=(finalSrc===posA)?posA:posB;
  const ringSegs=TUBE_RING_SEGS, radialSegs=TUBE_RADIAL_SEGS;
  const totalVerts=ringSegs*radialSegs*6;

  // Pre-alloc reusable typed arrays
  if(!_circCutU8){_circCutU8=new Uint32Array(new ArrayBuffer(48));_circCutF32=new Float32Array(_circCutU8.buffer);}
  if(!_circBuildU8){_circBuildU8=new Uint32Array(new ArrayBuffer(48));_circBuildF32=new Float32Array(_circBuildU8.buffer);}
  if(!_circResU32){_circResU32=new Uint32Array(new ArrayBuffer(8));}
  if(!_circZeroBins){_circZeroBins=new Uint32Array(CIRC_BINS);}

  // Compute mesh centroid from rest positions
  let cx=0,cy=0,cz=0;
  for(let i=0;i<proxyVertexCount;i++){cx+=proxyRestPositions[i*3];cy+=proxyRestPositions[i*3+1];cz+=proxyRestPositions[i*3+2];}
  cx/=proxyVertexCount;cy/=proxyVertexCount;cz/=proxyVertexCount;

  for(let b=0;b<bc;b++){
    const band=circularBands[b];
    if(!band)continue;
    const enc=device.createCommandEncoder();

    // Clear bins
    queue.writeBuffer(_circBinRB,0,_circZeroBins);
    queue.writeBuffer(_circBinRYB,0,_circZeroBins);
    queue.writeBuffer(_circBinRZB,0,_circZeroBins);
    queue.writeBuffer(_circBinCB,0,_circZeroBins);

    // ── T1: Cut (triangle-plane intersection, radial offset by tubeRadius) ──
    _circCutU8[0]=proxyTriCount; _circCutU8[1]=proxyVertexCount;
    _circCutF32[2]=band.planeOrigin[0]; _circCutF32[3]=band.planeOrigin[1]; _circCutF32[4]=band.planeOrigin[2];
    _circCutF32[5]=band.planeNormal[0]; _circCutF32[6]=band.planeNormal[1]; _circCutF32[7]=band.planeNormal[2];
    _circCutF32[8]=band.tubeRadius;
    _circCutF32[9]=cx; _circCutF32[10]=cy; _circCutF32[11]=cz;
    queue.writeBuffer(_circCutUB,0,_circCutU8);
    const cutBG=device.createBindGroup({layout:circCutBinsPipe.bgl,entries:[
      {binding:0,resource:{buffer:srcPos}},{binding:1,resource:{buffer:idxB}},
      {binding:2,resource:{buffer:_circBinRB}},{binding:3,resource:{buffer:_circBinRYB}},
      {binding:4,resource:{buffer:_circBinRZB}},{binding:5,resource:{buffer:_circBinCB}},
      {binding:6,resource:{buffer:_circCutUB}}]});
    {const cp=enc.beginComputePass();cp.setPipeline(circCutBinsPipe.pipe);cp.setBindGroup(0,cutBG);cp.dispatchWorkgroups(VWG,1,1);cp.end();}

    // ── T2: Resolve (bin averaging → 64-point center polyline) ──
    _circResU32[0]=ringSegs; queue.writeBuffer(_circResolveUB,0,_circResU32);
    const resolveBG=device.createBindGroup({layout:circResolvePipe.bgl,entries:[
      {binding:0,resource:{buffer:_circBinRB}},{binding:1,resource:{buffer:_circBinRYB}},
      {binding:2,resource:{buffer:_circBinRZB}},{binding:3,resource:{buffer:_circBinCB}},
      {binding:4,resource:{buffer:_circPolyPtsB}},{binding:5,resource:{buffer:_circResolveUB}}]});
    {const cp=enc.beginComputePass();cp.setPipeline(circResolvePipe.pipe);cp.setBindGroup(0,resolveBG);cp.dispatchWorkgroups(1,1,1);cp.end();}

    // ── T3: Build tube mesh → direct to shared buffers at band offset ──
    _circBuildU8[0]=ringSegs; _circBuildU8[1]=radialSegs;
    _circBuildF32[2]=band.tubeRadius;
    _circBuildF32[3]=band.planeNormal[0]; _circBuildF32[4]=band.planeNormal[1]; _circBuildF32[5]=band.planeNormal[2];
    _circBuildF32[6]=cx; _circBuildF32[7]=cy; _circBuildF32[8]=cz;
    queue.writeBuffer(_circBuildUB,0,_circBuildU8);
    const bandVtxOff=b*totalVerts;
    const buildBG=device.createBindGroup({layout:circBuildTubePipe.bgl,entries:[
      {binding:0,resource:{buffer:_circPolyPtsB}},
      {binding:1,resource:{buffer:_circSharedPosB,offset:bandVtxOff*3*4,size:totalVerts*3*4}},
      {binding:2,resource:{buffer:_circSharedNormB,offset:bandVtxOff*3*4,size:totalVerts*3*4}},
      {binding:3,resource:{buffer:_circSharedUVB,offset:bandVtxOff*2*4,size:totalVerts*2*4}},
      {binding:4,resource:{buffer:_circBuildUB}}]});
    {const cp=enc.beginComputePass();cp.setPipeline(circBuildTubePipe.pipe);cp.setBindGroup(0,buildBG);cp.dispatchWorkgroups(1,1,1);cp.end();}

    device.queue.submit([enc.finish()]);
  }

  // Update shared circular mesh: one draw call for all circular bands
  if(_circSharedMesh){
    if(bc>0){
      _circSharedMesh.geometry.setDrawRange(0,bc*totalVerts);
      _circSharedMesh.visible=true;
    }else{
      _circSharedMesh.geometry.setDrawRange(0,0);
      _circSharedMesh.visible=false;
    }
  }

  const elapsed=performance.now()-t0;
  return elapsed;
}


// ══════.?Interaction ══════.?
let mdx=0,mdy=0,dragging=false,prevCamYaw=0,prevCamPitch=0;
let previewLine=null;

function ensurePreviewLine(){
  if(previewLine)return;
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(2048*3),3));
  geo.setDrawRange(0,0);
  const mat=new THREE.LineBasicMaterial({color:'#ffff00',transparent:true,opacity:0.6,depthTest:false,depthWrite:false});
  previewLine=new THREE.Line(geo,mat);
  previewLine.renderOrder=2;previewLine.frustumCulled=false;
  previewLine.visible=false;
  scene.add(previewLine);
}

// Raycast against proxy mesh (simple ray-sphere-like intersection using rest positions)
function raycastProxyMesh(origin,dir){
  // Use the proxy mesh triangles for precise hit detection
  let bestT=Infinity,bestPoint=null,bestNormal=null;
  for(let t=0;t<proxyIdxArr.length;t+=3){
    const ai=proxyIdxArr[t]*3,bi=proxyIdxArr[t+1]*3,ci=proxyIdxArr[t+2]*3;
    // Use current positions for raycast
    const pos=proxyRestPositions;
    const ax=pos[ai],ay=pos[ai+1],az=pos[ai+2];
    const bx=pos[bi],by=pos[bi+1],bz=pos[bi+2];
    const cx=pos[ci],cy=pos[ci+1],cz=pos[ci+2];
    // Möller-Trumbore
    const e1x=bx-ax,e1y=by-ay,e1z=bz-az;
    const e2x=cx-ax,e2y=cy-ay,e2z=cz-az;
    const hx=dir[1]*e2z-dir[2]*e2y,hy=dir[2]*e2x-dir[0]*e2z,hz=dir[0]*e2y-dir[1]*e2x;
    const a=e1x*hx+e1y*hy+e1z*hz;
    if(Math.abs(a)<1e-7)continue;
    const f=1/a;
    const sx=origin[0]-ax,sy=origin[1]-ay,sz=origin[2]-az;
    const u=f*(sx*hx+sy*hy+sz*hz);
    if(u<0||u>1)continue;
    const qx=sy*e1z-sz*e1y,qy=sz*e1x-sx*e1z,qz=sx*e1y-sy*e1x;
    const v=f*(dir[0]*qx+dir[1]*qy+dir[2]*qz);
    if(v<0||u+v>1)continue;
    const tt=f*(e2x*qx+e2y*qy+e2z*qz);
    if(tt>1e-6&&tt<bestT){
      bestT=tt;
      bestPoint=[origin[0]+dir[0]*tt,origin[1]+dir[1]*tt,origin[2]+dir[2]*tt];
      // Triangle normal
      const nx=e1y*e2z-e1z*e2y,ny=e1z*e2x-e1x*e2z,nz=e1x*e2y-e1y*e2x;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz);
      bestNormal=[nx/nl,ny/nl,nz/nl];
    }
  }
  return bestPoint?{point:bestPoint,normal:bestNormal}:null;
}

canvas.onmousedown=e=>{
  mdx=e.clientX;mdy=e.clientY;dragging=true;
  const p=camera.position;
  prevCamYaw=Math.atan2(p.x,p.z);
  prevCamPitch=Math.asin(p.y/p.length());
};
window.onmouseup=e=>{
  if(!dragging||!loaded)return;dragging=false;
  const dx=e.clientX-mdx,dy=e.clientY-mdy;
  if(Math.sqrt(dx*dx+dy*dy)>3)return;

  // Build view ray
  const rect=canvas.getBoundingClientRect();
  const ndcX=((mdx-rect.left)/rect.width)*2-1,ndcY=-((mdy-rect.top)/rect.height)*2+1;
  const camPos=camera.position;
  const asp=canvas.width/canvas.height,f=1/Math.tan(Math.PI*40/360);
  const dirX=ndcX*asp/f,dirY=ndcY/f,dirZ=-1;
  // Transform to world space
  const fx=-camPos.x,fy=-camPos.y,fz=-camPos.z;const fl=Math.sqrt(fx*fx+fy*fy+fz*fz);
  const fdx=fx/fl,fdy=fy/fl,fdz=fz/fl;
  const rtx=fdz,rtz=-fdx;const rl=Math.sqrt(rtx*rtx+rtz*rtz);
  const rnx=rtx/rl,rny=0,rnz=rtz/rl;
  const ux=fdy*rnz-fdz*rny,uy=fdz*rnx-fdx*rnz,uz=fdx*rny-fdy*rnx;
  const wx=dirX*rnx+dirY*ux+dirZ*(-fdx),wy=dirX*rny+dirY*uy+dirZ*(-fdy),wz=dirX*rnz+dirY*uz+dirZ*(-fdz);
  const wl=Math.sqrt(wx*wx+wy*wy+wz*wz);
  const Dx=wx/wl,Dy=wy/wl,Dz=wz/wl;

  const hit=raycastProxyMesh([camPos.x,camPos.y,camPos.z],[Dx,Dy,Dz]);
  if(hit){
    addCircularBand(hit.point,[0,1,0]);
  }
};
canvas.onmousemove=e=>{
  if(dragging){
    const dx=e.clientX-mdx,dy=e.clientY-mdy;
    const dist=camera.position.length();
    const yaw=prevCamYaw-dx*0.005;
    const pitch=Math.max(-1.4,Math.min(1.4,prevCamPitch+dy*0.005));
    camera.position.set(dist*Math.cos(pitch)*Math.sin(yaw),dist*Math.sin(pitch),dist*Math.cos(pitch)*Math.cos(yaw));
    camera.lookAt(0,0,0);
    return;
  }
  if(!loaded)return;
  ensurePreviewLine();
  };
canvas.onwheel=e=>{e.preventDefault();let d=e.deltaY;if(e.deltaMode===1)d*=40;if(e.deltaMode===2)d*=800;camera.position.multiplyScalar(1+d*0.001);camera.position.clampLength(1.5,15);},{passive:false};

window.onkeydown=e=>{
  const key=e.key.toLowerCase();
  if(key==='c'){removeAllCircularBands();return;}
  if(key==='t'){removeCircularBand();return;}
};

window.onresize=()=>{
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
};

// ══════.?Animation Loop ══════.?
const clock={last:performance.now()};
let fpsFrames=0,fpsTime=0;

async function animate(){
  const now=performance.now(),dt=Math.min((now-clock.last)/1000,0.1);clock.last=now;
  if(!loaded){requestAnimationFrame(animate);return;}

  const t0=performance.now();

  if(circVisDirty){await runGPUCircularBandVis(posA);circVisDirty=false;}

  const tRender0=performance.now();
  renderer.render(scene,camera);
  const renderMs=performance.now()-tRender0;
  fpsFrames++;fpsTime+=dt;
  if(fpsTime>=1.0){
    H.fps.textContent=Math.round(fpsFrames/fpsTime);
    H.framems.textContent=(performance.now()-t0).toFixed(1);
    fpsFrames=0;fpsTime=0;
  }
  requestAnimationFrame(animate);
}
