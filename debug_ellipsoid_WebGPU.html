<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBD 椭球调试 — WebGPU 版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; overflow:hidden; font-family:monospace; }
canvas { display:block; cursor:crosshair; }
#hud { position:fixed; top:12px; left:12px; z-index:10; color:#ccc; font-size:13px; line-height:1.7; pointer-events:none; }
#hud .val { color:#0f0; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#888; font-size:12px; z-index:10; pointer-events:none; }
#panel { position:fixed; top:12px; right:12px; z-index:20; background:rgba(0,0,0,0.8); border:1px solid #444; border-radius:8px; padding:14px 18px; color:#ccc; font-size:13px; min-width:220px; pointer-events:all; user-select:none; }
#panel label { display:block; margin:8px 0 2px; color:#aaa; }
#panel input[type=range] { width:100%; accent-color:#cc44ff; }
#panel .val { color:#cc44ff; float:right; }
#panel h3 { margin:0 0 6px; color:#fff; font-size:14px; }
#panel .badge { display:inline-block; background:#cc44ff; color:#000; font-size:10px; padding:1px 6px; border-radius:3px; margin-left:4px; font-weight:bold; }
</style>
</head>
<body>

<div id="hud">
 <div>FPS: <span class="val" id="fps">--</span></div>
 <div>帧耗时: <span class="val" id="framems">--</span> ms</div>
 <div>顶点: <span class="val" id="vcount">--</span></div>
 <div>三角形: <span class="val" id="tcount">--</span></div>
 <div>皮筋: <span class="val" id="bcount">0</span></div>
 <div>体积: <span class="val" id="vratio">100</span>%</div>
 <div>迭代: <span class="val" id="pbditer">--</span></div>
</div>
<div id="info">🖱️ 点击椭球表面绑皮筋 &nbsp; R 键割一根 &nbsp; 拖拽旋转 &nbsp; 滚轮缩放 &nbsp; <span style="color:#cc44ff">⚡ WebGPU</span></div>

<div id="panel">
 <h3>🔧 GPU PBD 参数 <span class="badge">GPU</span></h3>
 <label>形状基础刚度 <span class="val" id="sv_ss">0.30</span></label>
 <input type="range" id="sl_ss" min="0.01" max="1.0" step="0.01" value="0.30">
 <label>皮筋基础刚度 <span class="val" id="sv_bs">0.50</span></label>
 <input type="range" id="sl_bs" min="0.001" max="1.0" step="0.001" value="0.50">
 <label>体积刚度 <span class="val" id="sv_vs">0.40</span></label>
 <input type="range" id="sl_vs" min="0.01" max="1.0" step="0.01" value="0.40">
 <label>影响半径 <span class="val" id="sv_bi">0.60</span></label>
 <input type="range" id="sl_bi" min="0.2" max="1.5" step="0.05" value="0.60">
 <label>皮筋目标半径 <span class="val" id="sv_tr">0.40</span></label>
 <input type="range" id="sl_tr" min="0.05" max="0.50" step="0.01" value="0.40">
 <label>PBD迭代 <span class="val" id="sv_pi">10</span></label>
 <input type="range" id="sl_pi" min="1" max="30" step="1" value="10">
</div>
<canvas id="canvas"></canvas>

<script type="module">
const $=id=>document.getElementById(id);
const H={fps:$('fps'),framems:$('framems'),vcount:$('vcount'),tcount:$('tcount'),bcount:$('bcount'),vratio:$('vratio'),pbditer:$('pbditer')};
const canvas=$('canvas');

if(!navigator.gpu){alert('WebGPU not supported');throw new Error('No WebGPU');}
let adapter=null;
for(let retry=0;retry<3&&!adapter;retry++){
  adapter=await navigator.gpu.requestAdapter({powerPreference:'high-performance'});
  if(!adapter&&retry<2)await new Promise(r=>setTimeout(r,500));
}
if(!adapter){alert('No GPU adapter after retries. Restart Chrome.');throw new Error('No adapter');}
const device=await adapter.requestDevice();
device.addEventListener('uncapturederror',ev=>console.error('GPU error:',ev.error));
device.addEventListener('lost',()=>console.warn('Device lost - refresh page'));
const queue=device.queue;

const context=canvas.getContext('webgpu');
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
canvas.style.width=canvas.width+'px'; canvas.style.height=canvas.height+'px';
const canvasFormat=navigator.gpu.getPreferredCanvasFormat();
context.configure({device,format:canvasFormat,alphaMode:'premultiplied'});

// Ellipsoid geometry
const ELLI_RX=0.5,ELLI_RY=1.5,ELLI_RZ=0.5,RINGS=60,SEGS=66,TOTAL_V=1+RINGS*SEGS+1;
const vertexCount=TOTAL_V;
function buildEllipsoid(rx,ry,rz,rings,segs){
  const p=[],idx=[];
  p.push(0,ry,0);
  for(let r=0;r<rings;r++){const phi=Math.PI*(r+1)/(rings+1),sinPhi=Math.sin(phi);for(let s=0;s<segs;s++){const theta=2*Math.PI*s/segs;p.push(rx*sinPhi*Math.cos(theta),ry*Math.cos(phi),rz*sinPhi*Math.sin(theta));}}
  p.push(0,-ry,0);
  const tp=0,bp=TOTAL_V-1;
  for(let s=0;s<segs;s++)idx.push(tp,1+s,1+(s+1)%segs);
  for(let r=0;r<rings-1;r++){const rs=1+r*segs,nrs=1+(r+1)*segs;for(let s=0;s<segs;s++){const a=rs+s,b=rs+(s+1)%segs,c=nrs+s,d=nrs+(s+1)%segs;idx.push(a,c,b);idx.push(b,c,d);}}
  const lrs=1+(rings-1)*segs;
  for(let s=0;s<segs;s++)idx.push(lrs+s,bp,lrs+(s+1)%segs);
  return{positions:new Float32Array(p),indices:new Uint32Array(idx)};
}
const geo=buildEllipsoid(ELLI_RX,ELLI_RY,ELLI_RZ,RINGS,SEGS);
const TRI_COUNT=geo.indices.length/3;
H.vcount.textContent=vertexCount; H.tcount.textContent=TRI_COUNT;
H.pbditer.textContent=10;

// Rest volume
let restVolume=0,restSurfaceArea=0;
{const p=geo.positions,idx=geo.indices;for(let t=0;t<idx.length;t+=3){const ai=idx[t]*3,bi=idx[t+1]*3,ci=idx[t+2]*3;const ax=p[ai],ay=p[ai+1],az=p[ai+2],bx=p[bi],by=p[bi+1],bz=p[bi+2],cx=p[ci],cy=p[ci+1],cz=p[ci+2];restVolume+=(ax*(by*cz-bz*cy)+ay*(bz*cx-bx*cz)+az*(bx*cy-by*cx))/6;const abx=bx-ax,aby=by-ay,abz=bz-az,acx=cx-ax,acy=cy-ay,acz=cz-az;restSurfaceArea+=0.5*Math.sqrt((aby*acz-abz*acy)**2+(abz*acx-abx*acz)**2+(abx*acy-aby*acx)**2);}restVolume=Math.abs(restVolume);}

// GPU Buffers
const VERT_BYTE=vertexCount*4*4;
function mkBuf(size,usage,label){return device.createBuffer({size,usage,label});}
const posA=mkBuf(VERT_BYTE,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'posA');
const posB=mkBuf(VERT_BYTE,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'posB');
const restB=mkBuf(VERT_BYTE,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST,'rest');
const idxB=mkBuf(geo.indices.length*4,GPUBufferUsage.INDEX|GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST,'idx');
const lineIndices=[];for(let t=0;t<geo.indices.length;t+=3){const a=geo.indices[t],b=geo.indices[t+1],c=geo.indices[t+2];lineIndices.push(a,b,b,c,c,a);}
const lineIdxB=mkBuf(lineIndices.length*4,GPUBufferUsage.INDEX|GPUBufferUsage.COPY_DST,'lineIdx');
const MAX_BANDS=256;
const bandB=mkBuf(MAX_BANDS*4*4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST,'band');
const volB=mkBuf(TRI_COUNT*4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'vol');
const VOL_PART_COUNT=Math.ceil(TRI_COUNT/256);
const volPartB=mkBuf(VOL_PART_COUNT*4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'volPart');
const volTotalB=mkBuf(4,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'volTotal');
const staging=mkBuf(4+Math.max(VERT_BYTE,TRI_COUNT*4),GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ,'staging');

// Upload initial data
{const d=new Float32Array(vertexCount*4);for(let i=0;i<vertexCount;i++){d[i*4]=geo.positions[i*3];d[i*4+1]=geo.positions[i*3+1];d[i*4+2]=geo.positions[i*3+2];d[i*4+3]=1;}queue.writeBuffer(posA,0,d);queue.writeBuffer(posB,0,d);queue.writeBuffer(restB,0,d);}
queue.writeBuffer(idxB,0,geo.indices); queue.writeBuffer(lineIdxB,0,new Uint32Array(lineIndices));
let srcPos=posA,dstPos=posB; function swap(){[srcPos,dstPos]=[dstPos,srcPos];}

// WGSL Shaders
const shapeCS=device.createShaderModule({label:'shape',code:`
struct P{stiffness:f32,vc:u32}
@group(0)@binding(0)var<storage,read>src:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read_write>dst:array<vec4<f32>>;
@group(0)@binding(2)var<storage,read>rest:array<vec4<f32>>;
@group(0)@binding(3)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>){let i=gid.x;if(i>=p.vc){return;}let cur=src[i];let r=rest[i];let d=r.xyz-cur.xyz;dst[i]=vec4(cur.xyz+d*p.stiffness,1);}
`});

const bandCS=device.createShaderModule({label:'band',code:`
struct Band{cy:f32,tr:f32,stiff:f32,inf:f32}
struct P{bc:u32,vc:u32}
@group(0)@binding(0)var<storage,read>src:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read_write>dst:array<vec4<f32>>;
@group(0)@binding(2)var<storage,read>rest:array<vec4<f32>>;
@group(0)@binding(3)var<storage,read>bands:array<Band>;
@group(0)@binding(4)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>){let i=gid.x;if(i>=p.vc){return;}var cur=src[i];for(var b=0u;b<256u;b++){if(b>=p.bc){break;}let bd=bands[b];let dy=abs(cur.y-bd.cy);if(dy>=bd.inf){continue;}let r=length(cur.xz);if(r<1e-6){continue;}let t=dy/bd.inf;let st=t*t*(3.0-2.0*t);let eff=bd.tr+(r-bd.tr)*st;if(r>eff){let push=bd.stiff*(r-eff);let s=max(0.01,(r-push)/r);cur.x*=s;cur.z*=s;}}dst[i]=cur;}
`});

const volAccCS=device.createShaderModule({label:'volAcc',code:`
struct P{tc:u32}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>indices:array<u32>;
@group(0)@binding(2)var<storage,read_write>volOut:array<f32>;
@group(0)@binding(3)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>){let t=gid.x;if(t>=p.tc){return;}let i0=indices[t*3u];let i1=indices[t*3u+1u];let i2=indices[t*3u+2u];let p0=pos[i0].xyz;let p1=pos[i1].xyz;let p2=pos[i2].xyz;volOut[t]=(p0.x*(p1.y*p2.z-p1.z*p2.y)+p0.y*(p1.z*p2.x-p1.x*p2.z)+p0.z*(p1.x*p2.y-p1.y*p2.x))/6.0;}
`});

const volReduceCS=device.createShaderModule({label:'volReduce',code:`
struct P{count:u32}
@group(0)@binding(0)var<storage,read>src:array<f32>;
@group(0)@binding(1)var<storage,read_write>dst:array<f32>;
@group(0)@binding(2)var<uniform>p:P;
var<workgroup>sdata:array<f32,256>;
@compute@workgroup_size(256)fn main(@builtin(local_invocation_id)lid:vec3<u32>,@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  sdata[lid.x]=select(0.0,src[gid.x],gid.x<p.count);
  workgroupBarrier();
  for(var s=128u;s>0u;s>>=1){if(lid.x<s){sdata[lid.x]+=sdata[lid.x+s];}workgroupBarrier();}
  if(lid.x==0u){dst[wg.x]=sdata[0];}
}
`});

const volApCS=device.createShaderModule({label:'volAp',code:`
struct P{vc:u32,rest:f32,stiff:f32,surface:f32}
@group(0)@binding(0)var<storage,read>src:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read_write>dst:array<vec4<f32>>;
@group(0)@binding(2)var<storage,read>volTotal:array<f32>;
@group(0)@binding(3)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>){let i=gid.x;if(i>=p.vc){return;}let cur=src[i];let r=length(cur.xz);if(r<1e-6){dst[i]=cur;return;}let curVol=abs(volTotal[0]);let deficit=p.rest-curVol;let push=select(p.stiff*deficit/p.surface,0.0,abs(deficit)<1e-9);let s=clamp((r+push)/r,0.7,1.3);dst[i]=vec4(cur.x*s,cur.y,cur.z*s,1);}
`});

// Render shaders
const surfShader=device.createShaderModule({label:'surf',code:`
struct U{mvp:mat4x4<f32>}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<uniform>u:U;
@vertex fn vs(@builtin(vertex_index)vi:u32)->@builtin(position)vec4<f32>{return u.mvp*pos[vi];}
@fragment fn fs()->@location(0)vec4<f32>{return vec4(1.0,0.67,0.0,0.3);}
`});

const wireShader2=device.createShaderModule({label:'wire2',code:`
struct U{mvp:mat4x4<f32>}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<uniform>u:U;
@vertex fn vs(@builtin(vertex_index)vi:u32)->@builtin(position)vec4<f32>{return u.mvp*pos[vi];}
@fragment fn fs()->@location(0)vec4<f32>{return vec4(1.0,1.0,1.0,0.5);}
`});

// Pipeline helpers
function cpPipe(shader,entry,bgEntries,label){
  const bgl=device.createBindGroupLayout({entries:bgEntries});
  const layout=device.createPipelineLayout({bindGroupLayouts:[bgl]});
  const pipe=device.createComputePipeline({layout,compute:{module:shader,entryPoint:entry}});
  return{pipe,bgl,layout};
}
const S_R=(b,v)=>({binding:b,visibility:v,buffer:{type:'storage'}});
const S_RO=(b,v)=>({binding:b,visibility:v,buffer:{type:'read-only-storage'}});
const U_B=(b,v)=>({binding:b,visibility:v,buffer:{type:'uniform'}});
const CS=GPUShaderStage.COMPUTE;

const shapePipe=cpPipe(shapeCS,'main',[S_RO(0,CS),S_R(1,CS),S_RO(2,CS),U_B(3,CS)],'shape');
const bandPipe=cpPipe(bandCS,'main',[S_RO(0,CS),S_R(1,CS),S_RO(2,CS),S_RO(3,CS),U_B(4,CS)],'band');
const volAccPipe=cpPipe(volAccCS,'main',[S_RO(0,CS),S_RO(1,CS),S_R(2,CS),U_B(3,CS)],'volAcc');
const volReducePipe=cpPipe(volReduceCS,'main',[S_RO(0,CS),S_R(1,CS),U_B(2,CS)],'volReduce');
const volApPipe=cpPipe(volApCS,'main',[S_RO(0,CS),S_R(1,CS),S_RO(2,CS),U_B(3,CS)],'volAp');

// Band radius compute: GPU scans vertices, writes avg radius INTO bandInstBuf[].scale
const bandRadCS=device.createShaderModule({label:'bandRad',code:`
struct Band{cy:f32,tr:f32,stiff:f32,inf:f32}
struct Inst{offset:f32,scale:f32,r:f32,g:f32,b:f32,a:f32}
struct P{vc:u32,bc:u32}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>bands:array<Band>;
@group(0)@binding(2)var<storage,read_write>inst:array<Inst>;
@group(0)@binding(3)var<uniform>p:P;
var<workgroup>sSum:array<f32,256>;
var<workgroup>sCnt:array<u32,256>;
@compute@workgroup_size(256)fn main(@builtin(local_invocation_id)lid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let b=wg.x;if(b>=p.bc){return;}
  let bandY=bands[b].cy;let thresh=bands[b].inf*0.3;
  var sumR=f32(0);var cnt=u32(0);
  var vi=lid.x;
  while(vi<p.vc){
    let y=pos[vi].y;
    if(abs(y-bandY)<thresh){sumR+=length(pos[vi].xz);cnt++;}
    vi+=256u;
  }
  sSum[lid.x]=sumR;sCnt[lid.x]=cnt;workgroupBarrier();
  for(var s=128u;s>0u;s>>=1){if(lid.x<s){sSum[lid.x]+=sSum[lid.x+s];sCnt[lid.x]+=sCnt[lid.x+s];}workgroupBarrier();}
  if(lid.x==0u){inst[b].scale=select(0.0,sSum[0]/f32(sCnt[0]),sCnt[0]>1u);}
}
`});
const bandRadPipe=cpPipe(bandRadCS,'main',[S_RO(0,CS),S_RO(1,CS),S_R(2,CS),U_B(3,CS)],'bandRad');

// Uniform buffers
const shapeUB=mkBuf(8,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST);
const bandUB=mkBuf(8,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST);
const volAccUB=mkBuf(4,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST);
const volReduceUB=mkBuf(4,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST);
const volReduce2UB=mkBuf(4,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST);
const volApUB=mkBuf(16,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST);
const bandRadUB=mkBuf(8,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST);
// Unified instance buffer: GPU computes radius in-place, CPU writes offset+color once
const INST_BYTE=MAX_BANDS*24;
const bandInstBuf=mkBuf(INST_BYTE,GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST|GPUBufferUsage.COPY_SRC,'bandInst');

// Bind groups (ping-pong: AB and BA)
function mkBG_AB(bgl,fAB,fBA){
  return{
    AB:device.createBindGroup({layout:bgl,entries:fAB(posA,posB)}),
    BA:device.createBindGroup({layout:bgl,entries:fBA(posA,posB)}),
  };
}
const shapeBG=mkBG_AB(shapePipe.bgl,
  (A,B)=>[{binding:0,resource:{buffer:A}},{binding:1,resource:{buffer:B}},{binding:2,resource:{buffer:restB}},{binding:3,resource:{buffer:shapeUB}}],
  (A,B)=>[{binding:0,resource:{buffer:B}},{binding:1,resource:{buffer:A}},{binding:2,resource:{buffer:restB}},{binding:3,resource:{buffer:shapeUB}}]
);
const bandBG=mkBG_AB(bandPipe.bgl,
  (A,B)=>[{binding:0,resource:{buffer:A}},{binding:1,resource:{buffer:B}},{binding:2,resource:{buffer:restB}},{binding:3,resource:{buffer:bandB}},{binding:4,resource:{buffer:bandUB}}],
  (A,B)=>[{binding:0,resource:{buffer:B}},{binding:1,resource:{buffer:A}},{binding:2,resource:{buffer:restB}},{binding:3,resource:{buffer:bandB}},{binding:4,resource:{buffer:bandUB}}]
);
const volApBG=mkBG_AB(volApPipe.bgl,
  (A,B)=>[{binding:0,resource:{buffer:A}},{binding:1,resource:{buffer:B}},{binding:2,resource:{buffer:volTotalB}},{binding:3,resource:{buffer:volApUB}}],
  (A,B)=>[{binding:0,resource:{buffer:B}},{binding:1,resource:{buffer:A}},{binding:2,resource:{buffer:volTotalB}},{binding:3,resource:{buffer:volApUB}}]
);
// volAcc bind groups: only binding 0 (positions) changes with ping-pong
const volAccBG_A=device.createBindGroup({layout:volAccPipe.bgl,entries:[{binding:0,resource:{buffer:posA}},{binding:1,resource:{buffer:idxB}},{binding:2,resource:{buffer:volB}},{binding:3,resource:{buffer:volAccUB}}]});
const volAccBG_B=device.createBindGroup({layout:volAccPipe.bgl,entries:[{binding:0,resource:{buffer:posB}},{binding:1,resource:{buffer:idxB}},{binding:2,resource:{buffer:volB}},{binding:3,resource:{buffer:volAccUB}}]});
// volReduce level 1: volB → volPartB
const volRedBG1=device.createBindGroup({layout:volReducePipe.bgl,entries:[{binding:0,resource:{buffer:volB}},{binding:1,resource:{buffer:volPartB}},{binding:2,resource:{buffer:volReduceUB}}]});
// volReduce level 2: volPartB → volTotalB
const volRedBG2=device.createBindGroup({layout:volReducePipe.bgl,entries:[{binding:0,resource:{buffer:volPartB}},{binding:1,resource:{buffer:volTotalB}},{binding:2,resource:{buffer:volReduce2UB}}]});
// Band radius bind groups (posA/posB ping-pong) — writes scale into bandInstBuf
const bandRadBG_A=device.createBindGroup({layout:bandRadPipe.bgl,entries:[{binding:0,resource:{buffer:posA}},{binding:1,resource:{buffer:bandB}},{binding:2,resource:{buffer:bandInstBuf}},{binding:3,resource:{buffer:bandRadUB}}]});
const bandRadBG_B=device.createBindGroup({layout:bandRadPipe.bgl,entries:[{binding:0,resource:{buffer:posB}},{binding:1,resource:{buffer:bandB}},{binding:2,resource:{buffer:bandInstBuf}},{binding:3,resource:{buffer:bandRadUB}}]});
// Render
const R_BGL=device.createBindGroupLayout({entries:[
  {binding:0,visibility:GPUShaderStage.VERTEX,buffer:{type:'read-only-storage'}},
  {binding:1,visibility:GPUShaderStage.VERTEX,buffer:{type:'uniform'}},
]});
const mvpUB=mkBuf(64,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST);
const renderBG_A=device.createBindGroup({layout:R_BGL,entries:[{binding:0,resource:{buffer:posA}},{binding:1,resource:{buffer:mvpUB}}]});
const renderBG_B=device.createBindGroup({layout:R_BGL,entries:[{binding:0,resource:{buffer:posB}},{binding:1,resource:{buffer:mvpUB}}]});

  H.fps.textContent=Math.round(1/dt);
  H.framems.textContent=(performance.now()-now).toFixed(1);
  H.vratio.textContent=(lastVol/restVolume*100).toFixed(1);
  requestAnimationFrame(animate);
}

console.log('WebGPU PBD ready. Verts:',vertexCount,'Tris:',TRI_COUNT,'restVol:',restVolume.toFixed(4));
animate();
</script>
