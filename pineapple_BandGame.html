// ── Shared ribbon mesh: one geometry, one material, all bands ──
function createSharedRibbonMesh(){
  const totalAll=MAX_BANDS*MAX_RIBBON_VERTS;
  const geo=new THREE.BufferGeometry();
  // Use one-band-sized arrays as placeholders (Three.js GPU buffers are replaced below)
  const posArr=new Float32Array(MAX_RIBBON_VERTS*3);
  const normArr=new Float32Array(MAX_RIBBON_VERTS*3);
  const uvArr=new Float32Array(MAX_RIBBON_VERTS*2);
  const tanArr=new Float32Array(MAX_RIBBON_VERTS*4);
  const posAttr=new THREE.Float32BufferAttribute(posArr,3);
  const normAttr=new THREE.Float32BufferAttribute(normArr,3);
  const uvAttr=new THREE.Float32BufferAttribute(uvArr,2);
  const tanAttr=new THREE.Float32BufferAttribute(tanArr,4);
  // Lie about count: GPU buffer has MAX_BANDS worth, CPU array is just placeholder
  const FAKE_COUNT=MAX_BANDS*MAX_RIBBON_VERTS;
  for(const a of[posAttr,normAttr])Object.defineProperty(a,'count',{get(){return FAKE_COUNT;},configurable:true});
  for(const a of[uvAttr])Object.defineProperty(a,'count',{get(){return FAKE_COUNT;},configurable:true});
  for(const a of[tanAttr])Object.defineProperty(a,'count',{get(){return FAKE_COUNT;},configurable:true});
  posAttr.needsUpdate=true;normAttr.needsUpdate=true;uvAttr.needsUpdate=true;tanAttr.needsUpdate=true;
  geo.setAttribute('position',posAttr);
  geo.setAttribute('normal',normAttr);
  geo.setAttribute('uv',uvAttr);
  geo.setAttribute('tangent',tanAttr);
  geo.setDrawRange(0,0);
  const mat=new THREE.MeshPhysicalMaterial({
    color:'#d4a017',roughness:RIBBON_ROUGHNESS,metalness:0.0,
    anisotropy:RIBBON_ANISOTROPY,anisotropyRotation:Math.PI/2,
    side:THREE.DoubleSide,depthTest:true,depthWrite:true,
    polygonOffset:true, polygonOffsetFactor:1.0, polygonOffsetUnits:1.0,
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.renderOrder=1;mesh.frustumCulled=false;mesh.visible=false;
  mesh.castShadow=true;mesh.receiveShadow=false;
  // Override bounding sphere/box (Three.js would read NaN from placeholder array)
  geo.boundingSphere=new THREE.Sphere(new THREE.Vector3(0,0,0),100);
  geo.boundingBox=new THREE.Box3(new THREE.Vector3(-100,-100,-100),new THREE.Vector3(100,100,100));
  scene.add(mesh);
  // Force Three.js to create GPU buffers, then replace with shared buffers
  const attrNames=['position','normal','uv','tangent'];
  const sharedBufs=[_sharedPosB,_sharedNormB,_sharedUVB,_sharedTanB];
  for(let i=0;i<attrNames.length;i++){
    const attr=geo.attributes[attrNames[i]];
    renderer.backend.createAttribute(attr);
    const be=renderer.backend.get(attr);
    if(be)be.buffer=sharedBufs[i];
    attr.needsUpdate=false;
  }
  return mesh;
}

// ══════.?GPU PBD: write band params to GPU buffer ══════.?
function writeBandParams(){
  if(!bandParamsB)return;
  const STRIDE=13; // ox,oy,oz,nx,ny,nz,L₀,stiff,inf,preScale,rest_cx,rest_cy,rest_cz
  const data=new Float32Array(MAX_BANDS*STRIDE);
  for(let b=0;b<bands.length;b++){
    const bn=bands[b];const off=b*STRIDE;
    data[off]=bn.planeOrigin[0];data[off+1]=bn.planeOrigin[1];data[off+2]=bn.planeOrigin[2];
    data[off+3]=bn.planeNormal[0];data[off+4]=bn.planeNormal[1];data[off+5]=bn.planeNormal[2];
    data[off+6]=bn.restCircum;data[off+7]=bn.stiffness;data[off+8]=bn.influRadius;
    data[off+9]=bn.preScale||1.0;
    data[off+10]=bn.restCentroid?bn.restCentroid[0]:0;
    data[off+11]=bn.restCentroid?bn.restCentroid[1]:0;
    data[off+12]=bn.restCentroid?bn.restCentroid[2]:0;
  }
  queue.writeBuffer(bandParamsB,0,data);
}

// Read back proxy positions from GPU for band visualization (CPU polyline)
async function readbackProxyPositions(srcBuf){
  const size=proxyVertexCount*4*4;
  const cmd=device.createCommandEncoder();
  cmd.copyBufferToBuffer(srcBuf===posA?posA:posB,0,staging,0,size);
  device.queue.submit([cmd.finish()]);
  await staging.mapAsync(GPUMapMode.READ);
  const arr=new Float32Array(staging.getMappedRange(0,size));
  for(let i=0;i<proxyVertexCount;i++){
    proxyCurPositions[i*3]=arr[i*4];
    proxyCurPositions[i*3+1]=arr[i*4+1];
    proxyCurPositions[i*3+2]=arr[i*4+2];
  }
  staging.unmap();
}

// Read back current volume from GPU buffer for HUD display
async function readbackVolume(){
  if(!volTotalB||!volStaging||!restVolume)return;
  const cmd=device.createCommandEncoder();
  cmd.copyBufferToBuffer(volTotalB,0,volStaging,0,4);
  device.queue.submit([cmd.finish()]);
  await volStaging.mapAsync(GPUMapMode.READ);
  const curVol=new Float32Array(volStaging.getMappedRange(0,4))[0];
  volStaging.unmap();
  const ratio=restVolume>0?Math.abs(curVol)/restVolume*100:100;
  H.vratio.textContent=ratio.toFixed(1);
}

// Update band visuals from CPU proxy positions (exact polyline, PBR ribbon + target line)
function updateBandVisual(idx){
  const b=bands[idx],vis=bandVisuals[idx];
  if(!vis||!b)return;
  const exact=getExactCrossSectionPolyline(proxyCurPositions,proxyIdxArr,b.planeOrigin,b.planeNormal);
  if(exact.points3D.length<9){vis.ribbon.visible=false;vis.lineTarget.visible=false;return;}
  updateBandRibbonMesh(vis.ribbon, b, idx);
  // Target green line (thin reference, unchanged)
  if(exact.perimeter>b.restCircum){
    const s=b.restCircum/exact.perimeter;
    const cx=exact.centroid[0],cy=exact.centroid[1],cz=exact.centroid[2];
    const targetPts=[];
    for(let i=0;i<exact.points3D.length;i+=3){
      const dx=exact.points3D[i]-cx,dy=exact.points3D[i+1]-cy,dz=exact.points3D[i+2]-cz;
      targetPts.push(cx+dx*s,cy+dy*s,cz+dz*s);
    }
    updateBandLine(vis.lineTarget,targetPts);vis.lineTarget.visible=showTargetLine;
  }else{vis.lineTarget.visible=false;}
}
function updateAllBandVisuals(){
  for(let b=0;b<bands.length;b++)updateBandVisual(b);
  if(bands.length>0){
    const lb=bands[bands.length-1];
    const exact=getExactCrossSectionPolyline(proxyCurPositions,proxyIdxArr,lb.planeOrigin,lb.planeNormal);
    H.cratio.textContent=exact.perimeter>0?(exact.perimeter/lb.restCircum).toFixed(3):'--';
    // Diagnostic: log perimeters of all bands
    if(bands.length>=2&&convergeFrames===CONVERGE_FRAMES-1){
      console.log('📏 PBD收敛后周?');
      for(let b=0;b<bands.length;b++){
        const e=getExactCrossSectionPolyline(proxyCurPositions,proxyIdxArr,bands[b].planeOrigin,bands[b].planeNormal);
        console.log('  band#'+(b+1)+' P='+e.perimeter.toFixed(4)+' L0='+bands[b].restCircum.toFixed(4)+' ratio='+(e.perimeter/bands[b].restCircum).toFixed(4)+(e.perimeter<bands[b].restCircum?' BROKEN':' OK'));
      }
    }
  }else{H.cratio.textContent='--';}
}

// Raycast against proxy mesh (simple ray-sphere-like intersection using rest positions)
function raycastProxyMesh(origin,dir){
  // Use the proxy mesh triangles for precise hit detection
  let bestT=Infinity,bestPoint=null,bestNormal=null;
  for(let t=0;t<proxyIdxArr.length;t+=3){
    const ai=proxyIdxArr[t]*3,bi=proxyIdxArr[t+1]*3,ci=proxyIdxArr[t+2]*3;
    // Use current positions for raycast
    const pos=proxyRestPositions;
    const ax=pos[ai],ay=pos[ai+1],az=pos[ai+2];
    const bx=pos[bi],by=pos[bi+1],bz=pos[bi+2];
    const cx=pos[ci],cy=pos[ci+1],cz=pos[ci+2];
    // Möller-Trumbore
    const e1x=bx-ax,e1y=by-ay,e1z=bz-az;
    const e2x=cx-ax,e2y=cy-ay,e2z=cz-az;
    const hx=dir[1]*e2z-dir[2]*e2y,hy=dir[2]*e2x-dir[0]*e2z,hz=dir[0]*e2y-dir[1]*e2x;
    const a=e1x*hx+e1y*hy+e1z*hz;
    if(Math.abs(a)<1e-7)continue;
    const f=1/a;
    const sx=origin[0]-ax,sy=origin[1]-ay,sz=origin[2]-az;
    const u=f*(sx*hx+sy*hy+sz*hz);
    if(u<0||u>1)continue;
    const qx=sy*e1z-sz*e1y,qy=sz*e1x-sx*e1z,qz=sx*e1y-sy*e1x;
    const v=f*(dir[0]*qx+dir[1]*qy+dir[2]*qz);
    if(v<0||u+v>1)continue;
    const tt=f*(e2x*qx+e2y*qy+e2z*qz);
    if(tt>1e-6&&tt<bestT){
      bestT=tt;
      bestPoint=[origin[0]+dir[0]*tt,origin[1]+dir[1]*tt,origin[2]+dir[2]*tt];
      // Triangle normal
      const nx=e1y*e2z-e1z*e2y,ny=e1z*e2x-e1x*e2z,nz=e1x*e2y-e1y*e2x;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz);
      bestNormal=[nx/nl,ny/nl,nz/nl];
    }
  }
  return bestPoint?{point:bestPoint,normal:bestNormal}:null;
}

    queue.writeBuffer(posB,0,pos4r);
    queue.writeBuffer(voxDxBuf,0,new Uint32Array(VOX_TOTAL));
    queue.writeBuffer(voxDyBuf,0,new Uint32Array(VOX_TOTAL));
    queue.writeBuffer(voxDzBuf,0,new Uint32Array(VOX_TOTAL));
    queue.writeBuffer(voxWBuf,0,new Uint32Array(VOX_TOTAL));
    proxyCurPositions.set(proxyRestPositions);
    await runGPUPostPBD(posA);
    needsRestore=false;lastVol=restVolume;
    H.pbdtime.textContent='Restored';
    H.vratio.textContent='100.0';
    await runGPUBandVis(posA).then(t=>{H.bandtime.textContent=t.toFixed(1)+' ms';});
  }else{
    H.pbdtime.textContent='空闲';
  }

  const tRender0=performance.now();
  renderer.render(scene,camera);
  const renderMs=performance.now()-tRender0;
  fpsFrames++;fpsTime+=dt;
  if(fpsTime>=1.0){
    H.fps.textContent=Math.round(fpsFrames/fpsTime);
    H.framems.textContent=(performance.now()-t0).toFixed(1);
    fpsFrames=0;fpsTime=0;
  }
  requestAnimationFrame(animate);
}
