<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮筋游戏 GPU PBD + Three.js WebGPU</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; overflow:hidden; font-family:monospace; }
canvas { display:block; cursor:crosshair; }
#hud { position:fixed; top:12px; left:12px; z-index:10; color:#ccc; font-size:13px; line-height:1.7; pointer-events:none; }
#hud .val { color:#0f0; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#888; font-size:12px; z-index:10; pointer-events:none; }
#panel { position:fixed; top:12px; right:12px; z-index:20; background:rgba(0,0,0,0.85); border:1px solid #555; border-radius:8px; padding:14px 18px; color:#ccc; font-size:12px; min-width:240px; pointer-events:all; user-select:none; max-height:90vh; overflow-y:auto; }
#panel label { display:block; margin:6px 0 2px; color:#aaa; }
#panel input[type=range] { width:100%; accent-color:#ff44cc; }
#panel .val { color:#ff44cc; float:right; }
#panel h3 { margin:8px 0 4px; color:#fff; font-size:13px; border-top:1px solid #444; padding-top:8px; }
#panel h3:first-child { border-top:none; padding-top:0; }
#panel .row { display:flex; gap:8px; align-items:center; }
#panel .row span { flex:0 0 auto; color:#aaa; font-size:11px; }
#panel .row input { flex:1; }
#panel .btn { margin-top:6px; width:100%; padding:4px 0; background:#333; color:#ff44cc; border:1px solid #ff44cc; border-radius:4px; cursor:pointer; font-size:11px; }
#panel .btn:hover { background:#444; }
#panel .kb { display:inline-block; background:#333; color:#ff4; padding:1px 5px; border-radius:3px; font-size:10px; margin:0 2px; }
</style>
</head>
<body>

<div id="hud">
 <div>FPS: <span class="val" id="fps">--</span></div>
 <div>帧耗时: <span class="val" id="framems">--</span> ms</div>
 <div>代理顶点: <span class="val" id="vcount">--</span></div>
 <div>高模顶点: <span class="val" id="hcount">--</span></div>
 <div>皮筋: <span class="val" id="bcount">0</span></div>
 <div>体积: <span class="val" id="vratio">100</span>%</div>
 <div>周长比 <span class="val" id="cratio">--</span></div>
 <div>PBD迭代: <span class="val" id="pbditer">10</span></div>
 <div>PBD耗时: <span class="val" id="pbdtime">--</span> ms</div>
 <div>皮筋耗时: <span class="val" id="bandtime">--</span> ms</div>
</div>
<div id="info">
 Click surface to bind band (normal dir) &nbsp; <span class="kb">R</span>=割一?&nbsp; <span class="kb">C</span>=全部割掉 &nbsp; <span class="kb">拖拽</span>=旋转 &nbsp; <span class="kb">滚轮</span>=缩放 &nbsp; <span style="color:#ff44cc">?GPU PBD + Three.js WebGPU</span>
</div>
<div id="panel">
 <h3>🔧 PBD 参数</h3>
 <label>形状刚度 <span class="val" id="sv_ss">0.30</span></label>
 <input type="range" id="sl_ss" min="0.01" max="1.0" step="0.01" value="0.30">
 <label>皮筋刚度 <span class="val" id="sv_bs">0.500</span></label>
 <input type="range" id="sl_bs" min="0.001" max="1.0" step="0.001" value="0.500">
 <label>体积刚度 <span class="val" id="sv_vs">0.40</span></label>
 <input type="range" id="sl_vs" min="0.01" max="1.0" step="0.01" value="0.40">
 <label>影响范围 <span class="val" id="sv_bi">0.60</span></label>
 <input type="range" id="sl_bi" min="0.2" max="2.0" step="0.05" value="0.60">
 <label>目标周长 L₀ <span class="val" id="sv_rc">2.51</span></label>
 <input type="range" id="sl_rc" min="0.3" max="8.0" step="0.01" value="2.51">
 <label>PBD迭代 <span class="val" id="sv_pi">10</span></label>
 <input type="range" id="sl_pi" min="1" max="30" step="1" value="10">
 <label>收敛帧数 <span class="val" id="sv_cf">5</span></label>
 <input type="range" id="sl_cf" min="1" max="20" step="1" value="5">

 <h3>🎯 最后皮筋<span class="val" id="lb_info">(空)</span></h3>
 <label>rest周长 <span class="val" id="sv_lr">--</span></label>
 <input type="range" id="sl_lr" min="0.3" max="8.0" step="0.01" value="2.51">
 <div class="row"><span>法向X</span><input type="range" id="sl_nx" min="-1" max="1" step="0.01" value="0"><span class="val" id="sv_nx">0</span></div>
 <div class="row"><span>法向Y</span><input type="range" id="sl_ny" min="-1" max="1" step="0.01" value="1"><span class="val" id="sv_ny">1</span></div>
 <div class="row"><span>法向Z</span><input type="range" id="sl_nz" min="-1" max="1" step="0.01" value="0"><span class="val" id="sv_nz">0</span></div>
 <div class="row"><span>刚度</span><input type="range" id="sl_bk" min="0.001" max="1" step="0.001" value="0.500"><span class="val" id="sv_bk">0.500</span></div>
 <button class="btn" id="btn_normalize">归一化法向量</button>
 <button class="btn" id="btn_horiz">设为水平</button>

 <h3>🎀 皮筋渲染</h3>
 <label>带宽 <span class="val" id="sv_rw">0.025</span></label>
 <input type="range" id="sl_rw" min="0.003" max="0.12" step="0.001" value="0.025">
 <label>厚度 <span class="val" id="sv_rt">0.006</span></label>
 <input type="range" id="sl_rt" min="0.001" max="0.06" step="0.001" value="0.015">
 <label>粗糙度<span class="val" id="sv_rr">0.45</span></label>
 <input type="range" id="sl_rr" min="0.05" max="1.0" step="0.01" value="0.45">
 <label>各向异性<span class="val" id="sv_an">0.30</span></label>
 <input type="range" id="sl_an" min="0.0" max="0.8" step="0.01" value="0.30">
 <label>表面抬升 <span class="val" id="sv_rso">0.004</span></label>
 <input type="range" id="sl_rso" min="0.0" max="0.10" step="0.001" value="0.004">
 <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:8px;">
  <input type="checkbox" id="cb_target" checked style="accent-color:#ff44cc;width:16px;height:16px;">
  🟢 显示目标周长参考线
 </label>
 <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
  <input type="checkbox" id="cb_vol" checked style="accent-color:#44aaff;width:16px;height:16px;">
  📊 读回体积保持率 (HUD)
 </label>

 <h3>💡 光照</h3>
 <label>环境光强度<span class="val" id="sv_ai">0.50</span></label>
 <input type="range" id="sl_ai" min="0" max="3.0" step="0.01" value="0.50">
 <label>平行光强度<span class="val" id="sv_di">1.50</span></label>
 <input type="range" id="sl_di" min="0" max="5.0" step="0.01" value="1.50">
 <div class="row"><span>平行光X</span><input type="range" id="sl_dx" min="-10" max="10" step="0.1" value="0"><span class="val" id="sv_dx">0</span></div>
 <div class="row"><span>平行光Y</span><input type="range" id="sl_dy" min="-10" max="10" step="0.1" value="5"><span class="val" id="sv_dy">5</span></div>
 <div class="row"><span>平行光Z</span><input type="range" id="sl_dz" min="-10" max="10" step="0.1" value="0"><span class="val" id="sv_dz">0</span></div>
</div>

<canvas id="canvas"></canvas>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.177.0/build/three.webgpu.js", "three/addons/loaders/GLTFLoader.js": "https://cdn.jsdelivr.net/npm/three@0.177.0/examples/jsm/loaders/GLTFLoader.js" } }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ══════.?DOM ══════.?
const $=id=>document.getElementById(id);
const H={
  fps:$('fps'),framems:$('framems'),vcount:$('vcount'),hcount:$('hcount'),
  bcount:$('bcount'),vratio:$('vratio'),cratio:$('cratio'),
  pbditer:$('pbditer'),pbdtime:$('pbdtime'),bandtime:$('bandtime'),
};
const canvas=$('canvas');

// ═══════ WebGPU adapter ═══════
if(!navigator.gpu){alert('需要WebGPU！Chrome 113+');throw new Error('No WebGPU');}
let adapter=null;for(let i=0;i<3&&!adapter;i++){adapter=await navigator.gpu.requestAdapter({powerPreference:'high-performance'});if(!adapter&&i<2)await new Promise(r=>setTimeout(r,500));}
if(!adapter){alert('无法获取GPU适配器');throw new Error('No adapter');}
const device=await adapter.requestDevice({requiredLimits:{maxStorageBuffersPerShaderStage:10}});
device.addEventListener('uncapturederror',ev=>console.error('GPU error:',ev.error));
const queue=device.queue;

// ══════.?Three.js WebGPU Renderer ══════.?
const renderer = new THREE.WebGPURenderer({ canvas, device, antialias: true, alpha: false, depth: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
await renderer.init();

const scene = new THREE.Scene();
scene.background = new THREE.Color('#111122');
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(1.5, 1.8, 3.5);
camera.lookAt(0, 0, 0);
const ambientLight = new THREE.AmbientLight('#fff', 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight('#fff', 1.5);
dirLight.position.set(0, 5, 0);
scene.add(dirLight);

// Environment map for PBR (required for anisotropy)
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envMap = pmremGenerator.fromScene(scene, 0.5).texture;
scene.environment = envMap;
pmremGenerator.dispose();

// ══════.?State ══════.?
let proxyVertexCount=0, proxyTriCount=0, restVolume=0, restSurfaceArea=0;
let proxyRestPositions=null;     // CPU: proxy rest positions (flat float32)
let proxyCurPositions=null;      // CPU: proxy current positions (for CPU PBD)
let proxyIdxArr=null;            // CPU: proxy indices
let proxyRestNormals=null;       // CPU: proxy rest normals (gradient directions)
let highResCount=0;
let highResRestPositions=null;   // CPU: high-res rest positions
let highResIdxArr=null;          // CPU: high-res index array
let highResRestNormals=null;     // CPU: high-res rest normals
let nearestProxyIdx=null;        // CPU: nearest proxy vertex for each high-res vertex
// Spatial hash for fast surface projection
let _hashGrid=24, _hashBmin=null, _hashGs=null, _hashCells=null, _vertTris=null;
let pineappleMesh=null;
let proxyWireMesh=null;
let showProxyWire=false;
let modelMinY=-1.5,modelMaxY=1.5; // Y range of proxy model (for delta field)
let voxBMin=[0,0,0],voxGS=[0.1,0.1,0.1],VOX_TOTAL=64*64*64; // 64³ voxel grid

// PBD params
let SHAPE_STIFF=0.30, BAND_STIFF=0.50, VOL_STIFF=0.40, BAND_INFLU=0.60;
let BAND_REST_CIRCUM=2.51, PBD_ITER=10;
const DELTA_BUCKETS=256;
let pbdAccumTime=0, pbdConverged=false, convergeFrames=0, needsRestore=false;
let CONVERGE_FRAMES=5;
let lastVol=0;
function markPbdDirty(){pbdConverged=false;convergeFrames=0;pbdAccumTime=0;}

// Slider wiring
$('sl_ss').oninput=e=>{SHAPE_STIFF=+e.target.value;$('sv_ss').textContent=SHAPE_STIFF.toFixed(2);markPbdDirty();};
$('sl_bs').oninput=e=>{BAND_STIFF=+e.target.value;$('sv_bs').textContent=BAND_STIFF.toFixed(3);for(const b of bands)b.stiffness=BAND_STIFF;markPbdDirty();};
$('sl_vs').oninput=e=>{VOL_STIFF=+e.target.value;$('sv_vs').textContent=VOL_STIFF.toFixed(2);markPbdDirty();};
$('sl_bi').oninput=e=>{BAND_INFLU=+e.target.value;$('sv_bi').textContent=BAND_INFLU.toFixed(2);for(const b of bands)b.influRadius=BAND_INFLU;markPbdDirty();};
$('sl_rc').oninput=e=>{
  BAND_REST_CIRCUM=+e.target.value;$('sv_rc').textContent=BAND_REST_CIRCUM.toFixed(2);
  for(const b of bands){
    b.restCircum=BAND_REST_CIRCUM;
    // Recompute preScale when L₀ changes
    if(b.restPerimeter>0)b.preScale=BAND_REST_CIRCUM/b.restPerimeter;
  }
  markPbdDirty();
};
$('sl_pi').oninput=e=>{PBD_ITER=+e.target.value;$('sv_pi').textContent=PBD_ITER;H.pbditer.textContent=PBD_ITER;markPbdDirty();};
$('sl_cf').oninput=e=>{CONVERGE_FRAMES=+e.target.value;$('sv_cf').textContent=CONVERGE_FRAMES;markPbdDirty();};

// Ribbon visual sliders
function updateAllRibbonMaterials(){
  if(_sharedRibbonMesh&&_sharedRibbonMesh.material){
    _sharedRibbonMesh.material.roughness=RIBBON_ROUGHNESS;
    _sharedRibbonMesh.material.anisotropy=RIBBON_ANISOTROPY;
  }
}
function rebuildAllRibbonVisuals(){
  // Rebuild ribbon geometry with new width/thickness/offset (per-vertex stack auto-computed)
  for(let i=0;i<bands.length;i++)updateBandVisual(i);
}
$('sl_rw').oninput=e=>{RIBBON_HALF_WIDTH=+e.target.value;$('sv_rw').textContent=RIBBON_HALF_WIDTH.toFixed(3);markPbdDirty();};
$('sl_rt').oninput=e=>{RIBBON_THICKNESS=+e.target.value;$('sv_rt').textContent=RIBBON_THICKNESS.toFixed(3);markPbdDirty();};
$('sl_rr').oninput=e=>{RIBBON_ROUGHNESS=+e.target.value;$('sv_rr').textContent=RIBBON_ROUGHNESS.toFixed(2);updateAllRibbonMaterials();};
$('sl_an').oninput=e=>{RIBBON_ANISOTROPY=+e.target.value;$('sv_an').textContent=RIBBON_ANISOTROPY.toFixed(2);updateAllRibbonMaterials();};
$('sl_rso').oninput=e=>{RIBBON_SURFACE_OFFSET=+e.target.value;$('sv_rso').textContent=RIBBON_SURFACE_OFFSET.toFixed(3);markPbdDirty();};

// Target line toggle
let showTargetLine = true;
$('cb_target').onchange = e => {
  showTargetLine = e.target.checked;
  for (const vis of bandVisuals) {
    if (vis.lineTarget) vis.lineTarget.visible = showTargetLine;
  }
};

// Volume readback toggle
let showVolumeReadback = true;
$('cb_vol').onchange = e => { showVolumeReadback = e.target.checked; };

// Lighting sliders
$('sl_ai').oninput=e=>{const v=+e.target.value;ambientLight.intensity=v;$('sv_ai').textContent=v.toFixed(2);};
$('sl_di').oninput=e=>{const v=+e.target.value;dirLight.intensity=v;$('sv_di').textContent=v.toFixed(2);};
$('sl_dx').oninput=e=>{const v=+e.target.value;dirLight.position.x=v;$('sv_dx').textContent=v.toFixed(1);};
$('sl_dy').oninput=e=>{const v=+e.target.value;dirLight.position.y=v;$('sv_dy').textContent=v.toFixed(1);};
$('sl_dz').oninput=e=>{const v=+e.target.value;dirLight.position.z=v;$('sv_dz').textContent=v.toFixed(1);};

// ══════.?Band System ══════.?
const MAX_BANDS=256;
const bands=[];
const bandVisuals=[];  // {lineTarget: THREE.Line}  (ribbon mesh is shared _sharedRibbonMesh)

// Ribbon parameters (world units; pineapple height ~3)
let RIBBON_HALF_WIDTH = 0.025;     // ~2.5cm half-width ?5cm total band width (clearly visible)
let RIBBON_THICKNESS  = 0.015;     // ~15mm visible thickness
let RIBBON_SURFACE_OFFSET = 0.004; // ~4mm lift above surface to avoid z-fight
let RIBBON_ROUGHNESS = 0.45;       // PBR roughness
let RIBBON_ANISOTROPY = 0.30;    // anisotropic stretch (0=round, 1=line)
let RIBBON_WIDTH_SEGMENTS = 4;   // subdivisions across band width

// ── Legacy line helpers (kept for target green line + hover preview) ──
function makeBandLine(color,opacity){
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(2048*3),3));
  geo.setDrawRange(0,0);
  const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity,depthTest:false,depthWrite:false});
  const line=new THREE.Line(geo,mat);
  line.renderOrder=2;line.frustumCulled=false;
  line.visible=false;
  scene.add(line);return line;
}
function updateBandLine(line,points3D){
  const nPts=points3D.length/3;
  if(nPts===0){line.visible=false;return;}
  line.visible=true;
  const posAttr=line.geometry.attributes.position;
  if((nPts+1)*3>posAttr.array.length)return;
  posAttr.array.set(points3D);
  posAttr.array[nPts*3]=points3D[0];
  posAttr.array[nPts*3+1]=points3D[1];
  posAttr.array[nPts*3+2]=points3D[2];
  posAttr.needsUpdate=true;
  line.geometry.setDrawRange(0,nPts+1);
}

// ── Ribbon mesh (PBR: copy proxy triangles in band .?offset for thickness) ──

// Compute smooth vertex normals from current positions (on the fly)
function computeSmoothNormals(posArr,idxArr,vc){
  const norms=new Float32Array(vc*3);
  for(let t=0;t<idxArr.length;t+=3){
    const a=idxArr[t],b=idxArr[t+1],c=idxArr[t+2];
    const a3=a*3,b3=b*3,c3=c*3;
    const e1x=posArr[b3]-posArr[a3],e1y=posArr[b3+1]-posArr[a3+1],e1z=posArr[b3+2]-posArr[a3+2];
    const e2x=posArr[c3]-posArr[a3],e2y=posArr[c3+1]-posArr[a3+1],e2z=posArr[c3+2]-posArr[a3+2];
    const nx=e1y*e2z-e1z*e2y,ny=e1z*e2x-e1x*e2z,nz=e1x*e2y-e1y*e2x;
    norms[a3]+=nx;norms[a3+1]+=ny;norms[a3+2]+=nz;
    norms[b3]+=nx;norms[b3+1]+=ny;norms[b3+2]+=nz;
    norms[c3]+=nx;norms[c3+1]+=ny;norms[c3+2]+=nz;
  }
  for(let i=0;i<vc;i++){
    const i3=i*3;
    const l=Math.sqrt(norms[i3]*norms[i3]+norms[i3+1]*norms[i3+1]+norms[i3+2]*norms[i3+2])||1;
    norms[i3]/=l;norms[i3+1]/=l;norms[i3+2]/=l;
    // Ensure outward (for convex-ish mesh centered near origin, dot(normal,pos) should be >0)
    if(posArr[i3]*norms[i3]+posArr[i3+1]*norms[i3+1]+posArr[i3+2]*norms[i3+2]<0){
      norms[i3]=-norms[i3];norms[i3+1]=-norms[i3+1];norms[i3+2]=-norms[i3+2];
    }
  }
  return norms;
}

function createBandRibbonMesh(bandIndex){
  const geo=new THREE.BufferGeometry();
  const MAX_VERTS=2048*36;
  const posAttr=new THREE.Float32BufferAttribute(new Float32Array(MAX_VERTS*3),3);
  const normAttr=new THREE.Float32BufferAttribute(new Float32Array(MAX_VERTS*3),3);
  const uvAttr=new THREE.Float32BufferAttribute(new Float32Array(MAX_VERTS*2),2);
  const tanAttr=new THREE.Float32BufferAttribute(new Float32Array(MAX_VERTS*4),4);
  // Force GPU buffer allocation on first render (even when invisible)
  posAttr.needsUpdate=true; normAttr.needsUpdate=true; uvAttr.needsUpdate=true; tanAttr.needsUpdate=true;
  geo.setAttribute('position',posAttr);
  geo.setAttribute('normal',normAttr);
  geo.setAttribute('uv',uvAttr);
  geo.setAttribute('tangent',tanAttr);
  geo.setDrawRange(0,0);
  const mat=new THREE.MeshPhysicalMaterial({
    color:'#d4a017',roughness:RIBBON_ROUGHNESS,metalness:0.0,
    anisotropy:RIBBON_ANISOTROPY,anisotropyRotation:Math.PI/2,
    side:THREE.DoubleSide,depthTest:true,depthWrite:true,
    polygonOffset:true, polygonOffsetFactor:1.0, polygonOffsetUnits:1.0,
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.renderOrder=bandIndex+1;mesh.frustumCulled=false;mesh.visible=false;
  mesh.castShadow=true;mesh.receiveShadow=false;
  scene.add(mesh);

  return mesh;
}

function updateBandRibbonMesh(mesh, band, bandIndex){
  const n=band.planeNormal, o=band.planeOrigin;
  const hw=RIBBON_HALF_WIDTH;

  // Per-vertex local stack offsets (Level 3b: each vertex independently)
  const pvo = computePerVertexOffsets(bandIndex);
  const vOffLo = pvo.offLo, vOffHi = pvo.offHi;

  // 1. Compute mesh centroid + outer/inner positions (per-vertex offsets)
  let cx=0,cy=0,cz=0;
  for(let i=0;i<proxyVertexCount;i++){
    const i3=i*3;
    cx+=proxyCurPositions[i3];cy+=proxyCurPositions[i3+1];cz+=proxyCurPositions[i3+2];
  }
  cx/=proxyVertexCount;cy/=proxyVertexCount;cz/=proxyVertexCount;
  const outerPos=new Float32Array(proxyVertexCount*3);
  const innerPos=new Float32Array(proxyVertexCount*3);
  const radialN=new Float32Array(proxyVertexCount*3);
  for(let i=0;i<proxyVertexCount;i++){
    const i3=i*3;
    const px=proxyCurPositions[i3],py=proxyCurPositions[i3+1],pz=proxyCurPositions[i3+2];
    let nx=px-cx,ny=py-cy,nz=pz-cz;
    const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
    nx/=nl;ny/=nl;nz/=nl;
    radialN[i3]=nx;radialN[i3+1]=ny;radialN[i3+2]=nz;
    const oh=vOffHi[i], ol=vOffLo[i];
    outerPos[i3]=px+nx*oh;outerPos[i3+1]=py+ny*oh;outerPos[i3+2]=pz+nz*oh;
    innerPos[i3]=px+nx*ol;innerPos[i3+1]=py+ny*ol;innerPos[i3+2]=pz+nz*ol;
  }

  // 2. Cut outer & inner meshes with two parallel planes at ±hw
  const oL=getExactCrossSectionPolyline(outerPos,proxyIdxArr,[o[0]-n[0]*hw,o[1]-n[1]*hw,o[2]-n[2]*hw],n);
  const oR=getExactCrossSectionPolyline(outerPos,proxyIdxArr,[o[0]+n[0]*hw,o[1]+n[1]*hw,o[2]+n[2]*hw],n);

  {const dot=ux*normal[0]+uy*normal[1]+uz*normal[2];ux-=dot*normal[0];uy-=dot*normal[1];uz-=dot*normal[2];}
  {const ul=Math.sqrt(ux*ux+uy*uy+uz*uz);ux/=ul;uy/=ul;uz/=ul;}
  const vx=normal[1]*uz-normal[2]*uy,vy=normal[2]*ux-normal[0]*uz,vz=normal[0]*uy-normal[1]*ux;

  const polar=[];
  for(const p of pts){
    const rx=p[0]-cx,ry=p[1]-cy,rz=p[2]-cz;
    const ru=rx*ux+ry*uy+rz*uz,rv=rx*vx+ry*vy+rz*vz;
    polar.push({ang:Math.atan2(rv,ru),p});
  }
  polar.sort((a,b)=>a.ang-b.ang);

  const pts3D=[];
  const DEDUP=1e-6;
  for(const{ang,p}of polar){
    if(pts3D.length>=3){
      const l=pts3D.length-3;
      const dx=p[0]-pts3D[l],dy=p[1]-pts3D[l+1],dz=p[2]-pts3D[l+2];
      if(Math.sqrt(dx*dx+dy*dy+dz*dz)<DEDUP)continue;
    }
    pts3D.push(p[0],p[1],p[2]);
  }

  let perim=0;
  for(let i=0;i<pts3D.length/3;i++){
    const i3=i*3,j3=((i+1)%(pts3D.length/3))*3;
    const dx=pts3D[j3]-pts3D[i3],dy=pts3D[j3+1]-pts3D[i3+1],dz=pts3D[j3+2]-pts3D[i3+2];
    perim+=Math.sqrt(dx*dx+dy*dy+dz*dz);
  }
  return{points3D:pts3D,centroid:[cx,cy,cz],perimeter:perim};
}

function smoothstep(e0,e1,x){const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0)));return t*t*(3-2*t);}

// ══════.?Band overlap & stacking helpers (Level 3b: per-vertex local compression) ══════.?
const BAND_COMPRESSION_PER_LAYER = 0.30; // 30% thickness reduction per pressing band above

// Test if a 3D point lies within a band's belt (perpendicular distance < half-width * 2.5)
function pointInBandBelt(band, px, py, pz) {
  const d = Math.abs(
    (px - band.planeOrigin[0]) * band.planeNormal[0] +
    (py - band.planeOrigin[1]) * band.planeNormal[1] +
    (pz - band.planeOrigin[2]) * band.planeNormal[2]
  );
  return d < RIBBON_HALF_WIDTH * 2.5;
}

// Per-vertex stack computation for a single band.
// For each proxy vertex, determines which other bands cover it,
// then computes cumulative stack below + this band's thickness after squash.
// Returns {offLo: Float32Array(proxyVertexCount), offHi: Float32Array(proxyVertexCount)}
function computePerVertexOffsets(bandIndex) {
  const vc = proxyVertexCount;
  const offLoArr = new Float32Array(vc);
  const offHiArr = new Float32Array(vc);
  const bc = bands.length;
  if (bc <= 1) {
    // Only one band .?uniform offset
    offLoArr.fill(RIBBON_SURFACE_OFFSET);
    offHiArr.fill(RIBBON_SURFACE_OFFSET + RIBBON_THICKNESS);
    return {offLo: offLoArr, offHi: offHiArr};
  }

  // Pre-compute per-vertex coverage: coveredByVert[b][v] = bool
  // Use bit mask stored in Uint8Array for compactness
  const coveredByVert = new Uint8Array(vc * bc); // 0 or 1
  for (let b = 0; b < bc; b++) {
    const band = bands[b];
    const ox = band.planeOrigin[0], oy = band.planeOrigin[1], oz = band.planeOrigin[2];
    const nx = band.planeNormal[0], ny = band.planeNormal[1], nz = band.planeNormal[2];
    const tol = RIBBON_HALF_WIDTH * 2.5;
    const off = b * vc;
    for (let v = 0; v < vc; v++) {
      const i3 = v * 3;
      const d = Math.abs((proxyCurPositions[i3] - ox) * nx + (proxyCurPositions[i3+1] - oy) * ny + (proxyCurPositions[i3+2] - oz) * nz);
      coveredByVert[off + v] = (d < tol) ? 1 : 0;
    }
  }

  // For each vertex, compute per-band effective thickness (accounting for bands above)
  // effThickness[b][v] = RIBBON_THICKNESS / (1 + count_of_bands_above_covering_v * COMPRESSION)
  const effThick = new Float32Array(vc * bc);
  for (let b = 0; b < bc; b++) {
    const offB = b * vc;
    for (let v = 0; v < vc; v++) {
      if (coveredByVert[offB + v]) {
        let aboveCount = 0;
        for (let k = b + 1; k < bc; k++) {
          if (coveredByVert[k * vc + v]) aboveCount++;
        }
        effThick[offB + v] = RIBBON_THICKNESS / (1.0 + aboveCount * BAND_COMPRESSION_PER_LAYER);
      }
    }
  }

  // Now compute offLo/offHi for the target band at each vertex
  for (let v = 0; v < vc; v++) {
    // Stack below: sum of effective thicknesses of bands j < bandIndex covering this vertex
    let stackBelow = 0;
    for (let j = 0; j < bandIndex; j++) {
      if (coveredByVert[j * vc + v]) {
        stackBelow += effThick[j * vc + v];
      }
    }

    // This band's own effective thickness at this vertex
    const myEff = effThick[bandIndex * vc + v] || RIBBON_THICKNESS;

    // Count bands above covering this vertex (for HUD/debug)
    let aboveCount = 0;
    for (let k = bandIndex + 1; k < bc; k++) {
      if (coveredByVert[k * vc + v]) aboveCount++;
    }
    const myThick = RIBBON_THICKNESS / (1.0 + aboveCount * BAND_COMPRESSION_PER_LAYER);

    offLoArr[v] = RIBBON_SURFACE_OFFSET + stackBelow;
    offHiArr[v] = offLoArr[v] + myThick;
  }

  return {offLo: offLoArr, offHi: offHiArr};
}

// ══════.?Band add/remove ══════.?
// Precompute 64 angle-bin rest radii + preScale for radius-based constraint
function computeBandRestRadii(origin,normal,restPos,restIdx){
  const exact=getExactCrossSectionPolyline(restPos,restIdx,origin,normal);
  if(exact.points3D.length<9)return null;
  const cx=exact.centroid[0],cy=exact.centroid[1],cz=exact.centroid[2];
  // Build 2D basis on plane (same as WGSL shader)
  var ux,uy,uz;
  if(Math.abs(normal[0])<0.9){ux=1;uy=0;uz=0;}else{ux=0;uy=0;uz=1;}
  const du=ux*normal[0]+uy*normal[1]+uz*normal[2];ux-=du*normal[0];uy-=du*normal[1];uz-=du*normal[2];
  const ul=Math.sqrt(ux*ux+uy*uy+uz*uz);ux/=ul;uy/=ul;uz/=ul;
  const vx=normal[1]*uz-normal[2]*uy,vy=normal[2]*ux-normal[0]*uz,vz=normal[0]*uy-normal[1]*ux;
  // Bin 64 angles, accumulate radius per bin
  const radii=new Float32Array(64);
  const counts=new Uint32Array(64);
  for(let i=0;i<exact.points3D.length;i+=3){
    const px=exact.points3D[i],py=exact.points3D[i+1],pz=exact.points3D[i+2];
    const dx=px-cx,dy=py-cy,dz=pz-cz;
    const ru=dx*ux+dy*uy+dz*uz,rv=dx*vx+dy*vy+dz*vz;
    const ang=Math.atan2(rv,ru);
    const binIdx=Math.floor((ang+Math.PI)/(2*Math.PI)*64)%64;
    const r=Math.sqrt(dx*dx+dy*dy+dz*dz);
    radii[binIdx]+=r;counts[binIdx]++;
  }
  // Average and fill empty bins from neighbors
  for(let i=0;i<64;i++){
    if(counts[i]>0){radii[i]/=counts[i];}
  }
  for(let i=0;i<64;i++){
    if(counts[i]===0){
      for(let d=1;d<32;d++){
        const j=(i+d)%64;if(counts[j]>0){radii[i]=radii[j];break;}
        const k=(i-d+64)%64;if(counts[k]>0){radii[i]=radii[k];break;}
      }
    }
  }
  // Compute rest perimeter from chord lengths
  let perim=0;
  for(let i=0;i<64;i++){
    const j=(i+1)%64;
    const da=2*Math.PI/64;
    const r1=radii[i],r2=radii[j];
    perim+=Math.sqrt(r1*r1+r2*r2-2*r1*r2*Math.cos(da));
  }
  const preScale=exact.perimeter>0?BAND_REST_CIRCUM/exact.perimeter:1.0;
  console.log('📏 band precompute: exactPerimeter='+exact.perimeter.toFixed(3)+' binPerim='+perim.toFixed(3)+' L₀='+BAND_REST_CIRCUM.toFixed(3)+' preScale='+preScale.toFixed(4)+' radii range=['+Math.min(...radii).toFixed(3)+','+Math.max(...radii).toFixed(3)+']');
  return{radii,centroid:[cx,cy,cz],preScale,restPerimeter:exact.perimeter};
}

// Write precomputed rest radii for one band to GPU
function writeBandRestRadii(bIdx,radii){
  if(!bandRestRadiiB||!radii)return;
  queue.writeBuffer(bandRestRadiiB,bIdx*64*4,radii);
}

function addBand(origin,normal){
  if(bands.length>=MAX_BANDS){console.warn('达到最大皮筋数');return;}
  const nl=Math.sqrt(normal[0]**2+normal[1]**2+normal[2]**2);
  const nn=[normal[0]/nl,normal[1]/nl,normal[2]/nl];
  const pre=computeBandRestRadii(origin,nn,proxyRestPositions,proxyIdxArr);
  if(!pre){console.warn('截面不足,跳过');return;}
  const band={
    planeOrigin:[...origin],
    planeNormal:[...nn],
    restCircum:BAND_REST_CIRCUM,
    stiffness:BAND_STIFF,
    influRadius:BAND_INFLU,
    preScale:pre.preScale,
    restRadii:pre.radii,
    restCentroid:pre.centroid,
    restPerimeter:pre.restPerimeter,
  };
  bands.push(band);
  writeBandRestRadii(bands.length-1,pre.radii);
  const visTarget=makeBandLine('#33ff33',0.35);
  visTarget.visible = showTargetLine;
  bandVisuals.push({lineTarget:visTarget});
  H.bcount.textContent=bands.length;
  updateLastBandPanel(bands.length-1);
  markPbdDirty();
}
function removeBand(){
  if(bands.length===0)return;
  bands.pop();
  const vis=bandVisuals.pop();
  if(vis){
    vis.lineTarget.geometry.dispose();vis.lineTarget.material.dispose();scene.remove(vis.lineTarget);
  }
  H.bcount.textContent=bands.length;
  needsRestore=true;markPbdDirty();
  if(bands.length>0)updateLastBandPanel(bands.length-1);
  else{$('lb_info').textContent='(none)';}
}
function removeAllBands(){
  while(bands.length>0)removeBand();
}

// ══════.?Model Loading (dual: proxy + high-res) ══════.?
let loaded=false;

async function loadModel(name, doProcess, refTransform=null){
  const loader=new GLTFLoader();
  const gltf=await new Promise((res,rej)=>loader.load(name,res,undefined,rej));
  let srcMesh=null;gltf.scene.traverse(c=>{if(c.isMesh&&!srcMesh)srcMesh=c;});
  if(!srcMesh)throw new Error('No mesh in '+name);
  const srcGeo=srcMesh.geometry;
  srcGeo.computeBoundingBox();
  const cen=new THREE.Vector3();srcGeo.boundingBox.getCenter(cen);
  const siz=new THREE.Vector3();srcGeo.boundingBox.getSize(siz);
  const sc=refTransform?refTransform.sc:(3.0/siz.y);
  const offX=refTransform?refTransform.cen.x:cen.x;
  const offY=refTransform?refTransform.cen.y:cen.y;
  const offZ=refTransform?refTransform.cen.z:cen.z;
  const pa=srcGeo.attributes.position.array;
  const vc=srcGeo.attributes.position.count;
  const pos=new Float32Array(vc*3);
  for(let i=0;i<vc;i++){pos[i*3]=(pa[i*3]-offX)*sc;pos[i*3+1]=(pa[i*3+1]-offY)*sc;pos[i*3+2]=(pa[i*3+2]-offZ)*sc;}
  const idxArr=srcGeo.index?new Uint32Array(srcGeo.index.array):(()=>{const a=new Uint32Array(vc);for(let i=0;i<vc;i++)a[i]=i;return a;})();
  // Extract original normals from GLB (uniform scaling preserves direction)
  let origNormals=null;
  if(srcGeo.attributes.normal){
    const na=srcGeo.attributes.normal.array;
    origNormals=new Float32Array(vc*3);
    for(let i=0;i<vc;i++){
      origNormals[i*3]=na[i*3];origNormals[i*3+1]=na[i*3+1];origNormals[i*3+2]=na[i*3+2];
    }
  }
  return{pos,idxArr,srcGeo,srcMesh,transform:{cen:{x:offX,y:offY,z:offZ},sc},origNormals};
}

async function loadModels(){
  // Load proxy (small mesh for PBD)
  const proxyResult=await loadModel('pineapple_py.glb?t='+Date.now(), true);
  // Load high-res (display mesh) .?use proxy's transform for alignment
  const hr=await loadModel('pineapple.glb', false, proxyResult.transform);
  const srcGeo=hr.srcGeo;const hrPos=hr.pos;const hrIdx=hr.idxArr;
  const srcMesh=hr.srcMesh;

  // ── Proxy setup ──
  proxyVertexCount=proxyResult.pos.length/3;
  proxyTriCount=proxyResult.idxArr.length/3;
  proxyRestPositions=new Float32Array(proxyResult.pos);
  proxyCurPositions=new Float32Array(proxyResult.pos);
  proxyIdxArr=proxyResult.idxArr;
  // Compute proxy rest normals (gradient directions for volume constraint)
  const pvc=proxyVertexCount;
  proxyRestNormals=new Float32Array(pvc*3);
  {
    const grad=new Float32Array(pvc*3);
    for(let i=0;i<proxyIdxArr.length;i+=3){
      const ai=proxyIdxArr[i]*3,bi=proxyIdxArr[i+1]*3,ci=proxyIdxArr[i+2]*3;
      const ax=proxyRestPositions[ai],ay=proxyRestPositions[ai+1],az=proxyRestPositions[ai+2];
      const bx=proxyRestPositions[bi],by=proxyRestPositions[bi+1],bz=proxyRestPositions[bi+2];
      const cx=proxyRestPositions[ci],cy=proxyRestPositions[ci+1],cz=proxyRestPositions[ci+2];
      grad[ai]+=(by*cz-bz*cy)/6;grad[ai+1]+=(bz*cx-bx*cz)/6;grad[ai+2]+=(bx*cy-by*cx)/6;
      grad[bi]+=(cy*az-cz*ay)/6;grad[bi+1]+=(cz*ax-cx*az)/6;grad[bi+2]+=(cx*ay-cy*ax)/6;
      grad[ci]+=(ay*bz-az*by)/6;grad[ci+1]+=(az*bx-ax*bz)/6;grad[ci+2]+=(ax*by-ay*bx)/6;
    }
    for(let i=0;i<pvc;i++){
      const i3=i*3;
      let gx=grad[i3],gy=grad[i3+1],gz=grad[i3+2];
      const px=proxyRestPositions[i3],py=proxyRestPositions[i3+1],pz=proxyRestPositions[i3+2];
      if(px*gx+py*gy+pz*gz<0){gx=-gx;gy=-gy;gz=-gz;}
      const gm=Math.sqrt(gx*gx+gy*gy+gz*gz);
      if(gm>1e-9){proxyRestNormals[i3]=gx/gm;proxyRestNormals[i3+1]=gy/gm;proxyRestNormals[i3+2]=gz/gm;}
    }
  }

  // Compute proxy rest volume + surface area
  restVolume=0;restSurfaceArea=0;
  for(let t=0;t<proxyIdxArr.length;t+=3){
    const ai=proxyIdxArr[t]*3,bi=proxyIdxArr[t+1]*3,ci=proxyIdxArr[t+2]*3;
    const ax=proxyRestPositions[ai],ay=proxyRestPositions[ai+1],az=proxyRestPositions[ai+2];
    const bx=proxyRestPositions[bi],by=proxyRestPositions[bi+1],bz=proxyRestPositions[bi+2];
    const cx=proxyRestPositions[ci],cy=proxyRestPositions[ci+1],cz=proxyRestPositions[ci+2];
    restVolume+=(ax*(by*cz-bz*cy)+ay*(bz*cx-bx*cz)+az*(bx*cy-by*cx))/6;
    const abx=bx-ax,aby=by-ay,abz=bz-az,acx=cx-ax,acy=cy-ay,acz=cz-az;
    restSurfaceArea+=0.5*Math.sqrt((aby*acz-abz*acy)**2+(abz*acx-abx*acz)**2+(abx*acy-aby*acx)**2);
  }
  restVolume=Math.abs(restVolume);
  lastVol=restVolume;
  H.vcount.textContent=proxyVertexCount.toLocaleString();
  H.vratio.textContent='100.0';
  console.log('Proxy model:',proxyVertexCount.toLocaleString(),'verts,',Math.round(proxyTriCount).toLocaleString(),'tris');
  console.log('   restVolume:',restVolume.toFixed(4),'restSurfaceArea:',restSurfaceArea.toFixed(2));

  // ── High-res setup ──
  highResCount=hrPos.length/3;
  highResRestPositions=new Float32Array(hrPos);
  highResIdxArr=hrIdx;
  highResRestNormals=hr.origNormals;
  H.hcount.textContent=highResCount.toLocaleString();

  // Compute Y range for delta field (from proxy model)
  modelMinY=Infinity;modelMaxY=-Infinity;
  for(let i=0;i<proxyVertexCount;i++){const y=proxyRestPositions[i*3+1];if(y<modelMinY)modelMinY=y;if(y>modelMaxY)modelMaxY=y;}
  if(!isFinite(modelMinY)){modelMinY=-1.5;modelMaxY=1.5;}
  console.log('📏 代理Y范围:',modelMinY.toFixed(3),'~',modelMaxY.toFixed(3));

  // Compute voxel grid bounds (3D bounding box, expanded 5%)
  const vpad=0.05;
  voxBMin=[Infinity,Infinity,Infinity];const vBMax=[-Infinity,-Infinity,-Infinity];
  for(let i=0;i<proxyVertexCount;i++){for(let k=0;k<3;k++){const v=proxyRestPositions[i*3+k];if(v<voxBMin[k])voxBMin[k]=v;if(v>vBMax[k])vBMax[k]=v;}}
  for(let k=0;k<3;k++){const r=vBMax[k]-voxBMin[k];voxBMin[k]-=r*vpad;vBMax[k]+=r*vpad;voxGS[k]=(vBMax[k]-voxBMin[k])/64;}
  console.log('📦 体素网格: bmin=('+voxBMin.map(v=>v.toFixed(2)).join(',')+') gs=('+voxGS.map(v=>v.toFixed(3)).join(',')+')');

  // ── CPU nearest-proxy with spatial hash ──
  nearestProxyIdx=new Uint32Array(highResCount);
  const tHash=performance.now();
  // Build 3D spatial hash grid for proxy vertices .?make global for fast projection
  _hashGrid=24;
  _hashBmin=[Infinity,Infinity,Infinity];const _hbmax=[-Infinity,-Infinity,-Infinity];
  for(let i=0;i<proxyVertexCount;i++){
    for(let k=0;k<3;k++){const v=proxyRestPositions[i*3+k];if(v<_hashBmin[k])_hashBmin[k]=v;if(v>_hbmax[k])_hbmax[k]=v;}
  }
  _hashGs=[(_hbmax[0]-_hashBmin[0])/_hashGrid+1e-6,(_hbmax[1]-_hashBmin[1])/_hashGrid+1e-6,(_hbmax[2]-_hashBmin[2])/_hashGrid+1e-6];
  _hashCells=Array.from({length:_hashGrid*_hashGrid*_hashGrid},()=>[]);
  for(let i=0;i<proxyVertexCount;i++){
    const ix=Math.min(_hashGrid-1,Math.floor((proxyRestPositions[i*3]-_hashBmin[0])/_hashGs[0]));
    const iy=Math.min(_hashGrid-1,Math.floor((proxyRestPositions[i*3+1]-_hashBmin[1])/_hashGs[1]));
    const iz=Math.min(_hashGrid-1,Math.floor((proxyRestPositions[i*3+2]-_hashBmin[2])/_hashGs[2]));
    _hashCells[(ix*_hashGrid+iy)*_hashGrid+iz].push(i);
  }
  // Build vertex→triangle adjacency
  _vertTris=Array.from({length:proxyVertexCount},()=>[]);
  for(let t=0;t<proxyIdxArr.length;t+=3){
    _vertTris[proxyIdxArr[t]].push(t/3);
    _vertTris[proxyIdxArr[t+1]].push(t/3);
    _vertTris[proxyIdxArr[t+2]].push(t/3);
  }
  // For each high-res vertex, search 27 neighboring cells
  let fallbackCount=0;
  for(let i=0;i<highResCount;i++){
    const hx=highResRestPositions[i*3],hy=highResRestPositions[i*3+1],hz=highResRestPositions[i*3+2];
    const ix=Math.min(_hashGrid-1,Math.max(0,Math.floor((hx-_hashBmin[0])/_hashGs[0])));
    const iy=Math.min(_hashGrid-1,Math.max(0,Math.floor((hy-_hashBmin[1])/_hashGs[1])));
    const iz=Math.min(_hashGrid-1,Math.max(0,Math.floor((hz-_hashBmin[2])/_hashGs[2])));
    let bestD=Infinity,bestJ=0;
    for(let radius=1;radius<=_hashGrid&&bestD===Infinity;radius++){
      for(let dx=-radius;dx<=radius;dx++){for(let dy=-radius;dy<=radius;dy++){for(let dz=-radius;dz<=radius;dz++){
        if(Math.abs(dx)<radius&&Math.abs(dy)<radius&&Math.abs(dz)<radius)continue;
        const cx=ix+dx,cy=iy+dy,cz=iz+dz;
        if(cx<0||cx>=_hashGrid||cy<0||cy>=_hashGrid||cz<0||cz>=_hashGrid)continue;
        for(const j of _hashCells[(cx*_hashGrid+cy)*_hashGrid+cz]){
          const px=proxyRestPositions[j*3],py=proxyRestPositions[j*3+1],pz=proxyRestPositions[j*3+2];
          const d=(hx-px)**2+(hy-py)**2+(hz-pz)**2;
          if(d<bestD){bestD=d;bestJ=j;}
        }
      }}}
      if(radius>1&&bestD<Infinity)fallbackCount++;
    }
    nearestProxyIdx[i]=bestJ;
  }
  console.log('🔗 CPU最近邻映射:',(performance.now()-tHash).toFixed(0),'ms (grid',_hashGrid+'³, fallback:',fallbackCount+'/'+highResCount+')');

  // Create Three.js high-res mesh
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(hrPos),3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(new Float32Array(highResRestNormals),3));
  if(srcGeo.attributes.uv)geo.setAttribute('uv',srcGeo.attributes.uv.clone());
  geo.setIndex(new THREE.BufferAttribute(hrIdx,1));
  const mat=srcMesh.material||new THREE.MeshStandardMaterial({color:'#cc9944',roughness:0.6,metalness:0.0});
  pineappleMesh=new THREE.Mesh(geo,mat);
  scene.add(pineappleMesh);

  // Proxy wireframe overlay
  const edgeMap=new Map();
  for(let t=0;t<proxyIdxArr.length;t+=3){
    for(let e=0;e<3;e++){
      const a=proxyIdxArr[t+e],b=proxyIdxArr[t+(e+1)%3];
      const key=Math.min(a,b)*proxyVertexCount+Math.max(a,b);
      if(!edgeMap.has(key))edgeMap.set(key,[a,b]);
    }
  }
  const edgeIdx=new Uint32Array(edgeMap.size*2);let ei=0;
  for(const[a,b]of edgeMap.values()){edgeIdx[ei++]=a;edgeIdx[ei++]=b;}
  const wireGeo=new THREE.BufferGeometry();
  wireGeo.setAttribute('position',new THREE.Float32BufferAttribute(new Float32Array(proxyRestPositions),3));
  wireGeo.setIndex(new THREE.BufferAttribute(edgeIdx,1));
  proxyWireMesh=new THREE.LineSegments(wireGeo,new THREE.LineBasicMaterial({color:'#ff44ff',transparent:true,opacity:0.7,depthTest:false,depthWrite:false}));
  proxyWireMesh.visible=false;proxyWireMesh.renderOrder=999;
  scene.add(proxyWireMesh);

  // ── TEST: offset vertices along direction to centroid ──
  if(false){
    // Mesh centroid
    let cx=0,cy=0,cz=0;
    for(let i=0;i<proxyVertexCount;i++){
      const i3=i*3;
      cx+=proxyRestPositions[i3];cy+=proxyRestPositions[i3+1];cz+=proxyRestPositions[i3+2];
    }
    cx/=proxyVertexCount;cy/=proxyVertexCount;cz/=proxyVertexCount;
    const offset=0.30;
    const enlargedPos=new Float32Array(proxyVertexCount*3);
    for(let i=0;i<proxyVertexCount;i++){
      const i3=i*3;
      const px=proxyRestPositions[i3],py=proxyRestPositions[i3+1],pz=proxyRestPositions[i3+2];
      let nx=px-cx,ny=py-cy,nz=pz-cz;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      enlargedPos[i3]=px+nx/nl*offset;
      enlargedPos[i3+1]=py+ny/nl*offset;
      enlargedPos[i3+2]=pz+nz/nl*offset;
    }
    const bigWireGeo=new THREE.BufferGeometry();
    bigWireGeo.setAttribute('position',new THREE.Float32BufferAttribute(enlargedPos,3));
    bigWireGeo.setIndex(new THREE.BufferAttribute(edgeIdx,1));
    bigWireGeo.computeBoundingSphere();
    const bigWire=new THREE.LineSegments(bigWireGeo,new THREE.LineBasicMaterial({color:'#00ffff',transparent:true,opacity:0.8,depthTest:true,depthWrite:true}));
    bigWire.renderOrder=998;
    bigWire.name='enlargedProxyWire';
    scene.add(bigWire);
    console.log('🔵 青色线框 = 每个顶点沿质心方向推0.3单位，centroid:('+cx.toFixed(2)+','+cy.toFixed(2)+','+cz.toFixed(2)+')');
  }

  // Toggle wire button
  const btnWire=document.createElement('button');
  btnWire.className='btn';btnWire.textContent='🔍 代理线框: OFF';
  btnWire.onclick=()=>{showProxyWire=!showProxyWire;proxyWireMesh.visible=showProxyWire;btnWire.textContent='🔍 代理线框: '+(showProxyWire?'ON':'OFF');};
  $('panel').appendChild(btnWire);

  console.log('Hi-res:',highResCount.toLocaleString(),'顶点, 代理:',proxyVertexCount.toLocaleString(),'顶点');
  // Diagnostic: check high-res rest normals (should be outward)
  {let inCnt=0;for(let i=0;i<Math.min(highResCount,1000);i++){
    const px=hrPos[i*3],py=hrPos[i*3+1],pz=hrPos[i*3+2];
    const nx=highResRestNormals[i*3],ny=highResRestNormals[i*3+1],nz=highResRestNormals[i*3+2];
    if(px*nx+py*ny+pz*nz<0)inCnt++;
  }console.log('🔍 高模法线朝内比例:',(inCnt/Math.min(highResCount,1000)*100).toFixed(1),'% (应为0%)');}
  console.log('Delta Y range:',modelMinY.toFixed(3),'~',modelMaxY.toFixed(3));

  await initGPU();
  loaded=true;
}

// ── 3D Voxel Delta Field ──
// Voxel grid: 32³ cells, each stores accumulated displacement + weight (fixed-point u32)
// WGSL constants VOX=32, FIXED_SCALE=1048576.0 are inlined in shader code below

// Pass 1: scatter proxy displacement to 8 neighboring voxels via trilinear weights
const voxelScatterCS=device.createShaderModule({label:'voxelScatter',code:`
const FIXED_SCALE=1048576.0;
struct P{vc:u32,grid:u32,bminX:f32,bminY:f32,bminZ:f32,gsX:f32,gsY:f32,gsZ:f32}
@group(0)@binding(0)var<storage,read>cur:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>rest:array<vec4<f32>>;
@group(0)@binding(2)var<storage,read_write>voxDx:array<atomic<i32>>;
@group(0)@binding(3)var<storage,read_write>voxDy:array<atomic<i32>>;
@group(0)@binding(4)var<storage,read_write>voxDz:array<atomic<i32>>;
@group(0)@binding(5)var<storage,read_write>voxW:array<atomic<u32>>;
@group(0)@binding(6)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let i=gid.x;if(i>=p.vc){return;}
  let disp=cur[i].xyz-rest[i].xyz;
  let rp=rest[i].xyz;
  // Voxel coordinate
  let vx=(rp.x-p.bminX)/p.gsX-0.5;let vy=(rp.y-p.bminY)/p.gsY-0.5;let vz=(rp.z-p.bminZ)/p.gsZ-0.5;
  let ix0=clamp(i32(floor(vx))-1,0,i32(p.grid)-4);let iy0=clamp(i32(floor(vy))-1,0,i32(p.grid)-4);let iz0=clamp(i32(floor(vz))-1,0,i32(p.grid)-4);
  let fx=vx-f32(ix0+1);let fy=vy-f32(iy0+1);let fz=vz-f32(iz0+1);
  let g=p.grid;
  // Quadratic B-spline kernel (4 points per dim, C1 continuous, 64 total)
  for(var dx=0u;dx<4u;dx++){for(var dy=0u;dy<4u;dy++){for(var dz=0u;dz<4u;dz++){
    // Quadratic B-spline basis: b(-1)=0.5*(0.5-f)², b(0)=0.75-f², b(1)=0.75-(1-f)², b(2)=0.5*(f-0.5)²
    var wx=0.0;
    if(dx==0u){wx=select(0.5*(0.5-fx)*(0.5-fx),0.0,fx<0.5);}
    else if(dx==1u){wx=select(0.75-fx*fx,0.5*(1.5-fx)*(1.5-fx),fx<0.5);}
    else if(dx==2u){wx=select(0.5*(0.5+fx)*(0.5+fx),0.75-(1.0-fx)*(1.0-fx),fx<0.5);}
    else{wx=select(0.5*(fx-0.5)*(fx-0.5),0.0,fx>=0.5);}
    var wy=0.0;
    if(dy==0u){wy=select(0.5*(0.5-fy)*(0.5-fy),0.0,fy<0.5);}
    else if(dy==1u){wy=select(0.75-fy*fy,0.5*(1.5-fy)*(1.5-fy),fy<0.5);}
    else if(dy==2u){wy=select(0.5*(0.5+fy)*(0.5+fy),0.75-(1.0-fy)*(1.0-fy),fy<0.5);}
    else{wy=select(0.5*(fy-0.5)*(fy-0.5),0.0,fy>=0.5);}
    var wz=0.0;
    if(dz==0u){wz=select(0.5*(0.5-fz)*(0.5-fz),0.0,fz<0.5);}
    else if(dz==1u){wz=select(0.75-fz*fz,0.5*(1.5-fz)*(1.5-fz),fz<0.5);}
    else if(dz==2u){wz=select(0.5*(0.5+fz)*(0.5+fz),0.75-(1.0-fz)*(1.0-fz),fz<0.5);}
    else{wz=select(0.5*(fz-0.5)*(fz-0.5),0.0,fz>=0.5);}
    let w=wx*wy*wz;if(w<0.0001){continue;}
    let ix=u32(ix0)+dx;let iy=u32(iy0)+dy;let iz=u32(iz0)+dz;
    let vi=(ix*g+iy)*g+iz;
    let ws=u32(w*FIXED_SCALE);
    atomicAdd(&voxDx[vi],i32(disp.x*FIXED_SCALE*w));
    atomicAdd(&voxDy[vi],i32(disp.y*FIXED_SCALE*w));
    atomicAdd(&voxDz[vi],i32(disp.z*FIXED_SCALE*w));
    atomicAdd(&voxW[vi],ws);
  }}}
}
`});

// Pass 2: normalize voxel grid (divide accumulated displacement by weight)
const voxelNormCS=device.createShaderModule({label:'voxelNorm',code:`
const FIXED_SCALE=1048576.0;
struct P{grid:u32}
@group(0)@binding(0)var<storage,read>voxDx:array<i32>;
@group(0)@binding(1)var<storage,read>voxDy:array<i32>;
@group(0)@binding(2)var<storage,read>voxDz:array<i32>;
@group(0)@binding(3)var<storage,read>voxW:array<u32>;
@group(0)@binding(4)var<storage,read_write>voxOut:array<vec4<f32>>;
@group(0)@binding(5)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let i=gid.x;let total=p.grid*p.grid*p.grid;if(i>=total){return;}
  let w=f32(voxW[i])/FIXED_SCALE;
  if(w>0.001){
    voxOut[i]=vec4(f32(voxDx[i])/FIXED_SCALE/w,f32(voxDy[i])/FIXED_SCALE/w,f32(voxDz[i])/FIXED_SCALE/w,1.0);
  }else{
    voxOut[i]=vec4(0.0,0.0,0.0,0.0);
  }
}
`});

// Pass 3: apply voxel displacement to high-res mesh via trilinear interpolation
const voxelApplyCS=device.createShaderModule({label:'voxelApply',code:`
struct P{vc:u32,grid:u32,bminX:f32,bminY:f32,bminZ:f32,gsX:f32,gsY:f32,gsZ:f32}
@group(0)@binding(0)var<storage,read>restPos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>voxOut:array<vec4<f32>>;
@group(0)@binding(2)var<storage,read_write>outPos:array<vec4<f32>>;
@group(0)@binding(3)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let i=gid.x;if(i>=p.vc){return;}
  let rp=restPos[i].xyz;
  let vx=(rp.x-p.bminX)/p.gsX-0.5;let vy=(rp.y-p.bminY)/p.gsY-0.5;let vz=(rp.z-p.bminZ)/p.gsZ-0.5;
  let ix0=clamp(i32(floor(vx)),0,i32(p.grid)-1);let iy0=clamp(i32(floor(vy)),0,i32(p.grid)-1);let iz0=clamp(i32(floor(vz)),0,i32(p.grid)-1);
  let fx=vx-f32(ix0);let fy=vy-f32(iy0);let fz=vz-f32(iz0);
  let g=p.grid;
  var interpD=vec3(0.0);var totalW=0.0;
  for(var dx=0u;dx<2u;dx++){for(var dy=0u;dy<2u;dy++){for(var dz=0u;dz<2u;dz++){
    let wx=select(1.0-fx,fx,dx==1u);let wy=select(1.0-fy,fy,dy==1u);let wz=select(1.0-fz,fz,dz==1u);
    let w=wx*wy*wz;if(w<0.001){continue;}
    let ix=u32(ix0)+dx;let iy=u32(iy0)+dy;let iz=u32(iz0)+dz;
    if(ix>=g||iy>=g||iz>=g){continue;}
    let vi=(ix*g+iy)*g+iz;
    let vd=voxOut[vi];
    if(vd.w>0.0){interpD+=vd.xyz*w;totalW+=w;}
  }}}
  let disp=select(vec3(0.0),interpD/totalW,totalW>0.001);
  outPos[i]=vec4(rp+disp,1.0);
}
`});

// 3D voxel smoothing: only fill empty voxels from neighbors, leave filled ones untouched
const voxelSmoothCS=device.createShaderModule({label:'voxelSmooth',code:`
struct P{grid:u32}
@group(0)@binding(0)var<storage,read>src:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read_write>dst:array<vec4<f32>>;
@group(0)@binding(2)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let i=gid.x;let g=p.grid;let total=g*g*g;if(i>=total){return;}
  let sv=src[i];
  if(sv.w>0.001){
    // Filled voxel: preserve original displacement exactly
    dst[i]=sv;
  }else{
    // Empty voxel: gather from 26 neighbors (distance-weighted)
    let iz=i%g;let iy=(i/g)%g;let ix=i/(g*g);
    var sumD=vec3(0.0);var sumW=0.0;
    for(var dx=i32(-1);dx<=1;dx++){for(var dy=i32(-1);dy<=1;dy++){for(var dz=i32(-1);dz<=1;dz++){
      if(dx==0&&dy==0&&dz==0){continue;}
      let nx=i32(ix)+dx;let ny=i32(iy)+dy;let nz=i32(iz)+dz;
      if(nx<0||nx>=i32(g)||ny<0||ny>=i32(g)||nz<0||nz>=i32(g)){continue;}
      let nv=src[(u32(nx)*g+u32(ny))*g+u32(nz)];
      if(nv.w>0.001){let w=1.0/(1.0+f32(abs(dx)+abs(dy)+abs(dz)));sumD+=nv.xyz*w;sumW+=w;}
    }}}
    dst[i]=select(vec4(0.0),vec4(sumD/sumW,1.0),sumW>0.001);
  }
}
`});
const nearestCS=device.createShaderModule({label:'nearest',code:`
struct P{proxyCount:u32,hrCount:u32}
@group(0)@binding(0)var<storage,read>proxyPos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>hrPos:array<vec4<f32>>;
@group(0)@binding(2)var<storage,read_write>nearest:array<u32>;
@group(0)@binding(3)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let hi=gid.x;if(hi>=p.hrCount){return;}
  let hp=hrPos[hi].xyz;
  var bestDist=1.0e30;var bestIdx=0u;
  for(var pi=0u;pi<p.proxyCount;pi++){
    let pp=proxyPos[pi].xyz;
    let dx=hp.x-pp.x;let dy=hp.y-pp.y;let dz=hp.z-pp.z;
    let d=dx*dx+dy*dy+dz*dz;
    if(d<bestDist){bestDist=d;bestIdx=pi;}
  }
  nearest[hi]=bestIdx;
}
`});

// ── Band constraint GPU shaders (merged: 1 dispatch per phase) ──
// Phase A1: weighted centroid for ALL bands (bc workgroups, each handles one band)
const bandReduceAllCS=device.createShaderModule({label:'bandReduceAll',code:`
struct BandParam{ox:f32,oy:f32,oz:f32,nx:f32,ny:f32,nz:f32,rest_circum:f32,stiffness:f32,influ_radius:f32}
struct BandState{gx:f32,gy:f32,gz:f32,scale:f32}
struct P{vc:u32,bc:u32}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>params:array<BandParam>;
@group(0)@binding(2)var<storage,read_write>state:array<BandState>;
@group(0)@binding(3)var<uniform>p:P;
var<workgroup>sGx:array<f32,256>;var<workgroup>sGy:array<f32,256>;var<workgroup>sGz:array<f32,256>;
var<workgroup>sW:array<f32,256>;
@compute@workgroup_size(256)fn main(@builtin(local_invocation_id)lid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let b=wg.x;if(b>=p.bc){return;}
  let param=params[b];
  var myGx=0.0;var myGy=0.0;var myGz=0.0;var myW=0.0;var vi=lid.x;
  while(vi<p.vc){
    let P=pos[vi].xyz;
    let signedD=(P.x-param.ox)*param.nx+(P.y-param.oy)*param.ny+(P.z-param.oz)*param.nz;
    let absD=abs(signedD);
    if(absD<param.influ_radius){
      let t=absD/param.influ_radius;let w=1.0-t*t*(3.0-2.0*t);
      let projX=P.x-signedD*param.nx;let projY=P.y-signedD*param.ny;let projZ=P.z-signedD*param.nz;
      myGx+=w*projX;myGy+=w*projY;myGz+=w*projZ;myW+=w;
    }
    vi+=256u;
  }
  sGx[lid.x]=myGx;sGy[lid.x]=myGy;sGz[lid.x]=myGz;sW[lid.x]=myW;workgroupBarrier();
  for(var s=128u;s>0u;s>>=1){if(lid.x<s){sGx[lid.x]+=sGx[lid.x+s];sGy[lid.x]+=sGy[lid.x+s];sGz[lid.x]+=sGz[lid.x+s];sW[lid.x]+=sW[lid.x+s];}workgroupBarrier();}
  if(lid.x==0u){
    let Gx=sGx[0]/max(sW[0],0.001);let Gy=sGy[0]/max(sW[0],0.001);let Gz=sGz[0]/max(sW[0],0.001);
    state[b]=BandState(Gx,Gy,Gz,1.0);
  }
}
`});

// Phase A2: triangle-plane intersection for ALL bands (each triangle loops over all bands)
const bandPerimAllCS=device.createShaderModule({label:'bandPerimAll',code:`
struct BandParam{ox:f32,oy:f32,oz:f32,nx:f32,ny:f32,nz:f32,rest_circum:f32,stiffness:f32,influ_radius:f32}
struct BandState{gx:f32,gy:f32,gz:f32,scale:f32}
struct P{triCount:u32,bc:u32}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>idx:array<u32>;
@group(0)@binding(2)var<storage,read>params:array<BandParam>;
@group(0)@binding(3)var<storage,read>state:array<BandState>;
@group(0)@binding(4)var<storage,read_write>binR:array<atomic<u32>>;
@group(0)@binding(5)var<storage,read_write>binC:array<atomic<u32>>;
@group(0)@binding(6)var<uniform>p:P;

fn addBinPoint(px:f32,py:f32,pz:f32,Gx:f32,Gy:f32,Gz:f32,ux:f32,uy:f32,uz:f32,vx:f32,vy:f32,vz:f32,b:u32){
  let rx=px-Gx;let ry=py-Gy;let rz=pz-Gz;
  let ru=rx*ux+ry*uy+rz*uz;let rv=rx*vx+ry*vy+rz*vz;
  let ang=atan2(rv,ru);
  let binIdx=u32(floor((ang+3.14159265)/6.28318531*64.0))%64u;
  let dist=sqrt(ru*ru+rv*rv);
  atomicAdd(&binR[b*64u+binIdx],u32(dist*1048576.0));
  atomicAdd(&binC[b*64u+binIdx],1u);
}

@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let ti=gid.x;if(ti>=p.triCount){return;}
  let i0=idx[ti*3u];let i1=idx[ti*3u+1u];let i2=idx[ti*3u+2u];
  let v0=pos[i0].xyz;let v1=pos[i1].xyz;let v2=pos[i2].xyz;
  for(var b=0u;b<256u;b++){
    if(b>=p.bc){break;}
    let param=params[b];let st=state[b];
    let ox=param.ox;let oy=param.oy;let oz=param.oz;
    let nx=param.nx;let ny=param.ny;let nz=param.nz;
    let d0=(v0.x-ox)*nx+(v0.y-oy)*ny+(v0.z-oz)*nz;
    let d1=(v1.x-ox)*nx+(v1.y-oy)*ny+(v1.z-oz)*nz;
    let d2=(v2.x-ox)*nx+(v2.y-oy)*ny+(v2.z-oz)*nz;
    let eps=1e-7;
    let s0=select(0,select(1,-1,d0>eps),abs(d0)>eps);
    let s1=select(0,select(1,-1,d1>eps),abs(d1)>eps);
    let s2=select(0,select(1,-1,d2>eps),abs(d2)>eps);
    if(s0==s1&&s1==s2&&s0!=0){continue;}
    // Build 2D basis on plane
    var ux:f32;var uy:f32;var uz:f32;
    if(abs(nx)<0.9){ux=1.0;uy=0.0;uz=0.0;}else{ux=0.0;uy=0.0;uz=1.0;}
    let du=ux*nx+uy*ny+uz*nz;ux-=du*nx;uy-=du*ny;uz-=du*nz;
    let ul=sqrt(ux*ux+uy*uy+uz*uz);ux/=ul;uy/=ul;uz/=ul;
    let vx=ny*uz-nz*uy;let vy=nz*ux-nx*uz;let vz=nx*uy-ny*ux;
    let Gx=st.gx;let Gy=st.gy;let Gz=st.gz;
    // Edge 0-1
    if((d0>eps&&d1<-eps)||(d0<-eps&&d1>eps)){
      let t=d0/(d0-d1);
      addBinPoint(v0.x+t*(v1.x-v0.x),v0.y+t*(v1.y-v0.y),v0.z+t*(v1.z-v0.z),Gx,Gy,Gz,ux,uy,uz,vx,vy,vz,b);
    }
    // Edge 1-2
    if((d1>eps&&d2<-eps)||(d1<-eps&&d2>eps)){
      let t=d1/(d1-d2);
      addBinPoint(v1.x+t*(v2.x-v1.x),v1.y+t*(v2.y-v1.y),v1.z+t*(v2.z-v1.z),Gx,Gy,Gz,ux,uy,uz,vx,vy,vz,b);
    }
    // Edge 2-0
    if((d2>eps&&d0<-eps)||(d2<-eps&&d0>eps)){
      let t=d2/(d2-d0);
      addBinPoint(v2.x+t*(v0.x-v2.x),v2.y+t*(v0.y-v2.y),v2.z+t*(v0.z-v2.z),Gx,Gy,Gz,ux,uy,uz,vx,vy,vz,b);
    }
    // Vertices exactly on plane
    if(abs(d0)<=eps){addBinPoint(v0.x,v0.y,v0.z,Gx,Gy,Gz,ux,uy,uz,vx,vy,vz,b);}
    if(abs(d1)<=eps){addBinPoint(v1.x,v1.y,v1.z,Gx,Gy,Gz,ux,uy,uz,vx,vy,vz,b);}
    if(abs(d2)<=eps){addBinPoint(v2.x,v2.y,v2.z,Gx,Gy,Gz,ux,uy,uz,vx,vy,vz,b);}
  }
}
`});

// Phase B: apply ALL bands per vertex with internal GS loop (radius-based, REST centroid)
const bandApplyRadiusCS=device.createShaderModule({label:'bandApplyRadius',code:`
struct BandParam{ox:f32,oy:f32,oz:f32,nx:f32,ny:f32,nz:f32,rest_circum:f32,stiffness:f32,influ_radius:f32,preScale:f32,rest_cx:f32,rest_cy:f32,rest_cz:f32}
struct P{vc:u32,bc:u32}
@group(0)@binding(0)var<storage,read>src:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read_write>dst:array<vec4<f32>>;
@group(0)@binding(2)var<storage,read>params:array<BandParam>;
@group(0)@binding(3)var<storage,read>radii:array<f32>;
@group(0)@binding(4)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let i=gid.x;if(i>=p.vc){return;}
  var cur=src[i];
  for(var b=0u;b<256u;b++){
    if(b>=p.bc){break;}
    let param=params[b];
    let signedD=(cur.x-param.ox)*param.nx+(cur.y-param.oy)*param.ny+(cur.z-param.oz)*param.nz;
    let absD=abs(signedD);
    if(absD>=param.influ_radius){continue;}
    let t=absD/param.influ_radius;
    let blend=t*t*(3.0-2.0*t);
    let projX=cur.x-signedD*param.nx;let projY=cur.y-signedD*param.ny;let projZ=cur.z-signedD*param.nz;
    let dx=projX-param.rest_cx;let dy=projY-param.rest_cy;let dz=projZ-param.rest_cz;
    let r_cur=sqrt(dx*dx+dy*dy+dz*dz);
    if(r_cur<1e-6){continue;}
    var ux:f32;var uy:f32;var uz:f32;
    if(abs(param.nx)<0.9){ux=1.0;uy=0.0;uz=0.0;}else{ux=0.0;uy=0.0;uz=1.0;}
    let du=ux*param.nx+uy*param.ny+uz*param.nz;ux-=du*param.nx;uy-=du*param.ny;uz-=du*param.nz;
    let ul=sqrt(ux*ux+uy*uy+uz*uz);ux/=ul;uy/=ul;uz/=ul;
    let vx=param.ny*uz-param.nz*uy;let vy=param.nz*ux-param.nx*uz;let vz=param.nx*uy-param.ny*ux;
    let ru=dx*ux+dy*uy+dz*uz;let rv=dx*vx+dy*vy+dz*vz;
    let ang=atan2(rv,ru);
    let binIdx=u32(floor((ang+3.14159265)/6.28318531*64.0))%64u;
    let r0=radii[b*64u+binIdx];
    if(r0<1e-6){continue;}
    let targetR=r0*param.preScale;
    let eff_target=targetR+(r_cur-targetR)*blend;
    if(r_cur>eff_target){
      let s_target=eff_target/max(r_cur,0.0001);
      let s=1.0-param.stiffness*(1.0-s_target);
      cur.x=param.rest_cx+dx*s+signedD*param.nx;
      cur.y=param.rest_cy+dy*s+signedD*param.ny;
      cur.z=param.rest_cz+dz*s+signedD*param.nz;
    }
  }
  dst[i]=cur;
}
`});

// Phase 0: GPU-side bin clear (avoids CPU writeBuffer stall), bc*64 u32 entries each
const bandBinClearCS=device.createShaderModule({label:'bandBinClear',code:`
struct P{total:u32}
@group(0)@binding(0)var<storage,read_write>binR:array<u32>;
@group(0)@binding(1)var<storage,read_write>binC:array<u32>;
@group(0)@binding(2)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let i=gid.x;if(i>=p.total){return;}
  binR[i]=0u;binC[i]=0u;
}
`});

// Pass 5 (post-PBD): generate target (green) polyline by scaling red points toward centroid
const bandVisTargetCS=device.createShaderModule({label:'bandVisTarget',code:`
struct BandState{gx:f32,gy:f32,gz:f32,scale:f32}
struct P{bc:u32}
@group(0)@binding(0)var<storage,read>visPts:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>visCnt:array<u32>;
@group(0)@binding(2)var<storage,read>state:array<BandState>;
@group(0)@binding(3)var<storage,read_write>visTgt:array<vec4<f32>>;
@group(0)@binding(4)var<uniform>p:P;
@compute@workgroup_size(64)fn main(@builtin(local_invocation_id)lid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){

  }else{
    visTgt[b*256u+lid.x]=vec4(0.0,0.0,0.0,0.0);
  }
}
`});

// ══════.?GPU Band Rendering Shaders (Plan C) ══════.?

// Shader C1: Per-vertex band stacking offsets
const bandStackCS=device.createShaderModule({label:'bandStack',code:`
struct BandParam{ox:f32,oy:f32,oz:f32,nx:f32,ny:f32,nz:f32,rest_circum:f32,stiffness:f32,influ_radius:f32,preScale:f32,rest_cx:f32,rest_cy:f32,rest_cz:f32}
struct P{bandIndex:u32,vc:u32,bc:u32,hw:f32,surfaceOff:f32,thickness:f32,compression:f32}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>params:array<BandParam>;
@group(0)@binding(2)var<storage,read_write>offLo:array<f32>;
@group(0)@binding(3)var<storage,read_write>offHi:array<f32>;
@group(0)@binding(4)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let v=gid.x;if(v>=p.vc){return;}
  let P=pos[v].xyz;let bi=p.bandIndex;let tol=p.hw*2.5;
  // Phase 1: count total covered + aboveMe + build "rank" (position in covered set)
  var totalCovered=0u;var aboveMe=0u;
  for(var k=0u;k<p.bc;k++){
    let bp=params[k];
    let d=abs((P.x-bp.ox)*bp.nx+(P.y-bp.oy)*bp.ny+(P.z-bp.oz)*bp.nz);
    if(d<tol){
      totalCovered++;
      if(k>bi){aboveMe++;}
    }
  }
  if(totalCovered==0u){offLo[v]=0.0;offHi[v]=0.0;return;}
  // Phase 2: stack below via prefix sum — rank of band j = count of covered bands with index<j
  var stackBelow=0.0;var coveredBefore=0u;
  for(var j=0u;j<bi;j++){
    let bp=params[j];
    let d=abs((P.x-bp.ox)*bp.nx+(P.y-bp.oy)*bp.ny+(P.z-bp.oz)*bp.nz);
    if(d<tol){
      let aboveJ=totalCovered-coveredBefore-1u; // bands above j in covered order
      stackBelow+=p.thickness/(1.0+f32(aboveJ)*p.compression);
      coveredBefore++;
    }
  }
  let myThick=p.thickness/(1.0+f32(aboveMe)*p.compression);
  offLo[v]=p.surfaceOff-myThick*0.5+stackBelow;
  offHi[v]=p.surfaceOff+myThick*0.5+stackBelow;
}
`});

// ═══════ GPU Ribbon Mesh Generation (3-shader pipeline) ═══════

// Shader G1: Triangle-plane intersection → 4×64 angle bins (atomics)
const bandCutBinsCS=device.createShaderModule({label:'bandCutBins',code:`
struct BandParam{ox:f32,oy:f32,oz:f32,nx:f32,ny:f32,nz:f32,rest_circum:f32,stiffness:f32,influ_radius:f32,preScale:f32,rest_cx:f32,rest_cy:f32,rest_cz:f32}
struct P{bandIndex:u32,vc:u32,triCount:u32,hw:f32,cx:f32,cy:f32,cz:f32}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>idx:array<u32>;
@group(0)@binding(2)var<storage,read>offLo:array<f32>;
@group(0)@binding(3)var<storage,read>offHi:array<f32>;
@group(0)@binding(4)var<storage,read>params:array<BandParam>;
@group(0)@binding(5)var<storage,read_write>binRX:array<atomic<u32>>;
@group(0)@binding(6)var<storage,read_write>binRY:array<atomic<u32>>;
@group(0)@binding(7)var<storage,read_write>binRZ:array<atomic<u32>>;
@group(0)@binding(8)var<storage,read_write>binC:array<atomic<u32>>;
@group(0)@binding(9)var<uniform>p:P;

const FIXED=1048576.0;

fn addToBin3D(binBase:u32,px:f32,py:f32,pz:f32,nx:f32,ny:f32,nz:f32){
  var ux_:f32;var uy_:f32;var uz_:f32;
  if(abs(nx)<0.9){ux_=1.0;uy_=0.0;uz_=0.0;}else{ux_=0.0;uy_=0.0;uz_=1.0;}
  let du=ux_*nx+uy_*ny+uz_*nz;ux_-=du*nx;uy_-=du*ny;uz_-=du*nz;
  let ul=sqrt(ux_*ux_+uy_*uy_+uz_*uz_);ux_/=ul;uy_/=ul;uz_/=ul;
  let vx=ny*uz_-nz*uy_;let vy=nz*ux_-nx*uz_;let vz=nx*uy_-ny*ux_;
  let rx=px-p.cx;let ry=py-p.cy;let rz=pz-p.cz;
  let ru=rx*ux_+ry*uy_+rz*uz_;let rv=rx*vx+ry*vy+rz*vz;
  let ang=atan2(rv,ru);
  let bi=u32(floor((ang+3.14159265)/6.28318531*64.0))%64u;
  atomicAdd(&binRX[binBase+bi],u32((px+4.0)*FIXED));
  atomicAdd(&binRY[binBase+bi],u32((py+4.0)*FIXED));
  atomicAdd(&binRZ[binBase+bi],u32((pz+4.0)*FIXED));
  atomicAdd(&binC[binBase+bi],1u);
}

fn intersectEdge(a:vec3<f32>,b:vec3<f32>,da:f32,db:f32)->vec3<f32>{
  let t=da/(da-db);
  return vec3(a.x+t*(b.x-a.x),a.y+t*(b.y-a.y),a.z+t*(b.z-a.z));
}

@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let ti=gid.x;if(ti>=p.triCount){return;}
  let i0=idx[ti*3u];let i1=idx[ti*3u+1u];let i2=idx[ti*3u+2u];
  let bp=params[p.bandIndex];let nx=bp.nx;let ny=bp.ny;let nz=bp.nz;
  let ox=bp.ox;let oy=bp.oy;let oz=bp.oz;
  let hw=p.hw;let cx=p.cx;let cy=p.cy;let cz=p.cz;
  // Offset vertex positions
  let pi0=pos[i0].xyz;let pi1=pos[i1].xyz;let pi2=pos[i2].xyz;
  let rd0=normalize(pi0-vec3(cx,cy,cz));
  let rd1=normalize(pi1-vec3(cx,cy,cz));
  let rd2=normalize(pi2-vec3(cx,cy,cz));
  let oV0=pi0+rd0*offHi[i0];let oV1=pi1+rd1*offHi[i1];let oV2=pi2+rd2*offHi[i2];
  let iV0=pi0+rd0*offLo[i0];let iV1=pi1+rd1*offLo[i1];let iV2=pi2+rd2*offLo[i2];
  let eps=1e-7;
  // 4 passes: outer-L, outer-R, inner-L, inner-R
  for(var phase=0u;phase<4u;phase++){
    var v0:vec3<f32>;var v1:vec3<f32>;var v2:vec3<f32>;var binBase:u32;
    if(phase==0u){v0=oV0;v1=oV1;v2=oV2;binBase=0u;}
    else if(phase==1u){v0=oV0;v1=oV1;v2=oV2;binBase=64u;}
    else if(phase==2u){v0=iV0;v1=iV1;v2=iV2;binBase=128u;}
    else{v0=iV0;v1=iV1;v2=iV2;binBase=192u;}
    let sign=select(1.0,-1.0,phase==0u||phase==2u);
    let pOx=ox+sign*nx*hw;let pOy=oy+sign*ny*hw;let pOz=oz+sign*nz*hw;
    let d0=(v0.x-pOx)*nx+(v0.y-pOy)*ny+(v0.z-pOz)*nz;
    let d1=(v1.x-pOx)*nx+(v1.y-pOy)*ny+(v1.z-pOz)*nz;
    let d2=(v2.x-pOx)*nx+(v2.y-pOy)*ny+(v2.z-pOz)*nz;
    let s0=select(0,select(1,-1,d0>eps),abs(d0)>eps);
    let s1=select(0,select(1,-1,d1>eps),abs(d1)>eps);
    let s2=select(0,select(1,-1,d2>eps),abs(d2)>eps);
    if(s0==s1&&s1==s2&&s0!=0){continue;}
    if(s0==0){addToBin3D(binBase,v0.x,v0.y,v0.z,nx,ny,nz);}
    if(s1==0){addToBin3D(binBase,v1.x,v1.y,v1.z,nx,ny,nz);}
    if(s2==0){addToBin3D(binBase,v2.x,v2.y,v2.z,nx,ny,nz);}
    if((d0>eps&&d1<-eps)||(d0<-eps&&d1>eps)){let pt=intersectEdge(v0,v1,d0,d1);addToBin3D(binBase,pt.x,pt.y,pt.z,nx,ny,nz);}
    if((d1>eps&&d2<-eps)||(d1<-eps&&d2>eps)){let pt=intersectEdge(v1,v2,d1,d2);addToBin3D(binBase,pt.x,pt.y,pt.z,nx,ny,nz);}
    if((d2>eps&&d0<-eps)||(d2<-eps&&d0>eps)){let pt=intersectEdge(v2,v0,d2,d0);addToBin3D(binBase,pt.x,pt.y,pt.z,nx,ny,nz);}
  }
}
`});

// Shader G2: Bin averaging → 4×64 compact float points (1 workgroup × 64 threads)
const bandResolveCS=device.createShaderModule({label:'bandResolve',code:`
struct P{bandIndex:u32,ringSegs:u32}
@group(0)@binding(0)var<storage,read>binRX:array<u32>;
@group(0)@binding(1)var<storage,read>binRY:array<u32>;
@group(0)@binding(2)var<storage,read>binRZ:array<u32>;
@group(0)@binding(3)var<storage,read>binC:array<u32>;
@group(0)@binding(4)var<storage,read_write>polyPts:array<vec4<f32>>;
@group(0)@binding(5)var<uniform>p:P;
const FIXED=1048576.0;
const BINS=64u;
@compute@workgroup_size(64)fn main(@builtin(local_invocation_id)lid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  for(var poly=0u;poly<4u;poly++){
    let base=poly*BINS+lid.x;
    let sx=binRX[base];let sy=binRY[base];let sz=binRZ[base];let c=binC[base];
    if(c>0u){
      let avgX=f32(sx)/FIXED/f32(c)-4.0;
      let avgY=f32(sy)/FIXED/f32(c)-4.0;
      let avgZ=f32(sz)/FIXED/f32(c)-4.0;
      polyPts[base]=vec4(avgX,avgY,avgZ,1.0);
    }else{
      polyPts[base]=vec4(0.0,0.0,0.0,0.0);
    }
  }
}
`});

// Shader G3: Resample + build ribbon triangle mesh → direct to output buffers
const bandBuildMeshCS=device.createShaderModule({label:'bandBuildMesh',code:`
struct BandParam{ox:f32,oy:f32,oz:f32,nx:f32,ny:f32,nz:f32,rest_circum:f32,stiffness:f32,influ_radius:f32,preScale:f32,rest_cx:f32,rest_cy:f32,rest_cz:f32}
struct P{bandIndex:u32,ringSegs:u32,widthSegs:u32,cx:f32,cy:f32,cz:f32}
@group(0)@binding(0)var<storage,read>polyPts:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>params:array<BandParam>;
@group(0)@binding(2)var<storage,read_write>outPos:array<f32>;
@group(0)@binding(3)var<storage,read_write>outNorm:array<f32>;
@group(0)@binding(4)var<storage,read_write>outUV:array<f32>;
@group(0)@binding(5)var<storage,read_write>outTan:array<f32>;
@group(0)@binding(6)var<uniform>p:P;
const BINS=64u;
var<workgroup>wsR:array<f32,256>;   // 4×64 bin validity (w component)
var<workgroup>wsX:array<f32,1024>; // 4xN resampled coords (N<=256)
var<workgroup>wsY:array<f32,1024>;
var<workgroup>wsZ:array<f32,1024>;

fn writeVert(vi:u32,x:f32,y:f32,z:f32,nx_:f32,ny_:f32,nz_:f32,u_:f32,v_:f32,tx:f32,ty:f32,tz:f32){
  let i3=vi*3u;outPos[i3]=x;outPos[i3+1u]=y;outPos[i3+2u]=z;
  outNorm[i3]=nx_;outNorm[i3+1u]=ny_;outNorm[i3+2u]=nz_;
  outUV[vi*2u]=u_;outUV[vi*2u+1u]=v_;
  outTan[vi*4u]=tx;outTan[vi*4u+1u]=ty;outTan[vi*4u+2u]=tz;outTan[vi*4u+3u]=1.0;
}

@compute@workgroup_size(256)fn main(@builtin(local_invocation_id)lid:vec3<u32>){
  let bp=params[p.bandIndex];let nx=bp.nx;let ny=bp.ny;let nz=bp.nz;
  let cx=p.cx;let cy=p.cy;let cz=p.cz;
  var ux_:f32;var uy_:f32;var uz_:f32;
  if(abs(nx)<0.9){ux_=1.0;uy_=0.0;uz_=0.0;}else{ux_=0.0;uy_=0.0;uz_=1.0;}
  let du=ux_*nx+uy_*ny+uz_*nz;ux_-=du*nx;uy_-=du*ny;uz_-=du*nz;
  let ul=sqrt(ux_*ux_+uy_*uy_+uz_*uz_);ux_/=ul;uy_/=ul;uz_/=ul;
  let vx=ny*uz_-nz*uy_;let vy=nz*ux_-nx*uz_;let vz=nx*uy_-ny*ux_;
  let N=p.ringSegs;let W=p.widthSegs;

  // Phase 1: read polyPts → wsR (threads 0..63, 4 bins each)
  if(lid.x<BINS){
    for(var poly=0u;poly<4u;poly++){
      let base=poly*BINS+lid.x;
      wsX[base]=polyPts[base].x;wsY[base]=polyPts[base].y;wsZ[base]=polyPts[base].z;wsR[base]=polyPts[base].w;
    }
  }
  workgroupBarrier();

  // Phase 2: resample 64→N, fill missing bins from neighbors, then interpolate
  for(var idx=lid.x;idx<N*4u;idx+=256u){
    let poly=idx/N;let si=idx%N;
    let frac=f32(si)/f32(N)*64.0;
    let b0=u32(floor(frac))%BINS;let b1=(b0+1u)%BINS;let t=frac-f32(b0);
    // Read directly from polyPts storage (NOT wsX — overwritten by Phase 2 output)
    let base0=poly*BINS+b0;let base1=poly*BINS+b1;
    let pt0=polyPts[base0];let pt1=polyPts[base1];
    let x0=pt0.x;let y0=pt0.y;let z0=pt0.z;let v0=pt0.w;
    let x1=pt1.x;let y1=pt1.y;let z1=pt1.z;let v1=pt1.w;
    // Fill empty bins from neighbors (search for valid w>0.5)
    var x0f=x0;var y0f=y0;var z0f=z0;var x1f=x1;var y1f=y1;var z1f=z1;
    if(v0<0.5){for(var d=1u;d<64u;d++){let nb=(b0+BINS-d)%BINS;let pt=polyPts[poly*BINS+nb];if(pt.w>0.5){x0f=pt.x;y0f=pt.y;z0f=pt.z;break;}}}
    if(v1<0.5){for(var d=1u;d<64u;d++){let nb=(b1+d)%BINS;let pt=polyPts[poly*BINS+nb];if(pt.w>0.5){x0f=pt.x;y0f=pt.y;z0f=pt.z;break;}}}
    wsX[idx]=mix(x0f,x1f,t);
    wsY[idx]=mix(y0f,y1f,t);
    wsZ[idx]=mix(z0f,z1f,t);
  }
  workgroupBarrier();

  // Phase 3: build mesh (each thread one ring segment)
  let vertsPerSeg=W*12u+12u;
  for(var seg=lid.x;seg<N;seg+=256u){
    let j=(seg+1u)%N;let baseV=seg*vertsPerSeg;
    let uv_=f32(seg)/f32(N);let uvj=f32(j)/f32(N);
    for(var w=0u;w<W;w++){
      let f0=f32(w)/f32(W);let f1=f32(w+1u)/f32(W);
      let oL0=seg;let oR0=seg+N;let oL1=j;let oR1=j+N;
      let iL0=seg+2u*N;let iR0=seg+3u*N;let iL1=j+2u*N;let iR1=j+3u*N;
      let o0x=mix(wsX[oL0],wsX[oR0],f0);let o0y=mix(wsY[oL0],wsY[oR0],f0);let o0z=mix(wsZ[oL0],wsZ[oR0],f0);
      let o1x=mix(wsX[oL0],wsX[oR0],f1);let o1y=mix(wsY[oL0],wsY[oR0],f1);let o1z=mix(wsZ[oL0],wsZ[oR0],f1);
      let o0jx=mix(wsX[oL1],wsX[oR1],f0);let o0jy=mix(wsY[oL1],wsY[oR1],f0);let o0jz=mix(wsZ[oL1],wsZ[oR1],f0);
      let o1jx=mix(wsX[oL1],wsX[oR1],f1);let o1jy=mix(wsY[oL1],wsY[oR1],f1);let o1jz=mix(wsZ[oL1],wsZ[oR1],f1);
      let i0x=mix(wsX[iL0],wsX[iR0],f0);let i0y=mix(wsY[iL0],wsY[iR0],f0);let i0z=mix(wsZ[iL0],wsZ[iR0],f0);
      let i1x=mix(wsX[iL0],wsX[iR0],f1);let i1y=mix(wsY[iL0],wsY[iR0],f1);let i1z=mix(wsZ[iL0],wsZ[iR0],f1);
      let i0jx=mix(wsX[iL1],wsX[iR1],f0);let i0jy=mix(wsY[iL1],wsY[iR1],f0);let i0jz=mix(wsZ[iL1],wsZ[iR1],f0);
      let i1jx=mix(wsX[iL1],wsX[iR1],f1);let i1jy=mix(wsY[iL1],wsY[iR1],f1);let i1jz=mix(wsZ[iL1],wsZ[iR1],f1);
      // Normals
      let no0=normalize(vec3(o0x-cx,o0y-cy,o0z-cz));let no1=normalize(vec3(o1x-cx,o1y-cy,o1z-cz));
      let no0j=normalize(vec3(o0jx-cx,o0jy-cy,o0jz-cz));let no1j=normalize(vec3(o1jx-cx,o1jy-cy,o1jz-cz));
      let ni0=normalize(vec3(i0x-cx,i0y-cy,i0z-cz));let ni1=normalize(vec3(i1x-cx,i1y-cy,i1z-cz));
      let ni0j=normalize(vec3(i0jx-cx,i0jy-cy,i0jz-cz));let ni1j=normalize(vec3(i1jx-cx,i1jy-cy,i1jz-cz));
      // Tangents
      let t00=normalize(select(vec3(no0.z,0.0,-no0.x),vec3(0.0,-no0.z,no0.y),abs(no0.y)>0.999));
      let t01=normalize(select(vec3(no1.z,0.0,-no1.x),vec3(0.0,-no1.z,no1.y),abs(no1.y)>0.999));
      let t0j0=normalize(select(vec3(no0j.z,0.0,-no0j.x),vec3(0.0,-no0j.z,no0j.y),abs(no0j.y)>0.999));
      let t0j1=normalize(select(vec3(no1j.z,0.0,-no1j.x),vec3(0.0,-no1j.z,no1j.y),abs(no1j.y)>0.999));
      let ti0=normalize(select(vec3(ni0.z,0.0,-ni0.x),vec3(0.0,-ni0.z,ni0.y),abs(ni0.y)>0.999));
      let ti1=normalize(select(vec3(ni1.z,0.0,-ni1.x),vec3(0.0,-ni1.z,ni1.y),abs(ni1.y)>0.999));
      let ti0j=normalize(select(vec3(ni0j.z,0.0,-ni0j.x),vec3(0.0,-ni0j.z,ni0j.y),abs(ni0j.y)>0.999));
      let ti1j=normalize(select(vec3(ni1j.z,0.0,-ni1j.x),vec3(0.0,-ni1j.z,ni1j.y),abs(ni1j.y)>0.999));
      // Write vertices
      let v0=baseV+w*12u;
      writeVert(v0,   o0x,o0y,o0z, -no0.x,-no0.y,-no0.z, uv_,f0, t00.x,t00.y,t00.z);
      writeVert(v0+1u,o1x,o1y,o1z, -no1.x,-no1.y,-no1.z, uv_,f1, t01.x,t01.y,t01.z);
      writeVert(v0+2u,o1jx,o1jy,o1jz, -no1j.x,-no1j.y,-no1j.z, uvj,f1, t0j1.x,t0j1.y,t0j1.z);
      writeVert(v0+3u,o0x,o0y,o0z, -no0.x,-no0.y,-no0.z, uv_,f0, t00.x,t00.y,t00.z);
      writeVert(v0+4u,o1jx,o1jy,o1jz, -no1j.x,-no1j.y,-no1j.z, uvj,f1, t0j1.x,t0j1.y,t0j1.z);
      writeVert(v0+5u,o0jx,o0jy,o0jz, -no0j.x,-no0j.y,-no0j.z, uvj,f0, t0j0.x,t0j0.y,t0j0.z);
      let vi=v0+6u;
      writeVert(vi,   i0x,i0y,i0z, ni0.x,ni0.y,ni0.z, uv_,f0, ti0.x,ti0.y,ti0.z);
      writeVert(vi+1u,i1jx,i1jy,i1jz, ni1j.x,ni1j.y,ni1j.z, uvj,f1, ti1j.x,ti1j.y,ti1j.z);
      writeVert(vi+2u,i1x,i1y,i1z, ni1.x,ni1.y,ni1.z, uv_,f1, ti1.x,ti1.y,ti1.z);
      writeVert(vi+3u,i0x,i0y,i0z, ni0.x,ni0.y,ni0.z, uv_,f0, ti0.x,ti0.y,ti0.z);
      writeVert(vi+4u,i0jx,i0jy,i0jz, ni0j.x,ni0j.y,ni0j.z, uvj,f0, ti0j.x,ti0j.y,ti0j.z);
      writeVert(vi+5u,i1jx,i1jy,i1jz, ni1j.x,ni1j.y,ni1j.z, uvj,f1, ti1j.x,ti1j.y,ti1j.z);
      if(w==0u){
        let vs=v0+12u;
        writeVert(vs,   i0x,i0y,i0z, nx,ny,nz, uv_,0.5, t00.x,t00.y,t00.z);
        writeVert(vs+1u,o0x,o0y,o0z, nx,ny,nz, uv_,0.5, t00.x,t00.y,t00.z);
        writeVert(vs+2u,o0jx,o0jy,o0jz, nx,ny,nz, uvj,0.5, t0j0.x,t0j0.y,t0j0.z);
        writeVert(vs+3u,i0x,i0y,i0z, nx,ny,nz, uv_,0.5, t00.x,t00.y,t00.z);
        writeVert(vs+4u,o0jx,o0jy,o0jz, nx,ny,nz, uvj,0.5, t0j0.x,t0j0.y,t0j0.z);
        writeVert(vs+5u,i0jx,i0jy,i0jz, nx,ny,nz, uvj,0.5, t0j0.x,t0j0.y,t0j0.z);
      }
      if(w==W-1u){
        let vs=v0+12u+select(0u,6u,w==0u);
        writeVert(vs,   i1x,i1y,i1z, -nx,-ny,-nz, uv_,0.5, ti1.x,ti1.y,ti1.z);
        writeVert(vs+1u,i1jx,i1jy,i1jz, -nx,-ny,-nz, uvj,0.5, ti1j.x,ti1j.y,ti1j.z);
        writeVert(vs+2u,o1x,o1y,o1z, -nx,-ny,-nz, uv_,0.5, t01.x,t01.y,t01.z);
        writeVert(vs+3u,o1x,o1y,o1z, -nx,-ny,-nz, uv_,0.5, t01.x,t01.y,t01.z);
        writeVert(vs+4u,i1jx,i1jy,i1jz, -nx,-ny,-nz, uvj,0.5, ti1j.x,ti1j.y,ti1j.z);
        writeVert(vs+5u,o1jx,o1jy,o1jz, -nx,-ny,-nz, uvj,0.5, t0j1.x,t0j1.y,t0j1.z);
      }
    }
  }
}

const normCS=device.createShaderModule({label:'norm',code:`
struct P{vc:u32}
@group(0)@binding(0)var<storage,read>pos:array<vec4<f32>>;
@group(0)@binding(1)var<storage,read>idx:array<u32>;
@group(0)@binding(2)var<storage,read>adjOff:array<u32>;
@group(0)@binding(3)var<storage,read>adjData:array<u32>;
@group(0)@binding(4)var<storage,read_write>norms:array<vec4<f32>>;
@group(0)@binding(5)var<uniform>p:P;
@compute@workgroup_size(256)fn main(@builtin(global_invocation_id)gid:vec3<u32>,@builtin(workgroup_id)wg:vec3<u32>){
  let vi=gid.x;if(vi>=p.vc){return;}
  let start=adjOff[vi];let end=adjOff[vi+1u];
  var sumN=vec3<f32>(0.0);
  for(var j=start;j<end;j++){
    let ti=adjData[j];
    let i0=idx[ti*3u];let i1=idx[ti*3u+1u];let i2=idx[ti*3u+2u];
    let p0=pos[i0].xyz;let p1=pos[i1].xyz;let p2=pos[i2].xyz;
    sumN+=normalize(cross(p1-p0,p2-p0));
  }
  let N=normalize(sumN);
  norms[vi]=vec4<f32>(N,0.0);
}
`});

  const adjLists=new Array(highResCount);for(let i=0;i<highResCount;i++)adjLists[i]=[];
  for(let t=0;t<highResIdxArr.length;t+=3){const a=highResIdxArr[t],b=highResIdxArr[t+1],c=highResIdxArr[t+2];adjLists[a].push(t/3);adjLists[b].push(t/3);adjLists[c].push(t/3);}

  // Uniform buffers
  shapeUB=mkBuf(8,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST,'shapeU');
  volAccUB=mkBuf(4,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST,'volAccU');

  const normUB=mkBuf(4,GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST,'normU');

  // ── Bind groups ──
  // Shape (A→B and B→A)
  const mkBG2=(bgl,fAB,fBA)=>({AB:device.createBindGroup({layout:bgl,entries:fAB(posA,posB)}),BA:device.createBindGroup({layout:bgl,entries:fBA(posA,posB)})});

  volAccBG_B=device.createBindGroup({layout:volAccPipe.bgl,entries:[{binding:0,resource:{buffer:posB}},{binding:1,resource:{buffer:idxB}},{binding:2,resource:{buffer:volB}},{binding:3,resource:{buffer:volAccUB}}]});

  // Voxel scatter BG (one for posA, one for posB)
  voxelScatterBG=device.createBindGroup({layout:voxelScatterPipe.bgl,entries:[
    {binding:0,resource:{buffer:posA}},{binding:1,resource:{buffer:restB}},{binding:2,resource:{buffer:voxDxBuf}},{binding:3,resource:{buffer:voxDyBuf}},{binding:4,resource:{buffer:voxDzBuf}},{binding:5,resource:{buffer:voxWBuf}},{binding:6,resource:{buffer:voxelScatterUB}}]});
  // Voxel normalize BG

    {binding:0,resource:{buffer:voxDxBuf}},{binding:1,resource:{buffer:voxDyBuf}},{binding:2,resource:{buffer:voxDzBuf}},{binding:3,resource:{buffer:voxWBuf}},{binding:4,resource:{buffer:voxOutBuf}},{binding:5,resource:{buffer:voxelNormUB}}]});
  // Voxel apply BG

    {binding:0,resource:{buffer:highResRestB}},{binding:1,resource:{buffer:voxOutBuf}},{binding:2,resource:{buffer:highResOutB}},{binding:3,resource:{buffer:voxelApplyUB}}]});

    {binding:0,resource:{buffer:posA}},{binding:1,resource:{buffer:posB}},{binding:2,resource:{buffer:bandParamsB}},{binding:3,resource:{buffer:bandRestRadiiB}},{binding:4,resource:{buffer:bandReduceAllUB}}]});

    {binding:0,resource:{buffer:highResOutB}},{binding:1,resource:{buffer:highResIdxB}},{binding:2,resource:{buffer:highResAdjOffB}},{binding:3,resource:{buffer:highResAdjDataB}},{binding:4,resource:{buffer:highResNormB}},{binding:5,resource:{buffer:normUB}}]});
  hrNormUnpackBG=device.createBindGroup({layout:normUnpackPipe.bgl,entries:[
    {binding:0,resource:{buffer:highResNormB}},{binding:1,resource:{buffer:highResNorm3B}},{binding:2,resource:{buffer:normUB}}]});

    {binding:0,resource:{buffer:highResOutB}},{binding:1,resource:{buffer:highResOut3B}},{binding:2,resource:{buffer:unpackUB}}]});

  proxyUnpackBG_A=device.createBindGroup({layout:posUnpackPipe.bgl,entries:[
    {binding:0,resource:{buffer:posA}},{binding:1,resource:{buffer:proxyPos3B}},{binding:2,resource:{buffer:proxyUnpackUB}}]});
  proxyUnpackBG_B=device.createBindGroup({layout:posUnpackPipe.bgl,entries:[
    {binding:0,resource:{buffer:posB}},{binding:1,resource:{buffer:proxyPos3B}},{binding:2,resource:{buffer:proxyUnpackUB}}]});

  console.log('GPU pipeline ready. 代理:',proxyVertexCount.toLocaleString(),'顶点 高模:',highResCount.toLocaleString(),'顶点');
  // 🔍 Check shader compilation
  for(const [name,shader] of [['bandReduceAll',bandReduceAllCS],['bandApplyRadius',bandApplyRadiusCS]]){
