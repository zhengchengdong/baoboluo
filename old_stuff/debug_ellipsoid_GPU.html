<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBD 椭球调试 — GPU 版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; font-family: monospace; }
        canvas { display: block; cursor: crosshair; }

        #hud {
            position: fixed; top: 12px; left: 12px; z-index: 10;
            color: #ccc; font-size: 13px; line-height: 1.7;
            pointer-events: none;
        }
        #hud .val { color: #0f0; }
        #hud .gpu { color: #0af; }

        #info {
            position: fixed; bottom: 16px; left: 50%;
            transform: translateX(-50%);
            color: #888; font-size: 12px; z-index: 10;
            pointer-events: none;
        }

        #panel {
            position: fixed; top: 12px; right: 12px; z-index: 20;
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 14px 18px;
            color: #ccc;
            font-size: 13px;
            min-width: 220px;
            pointer-events: all;
            user-select: none;
        }
        #panel label { display: block; margin: 8px 0 2px; color: #aaa; }
        #panel input[type=range] { width: 100%; margin: 0; accent-color: #00aaff; }
        #panel .val { color: #00aaff; float: right; }
        #panel h3 { margin: 0 0 6px; color: #fff; font-size: 14px; }
        #panel .badge {
            display: inline-block;
            background: #00aaff;
            color: #000;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div>FPS: <span class="val" id="fps">--</span></div>
        <div>帧耗时: <span class="val" id="framems">--</span> ms</div>
        <div>GPU PBD耗时: <span class="val gpu" id="pbdtime">--</span> ms</div>
        <div>顶点: <span class="val" id="vcount">--</span></div>
        <div>三角形: <span class="val" id="tcount">--</span></div>
        <div>皮筋: <span class="val" id="bcount">0</span></div>
        <div>体积: <span class="val" id="vratio">100</span>%</div>
        <div>rest体积: <span class="val" id="rvol">--</span></div>
        <div>PBD迭代: <span class="val" id="pbditer">--</span></div>
        <div>最大位移: <span class="val" id="maxdisp">--</span></div>
        <div>形状有效: <span class="val" id="seff">--</span> &nbsp; 皮筋有效: <span class="val" id="beff">--</span></div>
    </div>
    <div id="info">🖱️ 点击椭球表面绑皮筋 &nbsp; R 键割一根 &nbsp; <span style="color:#0af">⚡ GPU Compute</span></div>

    <div id="panel">
        <h3>🔧 GPU PBD 参数 <span class="badge">GPU</span></h3>
        <label>形状基础刚度 <span class="val" id="sv_ss">0.30</span></label>
        <input type="range" id="sl_ss" min="0.01" max="1.0" step="0.01" value="0.30">
        <label>皮筋基础刚度 <span class="val" id="sv_bs">0.50</span></label>
        <input type="range" id="sl_bs" min="0.01" max="1.0" step="0.01" value="0.50">
        <label>体积刚度 <span class="val" id="sv_vs">0.40</span></label>
        <input type="range" id="sl_vs" min="0.01" max="1.0" step="0.01" value="0.40">
        <label>影响半径 <span class="val" id="sv_bi">0.60</span></label>
        <input type="range" id="sl_bi" min="0.2" max="1.5" step="0.05" value="0.60">
        <label>硬化系数 <span class="val" id="sv_ha">0.00</span></label>
        <input type="range" id="sl_ha" min="0" max="3" step="0.05" value="0">
        <label>PBD迭代 <span class="val" id="sv_pi">10</span></label>
        <input type="range" id="sl_pi" min="1" max="30" step="1" value="10">
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ═══════════════════════════════════════
        // DOM refs
        // ═══════════════════════════════════════
        const $ = id => document.getElementById(id);
        const H = {
            fps: $('fps'), framems: $('framems'), pbdtime: $('pbdtime'),
            vcount: $('vcount'), tcount: $('tcount'),
            bcount: $('bcount'), vratio: $('vratio'),
            rvol: $('rvol'), pbditer: $('pbditer'),
            maxdisp: $('maxdisp'), seff: $('seff'), beff: $('beff'),
        };

        // ═══════════════════════════════════════
        // Three.js setup
        // ═══════════════════════════════════════
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#111122');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.set(2, 2, 4);
        camera.lookAt(0, 0, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.update();

        scene.add(new THREE.AmbientLight('#fff', 0.5));
        const dirLight = new THREE.DirectionalLight('#fff', 1.5);
        dirLight.position.set(0, 5, 0);
        scene.add(dirLight);

        // ═══════════════════════════════════════
        // Ellipsoid geometry
        // ═══════════════════════════════════════
        const ELLI_RX = 0.5, ELLI_RY = 1.5, ELLI_RZ = 0.5;
        const RINGS = 60, SEGS = 66;
        const TOTAL_V = 1 + RINGS * SEGS + 1;

        function buildEllipsoid(rx, ry, rz, rings, segs) {
            const positions = [];
            const normals = [];
            // Top pole
            positions.push(0, ry, 0); normals.push(0, 1, 0);
            // Ring vertices
            for (let ring = 0; ring < rings; ring++) {
                const phi = Math.PI * (ring + 1) / (rings + 1);
                const sinPhi = Math.sin(phi), cosPhi = Math.cos(phi);
                for (let seg = 0; seg < segs; seg++) {
                    const theta = 2 * Math.PI * seg / segs;
                    const x = rx * sinPhi * Math.cos(theta);
                    const z = rz * sinPhi * Math.sin(theta);
                    const y = ry * cosPhi;
                    positions.push(x, y, z);
                    const nx = x / (rx * rx), ny = y / (ry * ry), nz = z / (rz * rz);
                    const nl = Math.sqrt(nx * nx + ny * ny + nz * nz);
                    normals.push(nx / nl, ny / nl, nz / nl);
                }
            }
            // Bottom pole
            positions.push(0, -ry, 0); normals.push(0, -1, 0);
            // Indices
            const indices = [];
            const topPole = 0, bottomPole = TOTAL_V - 1;
            for (let seg = 0; seg < segs; seg++) {
                indices.push(topPole, 1 + seg, 1 + (seg + 1) % segs);
            }
            for (let ring = 0; ring < rings - 1; ring++) {
                const rs = 1 + ring * segs, nrs = 1 + (ring + 1) * segs;
                for (let seg = 0; seg < segs; seg++) {
                    const a = rs + seg, b = rs + (seg + 1) % segs;
                    const c = nrs + seg, d = nrs + (seg + 1) % segs;
                    indices.push(a, c, b); indices.push(b, c, d);
                }
            }
            const lrs = 1 + (rings - 1) * segs;
            for (let seg = 0; seg < segs; seg++) {
                indices.push(lrs + seg, bottomPole, lrs + (seg + 1) % segs);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
            geo.setIndex(indices);
            return geo;
        }

        const ellipsoidGeo = buildEllipsoid(ELLI_RX, ELLI_RY, ELLI_RZ, RINGS, SEGS);
        const vertexCount = TOTAL_V;
        const idxArr = ellipsoidGeo.index.array;
        const triCount = idxArr.length / 3;

        // ═══════════════════════════════════════
        // GPU Texture system
        // ═══════════════════════════════════════
        const TEX_SIZE = 64; // 64×64 = 4096 ≥ 3962 vertices
        const TEX_PIXELS = TEX_SIZE * TEX_SIZE;

        function createFloatRenderTarget() {
            return new THREE.WebGLRenderTarget(TEX_SIZE, TEX_SIZE, {
                format: THREE.RGBAFormat,
                type: THREE.FloatType,
                minFilter: THREE.NearestFilter,
                magFilter: THREE.NearestFilter,
                depthBuffer: false,
                stencilBuffer: false,
            });
        }

        const rtA = createFloatRenderTarget(); // current positions (read)
        const rtB = createFloatRenderTarget(); // next positions (write)
        let readTarget = rtA, writeTarget = rtB;

        function swapTargets() { [readTarget, writeTarget] = [writeTarget, readTarget]; }

        // Rest positions texture (read-only, never written to)
        const restTexData = new Float32Array(TEX_PIXELS * 4);
        {
            const pos = ellipsoidGeo.attributes.position.array;
            for (let i = 0; i < vertexCount; i++) {
                const i4 = i * 4;
                restTexData[i4] = pos[i * 3];
                restTexData[i4 + 1] = pos[i * 3 + 1];
                restTexData[i4 + 2] = pos[i * 3 + 2];
                restTexData[i4 + 3] = 1.0;
            }
        }
        const restTex = new THREE.DataTexture(restTexData, TEX_SIZE, TEX_SIZE,
            THREE.RGBAFormat, THREE.FloatType);
        restTex.wrapS = THREE.ClampToEdgeWrapping;
        restTex.wrapT = THREE.ClampToEdgeWrapping;
        restTex.minFilter = THREE.NearestFilter;
        restTex.magFilter = THREE.NearestFilter;
        restTex.needsUpdate = true;

        // Initialize rtA (current positions = rest positions)
        const initTexData = new Float32Array(restTexData);
        const initTex = new THREE.DataTexture(initTexData, TEX_SIZE, TEX_SIZE,
            THREE.RGBAFormat, THREE.FloatType);
        initTex.wrapS = THREE.ClampToEdgeWrapping;
        initTex.wrapT = THREE.ClampToEdgeWrapping;
        initTex.minFilter = THREE.NearestFilter;
        initTex.magFilter = THREE.NearestFilter;
        initTex.needsUpdate = true;

        // ═══════════════════════════════════════
        // Compute pass infrastructure
        // ═══════════════════════════════════════
        const computeScene = new THREE.Scene();
        const computeCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const computeQuadGeo = new THREE.PlaneGeometry(2, 2);

        // Readback buffer (Float32Array, reused)
        const readbackBuf = new Float32Array(TEX_PIXELS * 4);

        function readPositionsFromGPU() {
            // Read the current (readTarget) texture back to CPU
            // Three.js internally handles FBO binding for readRenderTargetPixels
            renderer.readRenderTargetPixels(readTarget, 0, 0, TEX_SIZE, TEX_SIZE, readbackBuf);
        }

        // Copy initTex to rtA (initializes GPU-side positions)
        function copyTextureToTarget(srcTex, dstRT) {
            const mat = new THREE.ShaderMaterial({
                uniforms: { u_src: { value: srcTex } },
                vertexShader: /*glsl*/`
                    varying vec2 v_uv;
                    void main() { v_uv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
                `,
                fragmentShader: /*glsl*/`
                    precision highp float;
                    uniform sampler2D u_src;
                    varying vec2 v_uv;
                    void main() { gl_FragColor = texture2D(u_src, v_uv); }
                `,
                depthTest: false, depthWrite: false,
            });
            const quad = new THREE.Mesh(computeQuadGeo, mat);
            computeScene.add(quad);
            const oldRT = renderer.getRenderTarget();
            renderer.setRenderTarget(dstRT);
            renderer.render(computeScene, computeCamera);
            renderer.setRenderTarget(oldRT);
            computeScene.remove(quad);
            mat.dispose();
        }

        copyTextureToTarget(initTex, rtA);
        initTex.dispose();

        // ═══════════════════════════════════════
        // PBD Compute Shaders
        // ═══════════════════════════════════════

        // ── Shape constraint shader ──
        const shapeUniforms = {
            u_curPos: { value: null },
            u_restPos: { value: restTex },
            u_stiffness: { value: 0.30 },
        };
        const shapeMaterial = new THREE.ShaderMaterial({
            uniforms: shapeUniforms,
            vertexShader: /*glsl*/`
                varying vec2 v_uv;
                void main() { v_uv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
            `,
            fragmentShader: /*glsl*/`
                precision highp float;
                uniform sampler2D u_curPos;
                uniform sampler2D u_restPos;
                uniform float u_stiffness;
                varying vec2 v_uv;
                void main() {
                    vec4 cur = texture2D(u_curPos, v_uv);
                    vec4 rest = texture2D(u_restPos, v_uv);
                    vec3 d = rest.xyz - cur.xyz;
                    gl_FragColor = vec4(cur.xyz + d * u_stiffness, 1.0);
                }
            `,
            depthTest: false, depthWrite: false,
        });

        // ── Band constraint shader (all bands in one pass) ──
        const MAX_BANDS = 256;
        const bandDataVec4 = new Array(MAX_BANDS);
        for (let i = 0; i < MAX_BANDS; i++) bandDataVec4[i] = new THREE.Vector4();

        const bandAllUniforms = {
            u_curPos: { value: null },
            u_restPos: { value: restTex },
            u_bandData: { value: bandDataVec4 },
            u_bandCount: { value: 0 },
            u_hardening: { value: 0.0 },
        };
        const bandAllMaterial = new THREE.ShaderMaterial({
            uniforms: bandAllUniforms,
            vertexShader: /*glsl*/`
                varying vec2 v_uv;
                void main() { v_uv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
            `,
            fragmentShader: /*glsl*/`
                precision highp float;
                uniform sampler2D u_curPos;
                uniform sampler2D u_restPos;
                uniform vec4 u_bandData[256];
                uniform int u_bandCount;
                uniform float u_hardening;
                varying vec2 v_uv;

                void main() {
                    vec4 cur = texture2D(u_curPos, v_uv);
                    vec4 rest = texture2D(u_restPos, v_uv);

                    for (int b = 0; b < 256; b++) {
                        if (b >= u_bandCount) break;

                        vec4 bd = u_bandData[b];
                        float centerY  = bd.x;
                        float targetR  = bd.y;
                        float stiffness = bd.z;
                        float influence = bd.w;

                        float dy = abs(cur.y - centerY);
                        if (dy >= influence) continue;

                        float r = length(cur.xz);
                        if (r < 1e-6) continue;

                        float t = dy / influence;
                        float st = t * t * (3.0 - 2.0 * t);
                        float effTarget = targetR + (r - targetR) * st;

                        if (r > effTarget) {
                            float disp = length(rest.xyz - cur.xyz);
                            float stiff = stiffness;
                            if (u_hardening > 0.0) {
                                stiff = stiffness / exp(u_hardening * disp * 50.0);
                            }
                            float push = stiff * (r - effTarget);
                            float s = max(0.01, (r - push) / r);
                            cur.x *= s;
                            cur.z *= s;
                        }
                    }

                    gl_FragColor = cur;
                }
            `,
            depthTest: false, depthWrite: false,
        });

        // ── Volume constraint shader ──
        const volumeUniforms = {
            u_curPos: { value: null },
            u_basePush: { value: 0.0 },
        };
        const volumeMaterial = new THREE.ShaderMaterial({
            uniforms: volumeUniforms,
            vertexShader: /*glsl*/`
                varying vec2 v_uv;
                void main() { v_uv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }
            `,
            fragmentShader: /*glsl*/`
                precision highp float;
                uniform sampler2D u_curPos;
                uniform float u_basePush;
                varying vec2 v_uv;
                void main() {
                    vec4 cur = texture2D(u_curPos, v_uv);
                    float r = length(cur.xz);
                    if (r < 1e-6) { gl_FragColor = cur; return; }
                    float s = clamp((r + u_basePush) / r, 0.7, 1.3);
                    gl_FragColor = vec4(cur.x * s, cur.y, cur.z * s, 1.0);
                }
            `,
            depthTest: false, depthWrite: false,
        });

        const computeQuad = new THREE.Mesh(computeQuadGeo);
        computeScene.add(computeQuad); // permanently in scene, material swapped per dispatch

        function dispatchCompute(mat, uniforms) {
            // Set the read target texture as the source uniform
            if (uniforms.u_curPos) uniforms.u_curPos.value = readTarget.texture;
            computeQuad.material = mat;

            const oldRT = renderer.getRenderTarget();
            renderer.setRenderTarget(writeTarget);
            renderer.render(computeScene, computeCamera);
            renderer.setRenderTarget(oldRT);

            swapTargets();
        }

        // ═══════════════════════════════════════
        // GPU Volume Computation — Points + additive blending
        //   One point per triangle; fragment shader computes that
        //   triangle's signed volume; hardware blend (ONE+ONE) sums
        //   all 7920 contributions into a single 1×1 pixel.
        // ═══════════════════════════════════════
        const TRI_COUNT = idxArr.length / 3;
        const IDX_TEX_W = 128, IDX_TEX_H = 64; // 128*64=8192 ≥ 7920

        // Triangle index texture (one-time upload)
        const idxTexData = new Float32Array(IDX_TEX_W * IDX_TEX_H * 4);
        for (let t = 0; t < TRI_COUNT; t++) {
            const i4 = t * 4;
            idxTexData[i4]     = idxArr[t * 3];
            idxTexData[i4 + 1] = idxArr[t * 3 + 1];
            idxTexData[i4 + 2] = idxArr[t * 3 + 2];
        }
        const idxTex = new THREE.DataTexture(idxTexData, IDX_TEX_W, IDX_TEX_H,
            THREE.RGBAFormat, THREE.FloatType);
        idxTex.wrapS = THREE.ClampToEdgeWrapping;
        idxTex.wrapT = THREE.ClampToEdgeWrapping;
        idxTex.minFilter = THREE.NearestFilter;
        idxTex.magFilter = THREE.NearestFilter;
        idxTex.needsUpdate = true;

        // 1×1 render target — hardware blending accumulates all triangle volumes
        const volRT = new THREE.WebGLRenderTarget(1, 1, {
            format: THREE.RGBAFormat,
            type: THREE.FloatType,
            depthBuffer: false,
            stencilBuffer: false,
        });

        // Point geometry: one point per triangle
        const triIdxAttr = new Float32Array(TRI_COUNT);
        for (let t = 0; t < TRI_COUNT; t++) triIdxAttr[t] = t;
        const pointGeo = new THREE.BufferGeometry();
        pointGeo.setAttribute('position',
            new THREE.Float32BufferAttribute(new Float32Array(TRI_COUNT * 3), 3));
        pointGeo.setAttribute('triIndex',
            new THREE.Float32BufferAttribute(triIdxAttr, 1));

        const volCompUniforms = {
            u_posTex: { value: null },
            u_indexTex: { value: idxTex },
            u_posTexSize: { value: 64.0 },
            u_idxTexW: { value: 128.0 },
            u_idxTexH: { value: 64.0 },
        };
        const volCompMaterial = new THREE.ShaderMaterial({
            uniforms: volCompUniforms,
            vertexShader: /*glsl*/`
                attribute float triIndex;
                varying float v_triIdx;
                void main() {
                    v_triIdx = triIndex;
                    gl_Position = vec4(0.0, 0.0, 0.0, 1.0);
                    gl_PointSize = 1.0;
                }
            `,
            fragmentShader: /*glsl*/`
                precision highp float;
                uniform sampler2D u_posTex;
                uniform sampler2D u_indexTex;
                uniform float u_posTexSize;
                uniform float u_idxTexW;
                uniform float u_idxTexH;
                varying float v_triIdx;

                vec2 vertUV(float idx) {
                    float c = mod(idx, u_posTexSize);
                    float r = floor(idx / u_posTexSize);
                    return vec2((c + 0.5) / u_posTexSize, (r + 0.5) / u_posTexSize);
                }

                void main() {
                    float t = v_triIdx;
                    float col = mod(t, u_idxTexW);
                    float row = floor(t / u_idxTexW);
                    vec2 idxUV = vec2((col + 0.5) / u_idxTexW,
                                       (row + 0.5) / u_idxTexH);
                    vec4 id = texture2D(u_indexTex, idxUV);

                    vec3 p0 = texture2D(u_posTex, vertUV(id.r)).xyz;
                    vec3 p1 = texture2D(u_posTex, vertUV(id.g)).xyz;
                    vec3 p2 = texture2D(u_posTex, vertUV(id.b)).xyz;

                    float vol = (p0.x*(p1.y*p2.z - p1.z*p2.y)
                               + p0.y*(p1.z*p2.x - p1.x*p2.z)
                               + p0.z*(p1.x*p2.y - p1.y*p2.x)) / 6.0;

                    gl_FragColor = vec4(vol, 0.0, 0.0, 0.0);
                }
            `,
            blending: THREE.CustomBlending,
            blendEquation: THREE.AddEquation,
            blendSrc: THREE.OneFactor,
            blendDst: THREE.OneFactor,
            depthTest: false,
            depthWrite: false,
        });

        const volPointMesh = new THREE.Points(pointGeo, volCompMaterial);
        const volCompScene = new THREE.Scene();
        volCompScene.add(volPointMesh);
        const volCompCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const volReadback = new Float32Array(4);

        function gpuComputeVolume() {
            volCompUniforms.u_posTex.value = readTarget.texture;

            const oldRT = renderer.getRenderTarget();
            renderer.setRenderTarget(volRT);
            renderer.setClearColor(0x000000, 0);
            renderer.clear(true, true, true);
            renderer.render(volCompScene, volCompCamera);
            renderer.setRenderTarget(oldRT);

            // Read the single accumulated pixel (16 bytes)
            renderer.readRenderTargetPixels(volRT, 0, 0, 1, 1, volReadback);
            return Math.abs(volReadback[0]);
        }

        // ═══════════════════════════════════════
        // PBD State (CPU side — minimal)
        // ═══════════════════════════════════════
        let restVolume = 0;
        let restSurfaceArea = 0;
        let lastGpuVolume = 0;   // cached from GPU, used for HUD

        function calcRestVolumeAndArea() {
            const p = ellipsoidGeo.attributes.position.array;
            const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
            let vol = 0, area = 0;
            for (let i = 0; i < idxArr.length; i += 3) {
                const ai = idxArr[i] * 3, bi = idxArr[i + 1] * 3, ci = idxArr[i + 2] * 3;
                a.set(p[ai], p[ai + 1], p[ai + 2]);
                b.set(p[bi], p[bi + 1], p[bi + 2]);
                c.set(p[ci], p[ci + 1], p[ci + 2]);
                vol += (a.x * (b.y * c.z - b.z * c.y) +
                        a.y * (b.z * c.x - b.x * c.z) +
                        a.z * (b.x * c.y - b.y * c.x)) / 6;
                const ab = new THREE.Vector3().subVectors(b, a);
                const ac = new THREE.Vector3().subVectors(c, a);
                area += 0.5 * new THREE.Vector3().crossVectors(ab, ac).length();
            }
            restVolume = Math.abs(vol);
            restSurfaceArea = area;
            H.rvol.textContent = restVolume.toFixed(4);
            console.log('Rest volume:', restVolume.toFixed(4), 'area:', restSurfaceArea.toFixed(2));
        }
        calcRestVolumeAndArea();
        lastGpuVolume = restVolume;

        // Compute current volume from GPU-readback positions
        function calcVolumeFromReadback() {
            let vol = 0;
            const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
            for (let t = 0; t < idxArr.length; t += 3) {
                const ai = idxArr[t] * 4, bi = idxArr[t + 1] * 4, ci = idxArr[t + 2] * 4;
                a.set(readbackBuf[ai], readbackBuf[ai + 1], readbackBuf[ai + 2]);
                b.set(readbackBuf[bi], readbackBuf[bi + 1], readbackBuf[bi + 2]);
                c.set(readbackBuf[ci], readbackBuf[ci + 1], readbackBuf[ci + 2]);
                vol += (a.x * (b.y * c.z - b.z * c.y) +
                        a.y * (b.z * c.x - b.x * c.z) +
                        a.z * (b.x * c.y - b.y * c.x)) / 6;
            }
            return Math.abs(vol);
        }

        function calcMaxDispFromReadback() {
            let maxD = 0;
            const pos = ellipsoidGeo.attributes.position.array; // rest positions
            for (let i = 0; i < vertexCount; i++) {
                const i4 = i * 4;
                const dx = pos[i * 3] - readbackBuf[i4];
                const dy = pos[i * 3 + 1] - readbackBuf[i4 + 1];
                const dz = pos[i * 3 + 2] - readbackBuf[i4 + 2];
                const d = Math.sqrt(dx * dx + dy * dy + dz * dz);
                if (d > maxD) maxD = d;
            }
            return maxD;
        }

        // ═══════════════════════════════════════
        // PBD Params
        // ═══════════════════════════════════════
        let SHAPE_STIFFNESS = 0.30;
        let BAND_STIFFNESS = 0.50;
        let VOLUME_STIFFNESS = 0.40;
        let BAND_INFLUENCE = 0.60;
        let HARDENING = 0;
        let PBD_ITERATIONS = 10;
        const BAND_INITIAL_TIGHTNESS = 0.80;
        let maxDisplacement = 0;

        // ── Sliders ──
        const slSS = $('sl_ss'), slBS = $('sl_bs'), slVS = $('sl_vs');
        const slBI = $('sl_bi'), slHA = $('sl_ha'), slPI = $('sl_pi');
        const svSS = $('sv_ss'), svBS = $('sv_bs'), svVS = $('sv_vs');
        const svBI = $('sv_bi'), svHA = $('sv_ha'), svPI = $('sv_pi');

        slSS.addEventListener('input', () => {
            SHAPE_STIFFNESS = parseFloat(slSS.value);
            svSS.textContent = SHAPE_STIFFNESS.toFixed(2);
            shapeUniforms.u_stiffness.value = SHAPE_STIFFNESS;
        });
        slBS.addEventListener('input', () => {
            BAND_STIFFNESS = parseFloat(slBS.value);
            svBS.textContent = BAND_STIFFNESS.toFixed(2);
            for (const b of bands) b.stiffness = BAND_STIFFNESS;
        });
        slVS.addEventListener('input', () => {
            VOLUME_STIFFNESS = parseFloat(slVS.value);
            svVS.textContent = VOLUME_STIFFNESS.toFixed(2);
        });
        slBI.addEventListener('input', () => {
            BAND_INFLUENCE = parseFloat(slBI.value);
            svBI.textContent = BAND_INFLUENCE.toFixed(2);
            for (const b of bands) b.influence = BAND_INFLUENCE;
        });
        slHA.addEventListener('input', () => {
            HARDENING = parseFloat(slHA.value);
            svHA.textContent = HARDENING.toFixed(2);
        });
        slPI.addEventListener('input', () => {
            PBD_ITERATIONS = parseInt(slPI.value);
            svPI.textContent = PBD_ITERATIONS;
            H.pbditer.textContent = PBD_ITERATIONS;
        });

        // ═══════════════════════════════════════
        // Band management
        // ═══════════════════════════════════════
        const bands = [];
        const bandVisuals = [];

        function makeBandVisual(centerY, radius) {
            const geo = new THREE.TorusGeometry(1.0, 0.02, 16, 48);
            const mat = new THREE.MeshBasicMaterial({
                color: '#ff3333', transparent: true, opacity: 0.7,
                depthTest: false, depthWrite: false,
            });
            const torus = new THREE.Mesh(geo, mat);
            torus.rotation.x = -Math.PI / 2;
            torus.position.y = centerY;
            torus.scale.setScalar(radius);
            torus.renderOrder = 1;
            scene.add(torus);
            return torus;
        }

        // NOTE: caller must ensure readbackBuf is fresh (call readPositionsFromGPU first)
        function getAvgRadiusAtY(targetY, threshold) {
            let sumR = 0, cnt = 0;
            for (let i = 0; i < vertexCount; i++) {
                const i4 = i * 4;
                const y = readbackBuf[i4 + 1];
                if (Math.abs(y - targetY) < threshold) {
                    sumR += Math.sqrt(readbackBuf[i4] ** 2 + readbackBuf[i4 + 2] ** 2);
                    cnt++;
                }
            }
            return cnt > 1 ? sumR / cnt : ELLI_RX;
        }

        // Single-pass: compute all band radii in one vertex scan (O(V+B) vs O(V×B) calls)
        function updateAllBandVisuals() {
            const n = bands.length;
            if (n === 0) return;
            const threshold = BAND_INFLUENCE * 0.3;

            // Accumulators per band
            const sumR = new Float32Array(n);
            const cnt = new Uint32Array(n);

            for (let i = 0; i < vertexCount; i++) {
                const i4 = i * 4;
                const y = readbackBuf[i4 + 1];
                const r = Math.sqrt(readbackBuf[i4] ** 2 + readbackBuf[i4 + 2] ** 2);

                for (let b = 0; b < n; b++) {
                    if (Math.abs(y - bands[b].centerY) < threshold) {
                        sumR[b] += r;
                        cnt[b]++;
                    }
                }
            }

            for (let b = 0; b < n; b++) {
                const vis = bandVisuals[b];
                if (!vis || !vis.visible) continue;
                vis.position.y = bands[b].centerY;
                if (cnt[b] > 1) vis.scale.setScalar(sumR[b] / cnt[b]);
            }
        }

        function addBand(centerY) {
            const margin = BAND_INFLUENCE * 0.3;
            centerY = Math.max(-ELLI_RY + margin, Math.min(ELLI_RY - margin, centerY));
            readPositionsFromGPU();
            const currentR = getAvgRadiusAtY(centerY, BAND_INFLUENCE * 0.4);
            bands.push({
                centerY,
                targetRadius: currentR * BAND_INITIAL_TIGHTNESS,
                stiffness: BAND_STIFFNESS,
                influence: BAND_INFLUENCE,
            });
            bandVisuals.push(makeBandVisual(centerY, currentR));
            H.bcount.textContent = bands.length;
            console.log(`皮筋 #${bands.length}  y=${centerY.toFixed(3)}  r=${currentR.toFixed(3)}`);
        }

        function removeBand() {
            if (bands.length === 0) return;
            bands.pop();
            const vis = bandVisuals.pop();
            if (vis) { vis.geometry.dispose(); vis.material.dispose(); scene.remove(vis); }
            H.bcount.textContent = bands.length;
        }

        // ═══════════════════════════════════════
        // Rendering: custom ShaderMaterial
        // Samples the position texture in vertex shader
        // ═══════════════════════════════════════
        // Add vertexIndex attribute to geometry
        const vertIdxArr = new Float32Array(vertexCount);
        for (let i = 0; i < vertexCount; i++) vertIdxArr[i] = i;
        ellipsoidGeo.setAttribute('vertexIndex', new THREE.Float32BufferAttribute(vertIdxArr, 1));

        const renderUniforms = {
            u_posTex: { value: readTarget.texture },
            u_texSize: { value: TEX_SIZE },
            u_lightDir: { value: new THREE.Vector3(0, 5, 0).normalize() },
        };

        const renderMaterial = new THREE.ShaderMaterial({
            uniforms: renderUniforms,
            vertexShader: /*glsl*/`
                attribute float vertexIndex;
                uniform sampler2D u_posTex;
                uniform float u_texSize;
                varying vec3 v_worldPos;
                varying vec3 v_normal;

                void main() {
                    float u = (mod(vertexIndex, u_texSize) + 0.5) / u_texSize;
                    float v = (floor(vertexIndex / u_texSize) + 0.5) / u_texSize;
                    vec4 texPos = texture2D(u_posTex, vec2(u, v));
                    vec4 worldPos = modelMatrix * vec4(texPos.xyz, 1.0);
                    vec4 mvPos = modelViewMatrix * vec4(texPos.xyz, 1.0);
                    gl_Position = projectionMatrix * mvPos;
                    v_worldPos = worldPos.xyz;
                    v_normal = normalize(normalMatrix * normalize(normal));
                }
            `,
            fragmentShader: /*glsl*/`
                precision highp float;
                uniform vec3 u_lightDir;
                varying vec3 v_worldPos;
                varying vec3 v_normal;

                void main() {
                    vec3 N = normalize(v_normal);
                    if (!gl_FrontFacing) N = -N;

                    float NdotL = max(dot(N, normalize(u_lightDir)), 0.0);
                    float ambient = 0.25;
                    float diffuse = NdotL * 0.75;
                    float lit = ambient + diffuse;

                    vec3 col = vec3(1.0, 0.67, 0.0) * lit; // #ffaa00
                    gl_FragColor = vec4(col, 0.3);
                }
            `,
            transparent: true,
            depthWrite: false,
            side: THREE.DoubleSide,
        });

        const gpuMesh = new THREE.Mesh(ellipsoidGeo, renderMaterial);
        scene.add(gpuMesh);

        // Wireframe overlay — renders as true wireframe lines
        const wireUniforms = {
            u_posTex: { value: readTarget.texture },
            u_texSize: { value: TEX_SIZE },
        };
        const wireMaterial = new THREE.ShaderMaterial({
            uniforms: wireUniforms,
            vertexShader: /*glsl*/`
                attribute float vertexIndex;
                uniform sampler2D u_posTex;
                uniform float u_texSize;
                void main() {
                    float u = (mod(vertexIndex, u_texSize) + 0.5) / u_texSize;
                    float v = (floor(vertexIndex / u_texSize) + 0.5) / u_texSize;
                    vec4 texPos = texture2D(u_posTex, vec2(u, v));
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(texPos.xyz, 1.0);
                }
            `,
            fragmentShader: /*glsl*/`
                precision highp float;
                void main() { gl_FragColor = vec4(1.0, 1.0, 1.0, 0.5); }
            `,
            transparent: true,
            depthTest: true,
            depthWrite: false,
            wireframe: true,
        });
        const wireOverlay = new THREE.Mesh(ellipsoidGeo, wireMaterial);
        wireOverlay.renderOrder = 1;
        scene.add(wireOverlay);

        // ═══════════════════════════════════════
        // Mouse interaction — raycast CPU mesh
        // ═══════════════════════════════════════
        // For raycasting, we need CPU-side positions.
        // We'll use a separate invisible mesh that gets updated each frame from GPU data.
        const cpuGeo = new THREE.BufferGeometry();
        cpuGeo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(vertexCount * 3), 3));
        cpuGeo.setIndex(Array.from(idxArr));
        const cpuMesh = new THREE.Mesh(cpuGeo, new THREE.MeshBasicMaterial({ visible: false }));
        scene.add(cpuMesh);

        function syncCPUFromGPU() {
            const posArr = cpuGeo.attributes.position.array;
            for (let i = 0; i < vertexCount; i++) {
                const i4 = i * 4;
                posArr[i * 3] = readbackBuf[i4];
                posArr[i * 3 + 1] = readbackBuf[i4 + 1];
                posArr[i * 3 + 2] = readbackBuf[i4 + 2];
            }
            cpuGeo.attributes.position.needsUpdate = true;
            cpuGeo.computeBoundingSphere();
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const mouseDown = new THREE.Vector2();
        let previewRing = null;

        function ensurePreviewRing() {
            if (previewRing) return;
            const geo = new THREE.TorusGeometry(1.0, 0.025, 16, 48);
            const mat = new THREE.MeshBasicMaterial({
                color: '#ffff00', transparent: true, opacity: 0.5,
                depthTest: false, depthWrite: false,
            });
            previewRing = new THREE.Mesh(geo, mat);
            previewRing.rotation.x = -Math.PI / 2;
            previewRing.visible = false;
            previewRing.renderOrder = 2;
            scene.add(previewRing);
        }

        window.addEventListener('mousemove', (e) => {
            ensurePreviewRing();
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(cpuMesh, false);
            if (hits.length > 0) {
                const y = hits[0].point.y;
                const clampedY = Math.max(-ELLI_RY + 0.1, Math.min(ELLI_RY - 0.1, y));
                previewRing.position.y = clampedY;
                previewRing.visible = true;
                readPositionsFromGPU();
                previewRing.scale.setScalar(getAvgRadiusAtY(clampedY, 0.15));
            } else {
                previewRing.visible = false;
            }
        });

        window.addEventListener('mousedown', (e) => { mouseDown.set(e.clientX, e.clientY); });
        window.addEventListener('mouseup', (e) => {
            const dx = e.clientX - mouseDown.x;
            const dy = e.clientY - mouseDown.y;
            if (Math.sqrt(dx * dx + dy * dy) > 3) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(cpuMesh, false);
            if (hits.length > 0) addBand(hits[0].point.y);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') removeBand();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ═══════════════════════════════════════
        // GPU PBD main loop
        // ═══════════════════════════════════════
        function runGPUPBD() {
            shapeUniforms.u_stiffness.value = SHAPE_STIFFNESS;

            // PBD iteration loop — recompute volume deficit each iteration
            for (let iter = 0; iter < PBD_ITERATIONS; iter++) {
                // ① Shape constraint
                dispatchCompute(shapeMaterial, shapeUniforms);

                // ② Band constraints — all bands in ONE GPU pass
                if (bands.length > 0) {
                    for (let b = 0; b < bands.length; b++) {
                        const band = bands[b];
                        bandDataVec4[b].set(band.centerY, band.targetRadius, band.stiffness, band.influence);
                    }
                    bandAllUniforms.u_bandCount.value = bands.length;
                    bandAllUniforms.u_hardening.value = HARDENING;
                    dispatchCompute(bandAllMaterial, bandAllUniforms);
                }

                // Compute volume deficit on GPU (point blend → 1×1 pixel readback)
                const currentVolume = gpuComputeVolume();
                const deficit = restVolume - currentVolume;
                volumeUniforms.u_basePush.value = Math.abs(deficit) > 1e-9
                    ? VOLUME_STIFFNESS * deficit / restSurfaceArea
                    : 0.0;

                // ③ Volume constraint (with fresh deficit)
                dispatchCompute(volumeMaterial, volumeUniforms);
                lastGpuVolume = currentVolume; // cache latest for HUD
            }

            // Update rendering uniforms to point to final position texture
            renderUniforms.u_posTex.value = readTarget.texture;
            wireUniforms.u_posTex.value = readTarget.texture;
        }

        function runGPURestore() {
            // No bands — just shape constraint to restore
            shapeUniforms.u_stiffness.value = SHAPE_STIFFNESS;
            for (let iter = 0; iter < PBD_ITERATIONS; iter++) {
                dispatchCompute(shapeMaterial, shapeUniforms);
            }
            renderUniforms.u_posTex.value = readTarget.texture;
            wireUniforms.u_posTex.value = readTarget.texture;
            lastGpuVolume = restVolume;
        }

        // ═══════════════════════════════════════
        // Animation loop
        // ═══════════════════════════════════════
        const clock = new THREE.Clock();
        let fpsFrames = 0, fpsTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const t0 = performance.now();

            controls.update();

            // GPU PBD
            const pbdT0 = performance.now();
            if (bands.length > 0) {
                runGPUPBD();
            } else {
                runGPURestore();
            }
            const pbdMs = performance.now() - pbdT0;

            // Sync CPU mesh for raycasting (once per frame)
            readPositionsFromGPU();
            syncCPUFromGPU();

            // Update HUD — volume from GPU, displacement from readback
            H.vratio.textContent = (lastGpuVolume / restVolume * 100).toFixed(1);
            const maxD = calcMaxDispFromReadback();
            H.maxdisp.textContent = maxD.toFixed(3);
            H.seff.textContent = SHAPE_STIFFNESS.toFixed(3);
            const hbStiff = HARDENING > 0
                ? BAND_STIFFNESS / Math.exp(HARDENING * maxD * 50)
                : BAND_STIFFNESS;
            H.beff.textContent = hbStiff.toFixed(3);
            H.pbdtime.textContent = pbdMs.toFixed(1);

            // Update band visuals — single vertex scan for all bands
            updateAllBandVisuals();

            // Render
            renderer.render(scene, camera);

            const ms = performance.now() - t0;
            fpsFrames++;
            fpsTime += dt;
            if (fpsTime >= 1.0) {
                H.fps.textContent = Math.round(fpsFrames / fpsTime);
                H.framems.textContent = ms.toFixed(1);
                fpsFrames = 0;
                fpsTime = 0;
            }
        }

        // ═══════════════════════════════════════
        // Init
        // ═══════════════════════════════════════
        H.vcount.textContent = vertexCount;
        H.tcount.textContent = triCount;
        H.pbditer.textContent = PBD_ITERATIONS;

        // Check GPU float texture support
        const gl = renderer.getContext();
        const extColorFloat = gl.getExtension('EXT_color_buffer_float');
        console.log('EXT_color_buffer_float:', !!extColorFloat);

        // Pre-load rest positions into a texture we can sample
        // (restTex is already set up above)

        console.log('⚡ GPU PBD 椭球调试环境就绪');
        console.log(`   顶点: ${vertexCount},  三角形: ${triCount}`);
        console.log(`   纹理: ${TEX_SIZE}×${TEX_SIZE} RGBA32F`);
        console.log('   🖱️ 点击椭球表面 = 绑皮筋,  R = 割皮筋');
        console.log('   📊 数据流: GPU Compute (纹理) → 顶点着色器采样 → 屏幕 (零读回)');

        // Initial sync for raycasting (use rest positions since GPU has rest data)
        {
            const posArr = cpuGeo.attributes.position.array;
            const restArr = ellipsoidGeo.attributes.position.array;
            for (let i = 0; i < vertexCount; i++) {
                posArr[i * 3] = restArr[i * 3];
                posArr[i * 3 + 1] = restArr[i * 3 + 1];
                posArr[i * 3 + 2] = restArr[i * 3 + 2];
            }
            cpuGeo.attributes.position.needsUpdate = true;
            cpuGeo.computeBoundingSphere();
        }

        animate();
    </script>
